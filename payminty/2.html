<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Paymintly</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <span class="font-bold text-xl text-indigo-600">Paymintly Admin</span>
        <button onclick="logout()" class="text-gray-500 hover:text-red-500">Sign Out</button>
    </nav>

    <main class="max-w-6xl mx-auto p-8">
        <h2 class="text-2xl font-semibold mb-6">Plans & Subscriptions</h2>
        <div id="plansList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loaded via JS -->
            <div class="p-8 text-center text-gray-400">Loading plans...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* Paste Config Here */
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadPlans() {
            const container = document.getElementById('plansList');
            const querySnapshot = await getDocs(collection(db, "Plans & Subscriptions"));
            container.innerHTML = "";
            
            querySnapshot.forEach((documentSnap) => {
                const plan = documentSnap.data();
                const id = documentSnap.id;
                
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl border shadow-sm hover:shadow-md transition";
                card.innerHTML = `
                    <input type="text" value="${plan.Name}" class="font-bold text-lg w-full mb-2 bg-transparent" onchange="updateField('${id}', 'Name', this.value)">
                    <div class="text-3xl font-bold text-indigo-600 mb-4">
                        ₹<input type="text" value="${plan['Price (INR)']}" class="w-24 bg-transparent" onchange="updateField('${id}', 'Price (INR)', this.value)">
                    </div>
                    <p class="text-sm text-gray-500 mb-4">Duration: <input type="text" value="${plan['Duration (Days)']}" class="w-12 bg-transparent border-b" onchange="updateField('${id}', 'Duration (Days)', this.value)"> days</p>
                    <ul class="text-sm text-gray-600 space-y-2 mb-4">
                        ${plan['Bullet Points'].map(pt => `<li>• ${pt}</li>`).join('')}
                    </ul>
                    <button class="w-full py-2 bg-slate-100 rounded text-xs font-semibold hover:bg-slate-200">Save Changes</button>
                `;
                container.appendChild(card);
            });
        }

        window.updateField = async (docId, field, value) => {
            try {
                await updateDoc(doc(db, "Plans & Subscriptions", docId), { [field]: value });
                console.log("Updated!");
            } catch (e) { alert("Error updating document"); }
        };

        loadPlans();
    </script>
</body>
</html>
