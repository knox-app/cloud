<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Panel | Paymintly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#0f172a; color:#cbd5e1; font-family:sans-serif;}</style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-2xl font-bold text-white">Database: <span class="text-indigo-400">Plans & Subscriptions</span></h1>
            <button onclick="localStorage.clear(); location.href='1.html'" class="text-sm text-slate-500 hover:text-red-400">Logout</button>
        </header>

        <div id="plansList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Data from Firestore -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            projectId: "xperts-ed-tech",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if(!localStorage.getItem('adminId')) location.href = '1.html';

        async function load() {
            const container = document.getElementById('plansList');
            const snap = await getDocs(collection(db, "Plans & Subscriptions"));
            container.innerHTML = '';

            snap.forEach(d => {
                const p = d.data();
                const card = document.createElement('div');
                card.className = "bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4 shadow-2xl";
                card.innerHTML = `
                    <div class="text-[10px] font-mono text-slate-600">${d.id}</div>
                    <div>
                        <label class="text-[10px] text-indigo-400 font-bold uppercase">Plan Name</label>
                        <input type="text" value="${p.Name}" onchange="u('${d.id}','Name',this.value)" class="w-full bg-slate-800 border-none p-2 rounded mt-1 text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-indigo-400 font-bold uppercase">Price (INR)</label>
                            <input type="text" value="${p['Price (INR)']}" onchange="u('${d.id}','Price (INR)',this.value)" class="w-full bg-slate-800 border-none p-2 rounded text-white">
                        </div>
                        <div>
                            <label class="text-[10px] text-indigo-400 font-bold uppercase">Days</label>
                            <input type="text" value="${p['Duration (Days)']}" onchange="u('${d.id}','Duration (Days)',this.value)" class="w-full bg-slate-800 border-none p-2 rounded text-white">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] text-indigo-400 font-bold uppercase">Bullet Points (Comma separated)</label>
                        <textarea onchange="uBP('${d.id}',this.value)" class="w-full bg-slate-800 border-none p-2 rounded h-20 text-xs text-white mt-1">${p['Bullet Points'].join(', ')}</textarea>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.u = async (id, f, v) => await updateDoc(doc(db, "Plans & Subscriptions", id), {[f]: v});
        window.uBP = async (id, v) => {
            const arr = v.split(',').map(s => s.trim());
            await updateDoc(doc(db, "Plans & Subscriptions", id), {"Bullet Points": arr});
        };

        load();
    </script>
</body>
</html>
