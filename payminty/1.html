<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin | Subscriptions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#0f172a; color:white; font-family:'Inter',sans-serif;}</style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <h1 class="text-2xl font-bold text-indigo-400">Plans & Subscriptions</h1>
            <button onclick="location.reload()" class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded-lg text-sm transition">Refresh</button>
        </div>

        <div id="plansGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading State -->
            <div class="text-gray-500">Syncing with Firestore...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchPlans() {
            const grid = document.getElementById('plansGrid');
            const snap = await getDocs(collection(db, "Plans & Subscriptions"));
            grid.innerHTML = '';

            snap.forEach((d) => {
                const p = d.data();
                const card = document.createElement('div');
                card.className = "bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4 shadow-xl";
                card.innerHTML = `
                    <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">${d.id}</p>
                    <div>
                        <label class="text-[10px] text-indigo-400 font-bold uppercase">Plan Name</label>
                        <input type="text" value="${p.Name}" onchange="updateF('${d.id}', 'Name', this.value)" class="w-full bg-slate-900 border-none p-2 rounded mt-1">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-indigo-400 font-bold uppercase">Price (INR)</label>
                            <input type="text" value="${p['Price (INR)']}" onchange="updateF('${d.id}', 'Price (INR)', this.value)" class="w-full bg-slate-900 border-none p-2 rounded">
                        </div>
                        <div>
                            <label class="text-[10px] text-indigo-400 font-bold uppercase">Price (USD)</label>
                            <input type="text" value="${p['Price (USD)']}" onchange="updateF('${d.id}', 'Price (USD)', this.value)" class="w-full bg-slate-900 border-none p-2 rounded">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] text-indigo-400 font-bold uppercase">Bullet Points (Separate by comma)</label>
                        <textarea onchange="updateBP('${d.id}', this.value)" class="w-full bg-slate-900 border-none p-2 rounded h-20 text-xs mt-1">${p['Bullet Points'].join(', ')}</textarea>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.updateF = async (id, field, val) => {
            await updateDoc(doc(db, "Plans & Subscriptions", id), { [field]: val });
        };
        window.updateBP = async (id, val) => {
            const arr = val.split(',').map(item => item.trim());
            await updateDoc(doc(db, "Plans & Subscriptions", id), { "Bullet Points": arr });
        };

        fetchPlans();
    </script>
</body>
</html>
