<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paymintly | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #f6f9fc; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white shadow-2xl rounded-2xl w-full max-w-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600">Paymintly</h1>
            <div class="flex justify-center gap-6 mt-6 border-b">
                <button id="tabL" class="pb-2 border-b-2 border-indigo-600 text-indigo-600 font-bold">Login</button>
                <button id="tabS" class="pb-2 border-b-2 border-transparent text-gray-400">Register Company</button>
            </div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <input type="text" id="lUser" placeholder="Email ID or Phone Number" required class="w-full p-3 bg-gray-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="lPass" placeholder="Password" required class="w-full p-3 bg-gray-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">Sign In</button>
        </form>

        <!-- Registration Form -->
        <form id="signupForm" class="hidden space-y-3 h-[450px] overflow-y-auto pr-2">
            <input type="text" id="sName" placeholder="Full Name" required class="w-full p-3 border rounded-lg">
            <input type="email" id="sEmail" placeholder="Email ID" required class="w-full p-3 border rounded-lg">
            <input type="tel" id="sPhone" placeholder="Phone Number" required class="w-full p-3 border rounded-lg">
            <input type="text" id="sAddr" placeholder="Address" required class="w-full p-3 border rounded-lg">
            <input type="url" id="sLogo" placeholder="Company Logo URL" required class="w-full p-3 border rounded-lg">
            <textarea id="sFB" placeholder="Firebase Configuration" required class="w-full p-3 border rounded-lg h-20 text-xs"></textarea>
            <input type="password" id="sPass" placeholder="Password" required class="w-full p-3 border rounded-lg">
            <input type="url" id="sRedir" placeholder="Redirect URL" required class="w-full p-3 border rounded-lg">
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">Register Now</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, or } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Tab Switching
        const tL = document.getElementById('tabL'), tS = document.getElementById('tabS'), fL = document.getElementById('loginForm'), fS = document.getElementById('signupForm');
        tS.onclick = () => { fS.classList.remove('hidden'); fL.classList.add('hidden'); tS.className="pb-2 border-b-2 border-indigo-600 text-indigo-600 font-bold"; tL.className="pb-2 text-gray-400"; };
        tL.onclick = () => { fL.classList.remove('hidden'); fS.classList.add('hidden'); tL.className="pb-2 border-b-2 border-indigo-600 text-indigo-600 font-bold"; tS.className="pb-2 text-gray-400"; };

        // Signup Logic (Saving to Firestore)
        fS.onsubmit = async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "Companies"), {
                    fullName: document.getElementById('sName').value,
                    email: document.getElementById('sEmail').value,
                    phone: document.getElementById('sPhone').value,
                    address: document.getElementById('sAddr').value,
                    logo: document.getElementById('sLogo').value,
                    fbConfig: document.getElementById('sFB').value,
                    password: document.getElementById('sPass').value,
                    redirect: document.getElementById('sRedir').value
                });
                alert("Registration Successful! Please Login.");
                location.reload();
            } catch(e) { alert("Error: " + e.message); }
        };

        // Login Logic (Checking Firestore)
        fL.onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('lUser').value;
            const pass = document.getElementById('lPass').value;

            // Query Firestore for matching email or phone
            const q = query(collection(db, "Companies"), where("password", "==", pass));
            const snap = await getDocs(q);
            
            let found = false;
            snap.forEach(doc => {
                const data = doc.data();
                if(data.email === user || data.phone === user) {
                    found = true;
                    localStorage.setItem('adminId', doc.id);
                    window.location.href = '2.html';
                }
            });

            if(!found) alert("Invalid Credentials");
        };
    </script>
</body>
</html>
