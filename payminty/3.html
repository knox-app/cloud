<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Checkout | Paymintly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full bg-white shadow-2xl rounded-3xl overflow-hidden flex flex-col md:flex-row">
        <!-- Plan Summary Left -->
        <div class="md:w-5/12 bg-indigo-600 p-10 text-white flex flex-col justify-between">
            <div>
                <img id="cLogo" class="h-12 mb-10 hidden rounded-lg shadow-lg">
                <h2 id="pName" class="text-3xl font-bold">Loading...</h2>
                <div class="text-5xl font-extrabold mt-6" id="pPrice">₹0</div>
                <div id="cName" class="mt-4 opacity-70 text-sm"></div>
            </div>
            <div class="text-[10px] tracking-widest opacity-40">SECURE TRANSACTION BY PAYMINTLY</div>
        </div>

        <!-- Checkout Form Right -->
        <form id="txForm" class="md:w-7/12 p-10 space-y-4">
            <h3 class="text-xl font-bold mb-6 text-gray-800">Checkout Details</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="fn" placeholder="First Name" required class="p-3 border rounded-xl w-full">
                <input type="text" id="ln" placeholder="Last Name" required class="p-3 border rounded-xl w-full">
            </div>
            <input type="email" id="em" placeholder="Team Email" required class="p-3 border rounded-xl w-full">
            <input type="text" id="adr" placeholder="Address" required class="p-3 border rounded-xl w-full">
            
            <div class="pt-6 border-t mt-6">
                <label class="text-xs font-bold text-gray-400 mb-2 block uppercase">16-Digit Payment Code</label>
                <input type="text" id="code" maxlength="16" placeholder="XXXX XXXX XXXX XXXX" required class="w-full p-4 border-2 border-indigo-50 rounded-xl font-mono text-xl tracking-[0.2em] text-center focus:border-indigo-400 outline-none">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-xl hover:shadow-2xl transition-all">Pay Now</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        emailjs.init("Yr9MutUoHOEONnFgn");

        const params = new URLSearchParams(window.location.search);
        const planID = params.get('plan'), orgID = params.get('org');
        let redirectLink = "https://google.com";

        async function loadData() {
            if(!planID || !orgID) return alert("Invalid URL Parameters");

            // Company Data
            const cSnap = await getDoc(doc(db, "Companies", orgID));
            if(cSnap.exists()) {
                const c = cSnap.data();
                document.getElementById('cName').innerText = "By " + c.fullName;
                document.getElementById('cLogo').src = c.logo;
                document.getElementById('cLogo').classList.remove('hidden');
                redirectLink = c.redirect;
            }

            // Plan Data
            const pSnap = await getDoc(doc(db, "Plans & Subscriptions", planID));
            if(pSnap.exists()) {
                const p = pSnap.data();
                document.getElementById('pName').innerText = p.Name;
                document.getElementById('pPrice').innerText = "₹" + p['Price (INR)'];
            }
        }

        document.getElementById('txForm').onsubmit = async (e) => {
            e.preventDefault();
            if(document.getElementById('code').value.length !== 16) return alert("Invalid 16-digit code");

            const emailData = {
                to_email: document.getElementById('em').value,
                first_name: document.getElementById('fn').value,
                last_name: document.getElementById('ln').value,
                sub_name: document.getElementById('pName').innerText,
                comp_name: document.getElementById('cName').innerText,
                date: new Date().toLocaleDateString(),
                logo: document.getElementById('cLogo').src
            };

            try {
                await emailjs.send("service_63mnm5a", "template_qxz1wka", emailData);
                alert("Success! Invoice sent to your email.");
                window.location.href = redirectLink;
            } catch(err) { alert("Email Failed: " + JSON.stringify(err)); }
        };

        loadData();
    </script>
</body>
</html>
