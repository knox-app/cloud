<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paymintly | Login & Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f6f9fc; }
        .stripe-card { box-shadow: 0 50px 100px -20px rgba(50,50,93,.25), 0 30px 60px -30px rgba(0,0,0,.3); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-xl stripe-card w-full max-w-md">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-indigo-600">Paymintly</h1>
            <p class="text-gray-500 text-sm">Payments made easy</p>
        </div>

        <div class="flex border-b mb-6">
            <button id="loginTab" class="flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600 font-semibold">Login</button>
            <button id="signupTab" class="flex-1 pb-2 border-b-2 border-transparent text-gray-400 hover:text-indigo-600">Register Company</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email or Phone</label>
                <input type="text" id="loginEmail" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="loginPass" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md font-semibold hover:bg-indigo-700 transition">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="space-y-4 hidden h-[500px] overflow-y-auto pr-2">
            <input type="text" id="regName" placeholder="Full Name" required class="w-full p-2 border rounded-md">
            <input type="email" id="regEmail" placeholder="Email ID" required class="w-full p-2 border rounded-md">
            <input type="tel" id="regPhone" placeholder="Phone Number" required class="w-full p-2 border rounded-md">
            <input type="text" id="regAddress" placeholder="Address" required class="w-full p-2 border rounded-md">
            <input type="url" id="regLogo" placeholder="Company Logo URL" required class="w-full p-2 border rounded-md">
            <textarea id="regConfig" placeholder="Firebase Config JSON" required class="w-full p-2 border rounded-md h-20 text-xs"></textarea>
            <input type="password" id="regPass" placeholder="Password" required class="w-full p-2 border rounded-md">
            <input type="url" id="regRedirect" placeholder="Redirect URL" required class="w-full p-2 border rounded-md">
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md font-semibold hover:bg-indigo-700 transition">Create Account</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Tab Switching Logic
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        signupTab.onclick = () => {
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            signupTab.className = "flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600 font-semibold";
            loginTab.className = "flex-1 pb-2 border-b-2 border-transparent text-gray-400";
        };

        loginTab.onclick = () => {
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            loginTab.className = "flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600 font-semibold";
            signupTab.className = "flex-1 pb-2 border-b-2 border-transparent text-gray-400";
        };

        // Auth Logic
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
                window.location.href = "2.html";
            } catch (err) { alert(err.message); }
        };

        signupForm.onsubmit = async (e) => {
            e.preventDefault();
            try {
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regPass').value);
                await setDoc(doc(db, "companies", cred.user.uid), {
                    name: document.getElementById('regName').value,
                    phone: document.getElementById('regPhone').value,
                    address: document.getElementById('regAddress').value,
                    logo: document.getElementById('regLogo').value,
                    fbConfig: document.getElementById('regConfig').value,
                    redirectUrl: document.getElementById('regRedirect').value
                });
                alert("Registration Successful!");
                window.location.href = "2.html";
            } catch (err) { alert(err.message); }
        };
    </script>
</body>
              </html>
