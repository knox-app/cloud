<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waiting for Authorization</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #f5f5f7; --card: rgba(255, 255, 255, 0.8); --text: #1d1d1f; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: rgba(30, 30, 30, 0.8); --text: #f5f5f7; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: var(--card); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        #qrcode { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 20px 0; }
        .loader { border: 3px solid #888; border-top: 3px solid #0071e3; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="font-weight: 600;">Sign in with Apple ID</h1>
        <p style="color: #888;">Scan this code with your nearby device.</p>
        <div id="qrcode"></div>
        <p id="dname" style="font-weight: 500;"></p>
        <div id="status"><div class="loader"></div> Waiting for scan...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Persistent Device Identity
        let pId = localStorage.getItem("myPersistentId");
        if(!pId) {
            pId = "DEV-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem("myPersistentId", pId);
        }
        const pName = localStorage.getItem("myDeviceName") || "Unknown Device";
        document.getElementById('dname').innerText = pName;

        // 2. Generate QR
        new QRCode(document.getElementById("qrcode"), pId);

        // 3. Broadcast Location
        navigator.geolocation.getCurrentPosition(pos => {
            db.collection("sessions").doc(pId).set({
                deviceName: pName,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                status: "waiting",
                timestamp: Date.now()
            });
        });

        // 4. One-Time Scan Logic
        db.collection("sessions").doc(pId).onSnapshot(doc => {
            const data = doc.data();
            if(data?.status === "confirmed") {
                localStorage.setItem("userEmail", data.email);
                db.collection("sessions").doc(pId).update({ status: "expired" }); // Expire session
                window.location.href = "4.html";
            }
        });
    </script>
</body>
</html>
