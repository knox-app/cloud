<!DOCTYPE html>
<html>
<head>
    <title>3 - QR Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>body { font-family: sans-serif; text-align: center; padding-top: 50px; }</style>
</head>
<body>
    <h2>Scan to Login</h2>
    <div id="qrcode" style="display:flex; justify-content:center; margin:20px;"></div>
    <p id="msg">Open the scanner on your logged-in device</p>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const sessionID = "SESS" + Math.floor(Math.random() * 1000000);
        new QRCode(document.getElementById("qrcode"), sessionID);

        // Create the session in Firestore
        db.collection("sessions").doc(sessionID).set({ status: "waiting" });

        // Listen for the scanner to update this document
        db.collection("sessions").doc(sessionID).onSnapshot((doc) => {
            const data = doc.data();
            if(data && data.status === "confirmed") {
                localStorage.setItem("userEmail", data.email);
                db.collection("sessions").doc(sessionID).delete(); // Cleanup
                window.location.href = "4.html";
            }
        });
    </script>
</body>
</html>
