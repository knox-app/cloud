<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Discovery</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --card: #fff; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --text: #fff; --card: #1c1c1e; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; text-align: center; }
        .radar { width: 100px; height: 100px; border: 2px solid #0071e3; border-radius: 50%; margin: 30px auto; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .row { background: var(--card); padding: 20px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dist { color: #0071e3; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>
    <div class="radar"></div>
    <h2 style="font-weight: 600;">Nearby Devices</h2>
    <p style="color:#888; font-size:14px; margin-bottom:30px;">Select a device within 50m to authorize.</p>
    <div id="list">Searching...</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        navigator.geolocation.getCurrentPosition(myPos => {
            db.collection("sessions").where("status", "==", "waiting").onSnapshot(snap => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                const now = Date.now();
                snap.forEach(doc => {
                    const data = doc.data();
                    const isFresh = data.lastSeen && (now - data.lastSeen < 120000);
                    if(data.deviceName && isFresh) {
                        const dist = haversine(myPos.coords.latitude, myPos.coords.longitude, data.lat, data.lng);
                        if(dist < 50) {
                            const div = document.createElement('div');
                            div.className = "row";
                            div.onclick = () => window.location.href=`6.html?target=${doc.id}&name=${encodeURIComponent(data.deviceName)}`;
                            div.innerHTML = `<div style="text-align:left"><b>${data.deviceName}</b><br><small style="color:#888">${doc.id}</small></div> <span class="dist">${dist.toFixed(1)}m</span>`;
                            list.appendChild(div);
                        }
                    }
                });
                if(list.innerHTML === "") list.innerHTML = "No devices nearby. Refresh 3.html.";
            });
        });
    </script>
</body>
</html>
