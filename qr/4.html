<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --card: #1c1c1e; --text: #fff; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 40px; display: flex; justify-content: center; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; }
        .primary { background: #0071e3; color: white; }
        .secondary { background: #e8e8ed; color: #1d1d1f; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="welcome">Welcome</h2>
        <p id="emailDisplay" style="color: #888;"></p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <a href="5.html" class="btn primary">Login Nearby Device</a>
        <button class="btn secondary" onclick="localStorage.clear(); location.href='2.html'">Sign Out</button>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        firebase.initializeApp(firebaseConfig);
        const email = localStorage.getItem("userEmail");
        if(!email) window.location.href="2.html";
        document.getElementById('emailDisplay').innerText = email;
        firebase.firestore().collection("users").doc(email).get().then(doc => {
            document.getElementById('welcome').innerText = "Hello, " + doc.data().name;
        });
    </script>
</body>
</html>
