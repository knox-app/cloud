<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nearby Discovery</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --text: #fff; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); text-align: center; margin: 0; }
        .radar-container { height: 300px; display: flex; align-items: center; justify-content: center; position: relative; margin-top: 50px; }
        .circle { position: absolute; border: 1px solid #0071e3; border-radius: 50%; animation: ripple 3s infinite linear; opacity: 0; }
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 300px; height: 300px; opacity: 0; } }
        .device-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; margin: 10px auto; width: 80%; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
    </style>
</head>
<body>
    <div class="radar-container">
        <div class="circle" style="animation-delay: 0s;"></div>
        <div class="circle" style="animation-delay: 1s;"></div>
        <div class="circle" style="animation-delay: 2s;"></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" width="40" style="filter: invert(0.5);">
    </div>
    <h2>Nearby Devices</h2>
    <div id="list">Searching...</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        navigator.geolocation.getCurrentPosition(myPos => {
            db.collection("sessions").where("status", "==", "waiting").onSnapshot(snap => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const dist = haversine(myPos.coords.latitude, myPos.coords.longitude, data.lat, data.lng);
                    
                    if(dist < 10) { // Using 10m for realistic GPS stability
                        const item = document.createElement('div');
                        item.className = "device-card";
                        item.onclick = () => window.location.href=`6.html?target=${doc.id}&name=${data.deviceName}`;
                        item.innerHTML = `<div><b>${data.deviceName}</b><br><small>${doc.id}</small></div> <span>${dist.toFixed(1)}m</span>`;
                        list.appendChild(item);
                    }
                });
                if(list.innerHTML === "") list.innerHTML = "No devices within 10 meters.";
            });
        });
    </script>
</body>
</html>
