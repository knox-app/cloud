<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --apple-blue: #0071e3; --bg: #f5f5f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 340px; text-align: center; }
        h2 { font-weight: 600; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; background: rgba(255,255,255,0.5); box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: var(--apple-blue); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 15px; }
        button:hover { background: #0077ed; }
        a { color: var(--apple-blue); text-decoration: none; font-size: 14px; margin-top: 15px; display: block; }
    </style>
</head>
<body>
<div class="card">
    <h2>Create ID</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="device" placeholder="Device Name (e.g. MacBook Pro)">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="register()">Register</button>
    <a href="2.html">Already have an ID? Login</a>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function register() {
        const email = document.getElementById('email').value;
        db.collection("users").doc(email).set({
            name: document.getElementById('name').value,
            deviceName: document.getElementById('device').value,
            email: email,
            password: document.getElementById('pass').value
        }).then(() => { alert("Welcome!"); window.location.href="2.html"; });
    }
</script>
</body>
</html>
