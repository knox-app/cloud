<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Identity</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; text-align: center; }
        #reader { width: 100%; height: 80vh; }
        .footer { padding: 20px; background: rgba(0,0,0,0.8); position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div class="footer">
        <h3 id="targetName">Scan QR Code</h3>
        <p id="msg">Align the code within the frame</p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('target');
        document.getElementById('targetName').innerText = "Authorizing " + params.get('name');

        let scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
        scanner.render((decodedText) => {
            if(decodedText === targetId) {
                scanner.clear();
                document.getElementById('msg').innerText = "Verifying...";
                db.collection("sessions").doc(targetId).update({
                    status: "confirmed",
                    email: localStorage.getItem("userEmail")
                }).then(() => {
                    alert("Authorization Successful");
                    window.location.href="4.html";
                });
            } else {
                alert("Security Error: This QR code belongs to a different device.");
            }
        });
    </script>
</body>
</html>
