<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authorize Device</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #reader { width: 100%; height: 70vh; background: #000; }
        .ui-layer { flex: 1; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); border-radius: 30px 30px 0 0; padding: 30px; text-align: center; z-index: 100; }
        .target-name { font-size: 20px; font-weight: 600; margin: 0 0 5px 0; }
        .btn-back { color: #0071e3; text-decoration: none; display: inline-block; margin-top: 20px; font-weight: 500; }
        #message { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div class="ui-layer">
        <div class="target-name" id="displayTarget">Connecting...</div>
        <p id="message">Align the QR code within the frame to authorize.</p>
        <a href="5.html" class="btn-back">Cancel Authorization</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            projectId: "question-metabase",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get info from URL (passed by 5.html)
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('target'); // The ID we ARE EXPECTING
        const targetName = params.get('name');
        document.getElementById('displayTarget').innerText = "Authorizing " + (targetName || "Device");

        const myEmail = localStorage.getItem("userEmail");

        // Initialize Scanner
        function onScanSuccess(decodedText) {
            // REMOVE WHITESPACE OR HIDDEN CHARS
            const scannedId = decodedText.trim();
            
            if (scannedId === targetId) {
                // STOP SCANNER IMMEDIATELY
                html5QrcodeScanner.clear();
                document.getElementById('message').innerText = "Identity Verified. Logging in...";
                
                // UPDATE FIRESTORE
                db.collection("sessions").doc(targetId).update({
                    status: "confirmed",
                    email: myEmail
                }).then(() => {
                    alert("Authorization Successful!");
                    window.location.href = "4.html";
                }).catch(err => {
                    alert("Error updating session: " + err.message);
                });
            } else {
                // If the user scans the WRONG QR code
                document.getElementById('message').innerHTML = "<span style='color: #ff3b30'>Security Error: Wrong QR Code.</span>";
            }
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 20, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
