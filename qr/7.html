<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Photo - Perplexity</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --text: #fff; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(128,128,128,0.1); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-select { background: var(--accent); color: white; padding: 16px 32px; border-radius: 16px; cursor: pointer; display: inline-block; font-weight: 600; margin-top: 20px; transition: 0.3s; }
        #status { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin:0">Send Photo</h2>
        <p style="color:#888; font-size: 14px;">Select a photo to drop to a nearby Perplexity device.</p>
        
        <label class="btn-select">
            <input type="file" id="photoInput" hidden onchange="startUpload()">
            Select Photo
        </label>
        
        <p id="status">Ready to share</p>
    </div>

    <script>
        const IMGBB_KEY = "80c452b9a4b80f240ada316f23078d2c";

        async function startUpload() {
            const file = document.getElementById('photoInput').files[0];
            if(!file) return;

            document.getElementById('status').innerHTML = "Uploading to Cloud...";

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();

                if(result.success) {
                    // Store the URL in LocalStorage for the scanner (6.html) to use later
                    localStorage.setItem("pendingTransferUrl", result.data.url);
                    
                    // Redirect to discovery to find the nearby receiver
                    window.location.href = "5.html";
                } else {
                    alert("Upload failed. Try a smaller image.");
                }
            } catch (err) {
                alert("Connection error.");
            }
        }
    </script>
</body>
</html>
