<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Video Call</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

video{

width:45%;
height:300px;
background:black;
margin:10px;
border-radius:10px;

}

button,input{

padding:10px;
margin:8px;
border-radius:8px;
border:none;

}

button{

background:#00aaff;
color:white;
cursor:pointer;

}

</style>

</head>

<body>

<h2>🔥 Video Call Prototype</h2>

<button id="camera">

Start Camera

</button>

<br>

<button id="create">

Create Room

</button>

<input id="code" placeholder="Enter 6 Digit Code">

<button id="join">

Join

</button>

<h3 id="show"></h3>

<br>

<video id="local" autoplay muted playsinline></video>

<video id="remote" autoplay playsinline></video>

<br>

<button id="hangup">

Hangup

</button>


<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
getDoc,
collection,
addDoc,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// Firebase

const firebaseConfig={

apiKey:"AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",

authDomain:"question-metabase.firebaseapp.com",

projectId:"question-metabase"

};


const app=initializeApp(firebaseConfig);

const db=getFirestore(app);


// Better ICE

const pc=new RTCPeerConnection({

iceServers:[

{

urls:"stun:stun.l.google.com:19302"

},

{

urls:"stun:stun1.l.google.com:19302"

}

]

});


let localStream;

let remoteStream=new MediaStream();

document.getElementById("remote").srcObject=remoteStream;


// Camera

document.getElementById("camera")

.onclick=async()=>{

localStream=

await navigator.mediaDevices.getUserMedia({

video:true,

audio:true

});

localStream.getTracks()

.forEach(track=>{

pc.addTrack(track,localStream);

});

document.getElementById("local")

.srcObject=localStream;

};


// Receive Stream

pc.ontrack=(event)=>{

event.streams[0].getTracks()

.forEach(track=>{

remoteStream.addTrack(track);

});

};


// 6 digit code

function makeCode(){

return Math.floor(

100000+Math.random()*900000

).toString();

}


let roomRef;

let caller;

let callee;


// CREATE

document.getElementById("create")

.onclick=async()=>{

const code=makeCode();

document.getElementById("show")

.innerText="CODE : "+code;

roomRef=doc(db,"rooms",code);

caller=collection(roomRef,"caller");

callee=collection(roomRef,"callee");


// ICE caller

pc.onicecandidate=e=>{

if(e.candidate){

addDoc(

caller,

e.candidate.toJSON()

);

}

};


// Offer

const offer=

await pc.createOffer();

await pc.setLocalDescription(offer);

await setDoc(roomRef,{

offer:offer

});


// Listen answer realtime

onSnapshot(roomRef,snap=>{

const data=snap.data();

if(

data?.answer

&&!pc.currentRemoteDescription

){

pc.setRemoteDescription(

new RTCSessionDescription(

data.answer

));

}

});


// listen callee ICE realtime

onSnapshot(callee,snap=>{

snap.docChanges()

.forEach(change=>{

if(change.type==="added"){

pc.addIceCandidate(

new RTCIceCandidate(

change.doc.data()

));

}

});

});

};




// JOIN

document.getElementById("join")

.onclick=async()=>{

const code=

document.getElementById("code")

.value.trim();

roomRef=doc(db,"rooms",code);

caller=collection(roomRef,"caller");

callee=collection(roomRef,"callee");


// ICE callee

pc.onicecandidate=e=>{

if(e.candidate){

addDoc(

callee,

e.candidate.toJSON()

);

}

};


const snap=

await getDoc(roomRef);

if(!snap.exists()){

alert("Room not found");

return;

}

const data=snap.data();


// set offer

await pc.setRemoteDescription(

new RTCSessionDescription(

data.offer

));


// create answer

const answer=

await pc.createAnswer();

await pc.setLocalDescription(answer);


await setDoc(roomRef,{

answer:answer

},{merge:true});


// listen caller ICE realtime

onSnapshot(caller,snap=>{

snap.docChanges()

.forEach(change=>{

if(change.type==="added"){

pc.addIceCandidate(

new RTCIceCandidate(

change.doc.data()

));

}

});

});

};


// Hangup

document.getElementById("hangup")

.onclick=()=>{

pc.close();

location.reload();

};

</script>

</body>
</html>
