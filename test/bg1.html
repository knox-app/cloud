<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open-Source BG Remover</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg,#141e30,#243b55);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  color: #fff;
}

.app {
  background: #0b0b0b;
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}

label {
  display: block;
  padding: 12px;
  background: #00c6ff;
  color: #000;
  border-radius: 8px;
  cursor: pointer;
  margin: 15px 0;
  font-weight: bold;
}

input { display: none; }

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #00ff88;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  opacity: .5;
}

canvas {
  max-width: 100%;
  margin-top: 15px;
  border-radius: 10px;
  background: #fff;
}

a { text-decoration: none; }
</style>
</head>

<body>
<div class="app">
  <h2>AI Background Remover</h2>
  <p>100% Open Source • GitHub Pages Safe</p>

  <label for="file">Upload Image</label>
  <input id="file" type="file" accept="image/*">

  <button id="remove" disabled>Remove Background</button>

  <canvas id="canvas"></canvas>

  <a id="download" style="display:none">
    <button style="margin-top:10px">Download PNG</button>
  </a>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

<script>
const fileInput = document.getElementById("file");
const btn = document.getElementById("remove");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const download = document.getElementById("download");

const img = new Image();
img.crossOrigin = "anonymous";

const segmenter = new SelfieSegmentation({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
});

segmenter.setOptions({
  modelSelection: 1
});

segmenter.onResults(results => {
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.drawImage(
    results.segmentationMask,
    0, 0,
    canvas.width, canvas.height
  );

  ctx.globalCompositeOperation = "source-in";
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = "source-over";

  const url = canvas.toDataURL("image/png");
  download.href = url;
  download.download = "bg-removed.png";
  download.style.display = "block";
});

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (!file) return;

  btn.disabled = true;

  img.onload = () => {
    btn.disabled = false;
  };

  img.src = URL.createObjectURL(file);
});

btn.addEventListener("click", async () => {
  btn.disabled = true;
  await segmenter.send({ image: img });
  btn.disabled = false;
});
</script>
</body>
</html>
