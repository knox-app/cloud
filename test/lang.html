<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Realtime Translator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.app{
    width:95%;
    max-width:500px;
    background:#111;
    border-radius:14px;
    padding:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}
h2{
    text-align:center;
    margin-bottom:12px;
}
.row{
    display:flex;
    gap:8px;
    margin-bottom:10px;
}
select,textarea{
    width:100%;
    background:#1c1c1c;
    color:#fff;
    border:1px solid #333;
    border-radius:8px;
    padding:10px;
    font-size:14px;
}
textarea{
    resize:none;
    height:100px;
}
.output{
    background:#000;
    padding:12px;
    border-radius:8px;
    min-height:80px;
    border:1px dashed #333;
    white-space:pre-wrap;
}
.small{
    text-align:center;
    font-size:12px;
    opacity:.6;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="app">
    <h2>🌍 Realtime Translator</h2>

    <div class="row">
        <select id="from">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="ru">Russian</option>
        </select>

        <select id="to">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="ru">Russian</option>
        </select>
    </div>

    <textarea id="input" placeholder="Type text to translate..."></textarea>

    <div id="output" class="output"></div>

    <div class="small">
        Works with URL params: ?from=en&to=hi&t=Hello
    </div>
</div>

<script>
// URL PARAMS
const params = new URLSearchParams(window.location.search);

const fromLang = params.get("from") || "auto";
const toLang   = params.get("to") || "hi";
const text     = params.get("t") || "";
const resultId = params.get("r") || "output";

// ELEMENTS
const from = document.getElementById("from");
const to = document.getElementById("to");
const input = document.getElementById("input");
const output = document.getElementById(resultId);

// APPLY PARAMS
from.value = fromLang;
to.value = toLang;
input.value = decodeURIComponent(text);

// TRANSLATE FUNCTION
let timer;
function translateText(){
    clearTimeout(timer);
    timer = setTimeout(async () => {
        if(!input.value.trim()){
            output.innerText = "";
            return;
        }

        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from.value}&tl=${to.value}&dt=t&q=${encodeURIComponent(input.value)}`;

        try{
            const res = await fetch(url);
            const data = await res.json();
            output.innerText = data[0].map(t => t[0]).join("");
        }catch(e){
            output.innerText = "⚠️ Translation failed";
        }
    }, 300);
}

// EVENTS
input.addEventListener("input", translateText);
from.addEventListener("change", translateText);
to.addEventListener("change", translateText);

// AUTO TRANSLATE IF TEXT IN URL
if(input.value) translateText();
</script>

</body>
</html>
