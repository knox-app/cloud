<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>6 Digit Video Call</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

video{

width:45%;
height:300px;
background:black;
border-radius:10px;
margin:10px;

}

button{

padding:12px;
margin:6px;
border-radius:8px;
border:none;
background:#00aaff;
color:white;
cursor:pointer;

}

input{

padding:10px;
border-radius:8px;
border:none;

}

</style>

</head>

<body>

<h2>🔥 Video Call (6 Digit Code)</h2>

<button id="camera">

Start Camera

</button>

<br>

<button id="create">

Create Room

</button>

<input id="code" placeholder="Enter Code">

<button id="join">

Join Room

</button>

<h3 id="showCode"></h3>

<br>

<video id="local" autoplay muted playsinline></video>

<video id="remote" autoplay playsinline></video>

<br>

<button id="hangup">

Hangup

</button>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
getDoc,
collection,
addDoc,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// Firebase

const firebaseConfig={

apiKey:"AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",

authDomain:"question-metabase.firebaseapp.com",

projectId:"question-metabase",

storageBucket:"question-metabase.firebasestorage.app",

messagingSenderId:"770698198753",

appId:"1:770698198753:web:59ae49d78b6013bab5c1a0"

};


const app=initializeApp(firebaseConfig);

const db=getFirestore(app);


// STUN

const pc=new RTCPeerConnection({

iceServers:[

{

urls:["stun:stun.l.google.com:19302"]

}

]

});


let localStream;

let remoteStream=new MediaStream();

document.getElementById("remote").srcObject=remoteStream;


// Camera

document.getElementById("camera")

.onclick=async()=>{

localStream=

await navigator.mediaDevices.getUserMedia({

video:true,

audio:true

});


localStream.getTracks()

.forEach(track=>{

pc.addTrack(track,localStream);

});

document.getElementById("local")

.srcObject=localStream;

};


// Remote Video Fix

pc.ontrack=(event)=>{

event.streams[0].getTracks()

.forEach(track=>{

remoteStream.addTrack(track);

});

};


// 6 digit generator

function makeCode(){

return Math.floor(

100000+Math.random()*900000

).toString();

}


let roomRef;

let callerCandidates;

let calleeCandidates;


// CREATE ROOM

document.getElementById("create")

.onclick=async()=>{

const code=makeCode();

document.getElementById("showCode")

.innerText="Room Code : "+code;

roomRef=doc(db,"rooms",code);

callerCandidates=

collection(roomRef,"caller");

calleeCandidates=

collection(roomRef,"callee");


// ICE

pc.onicecandidate=event=>{

if(event.candidate){

addDoc(

callerCandidates,

event.candidate.toJSON()

);

}

};


// Offer

const offer=

await pc.createOffer();

await pc.setLocalDescription(offer);


await setDoc(roomRef,{

offer:{

type:offer.type,

sdp:offer.sdp

}

});


// Listen Answer

onSnapshot(roomRef,(snap)=>{

const data=snap.data();

if(

data?.answer

&&!pc.currentRemoteDescription

){

pc.setRemoteDescription(

new RTCSessionDescription(

data.answer

));

}

});


// Listen Callee ICE

onSnapshot(

calleeCandidates,

snap=>{

snap.docChanges()

.forEach(change=>{

if(change.type==="added"){

pc.addIceCandidate(

new RTCIceCandidate(

change.doc.data()

));

}

});

});

};




// JOIN ROOM

document.getElementById("join")

.onclick=async()=>{


const code=

document.getElementById("code")

.value.trim();

roomRef=doc(db,"rooms",code);

callerCandidates=

collection(roomRef,"caller");

calleeCandidates=

collection(roomRef,"callee");


// ICE

pc.onicecandidate=event=>{

if(event.candidate){

addDoc(

calleeCandidates,

event.candidate.toJSON()

);

}

};


const snap=

await getDoc(roomRef);

if(!snap.exists()){

alert("Room Not Found");

return;

}

const data=snap.data();


// Set Offer

await pc.setRemoteDescription(

new RTCSessionDescription(

data.offer

));


// Answer

const answer=

await pc.createAnswer();

await pc.setLocalDescription(answer);


await setDoc(roomRef,

{

answer:{

type:answer.type,

sdp:answer.sdp

}

},

{merge:true}

);


// Listen Caller ICE

onSnapshot(

callerCandidates,

snap=>{

snap.docChanges()

.forEach(change=>{

if(change.type==="added"){

pc.addIceCandidate(

new RTCIceCandidate(

change.doc.data()

));

}

});

});

};


// Hangup

document.getElementById("hangup")

.onclick=()=>{

pc.close();

location.reload();

};

</script>

</body>

</html>
