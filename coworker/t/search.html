<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fable Search (Test 1)</title>
    <style>
        :root {
            --bg-color: #fcfbf7;
            --text-color: #2c2c2c;
            --primary-color: #5c4d7d;
            --primary-hover: #453760;
            --border-color: #e0dcd3;
            --card-bg: #ffffff;
            --snippet-color: #555555;
            --link-color: #1a0dab;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary-color: #9d8db9;
            --primary-hover: #b5a8cf;
            --border-color: #2d2d2d;
            --card-bg: #1d1d1d;
            --snippet-color: #b0b0b0;
            --link-color: #8ab4f8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 2rem;
            gap: 1rem;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        .btn-icon {
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-container {
            width: 100%;
            text-align: center;
            margin-top: 5vh;
            transition: margin-top 0.5s ease;
        }

        .brand h1 {
            font-family: 'Georgia', serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
            font-weight: normal;
        }

        .brand p {
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .api-indicator {
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            color: var(--snippet-color);
            font-family: monospace;
            background: var(--card-bg);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: inline-block;
        }

        .search-form {
            width: 100%;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .search-button {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
        }

        .search-button:hover {
            background-color: var(--primary-hover);
        }

        /* Results Area */
        .results-container {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .result-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 8px;
        }

        .result-url {
            font-size: 0.85rem;
            color: var(--snippet-color);
            word-break: break-all;
            margin-bottom: 0.3rem;
            display: block;
        }

        .result-title {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .result-title a {
            color: var(--link-color);
            text-decoration: none;
        }

        .result-title a:hover {
            text-decoration: underline;
        }

        .result-snippet {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--snippet-color);
        }

        /* Modal Settings */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-close {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .save-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
        }

        /* Troubleshooting Guide Box */
        .troubleshoot-box {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 1.25rem;
            margin-top: 1.5rem;
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .troubleshoot-box h4 {
            margin-bottom: 0.5rem;
        }

        .troubleshoot-box ul {
            margin-left: 1.25rem;
            margin-top: 0.5rem;
        }

        .loading-spinner {
            display: none;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            opacity: 0.6;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <button class="btn-icon" id="themeToggleBtn" title="Toggle Theme">
            &#9788;
        </button>
        <button class="btn-icon" id="settingsBtn" title="API Settings">
            &#9881;
        </button>
    </header>

    <main>
        <div class="search-container" id="searchContainer">
            <div class="brand">
                <h1>Fable Search</h1>
                <p>TEST 1</p>
            </div>
            
            <div>
                <span class="api-indicator" id="apiIndicator">Endpoint: Loading...</span>
            </div>
            
            <form class="search-form" id="searchForm">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="Enter your search query..." autocomplete="off" required>
                </div>
                <button type="submit" class="search-button">Search</button>
            </form>
        </div>

        <div class="loading-spinner" id="loadingSpinner"></div>
        <div id="statusMessage" style="display: none; width: 100%;"></div>

        <section class="results-container" id="resultsContainer">
            <!-- Search results are dynamically output here -->
        </section>
    </main>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>OpenSERP Settings</h2>
                <button class="modal-close" id="closeSettingsBtn">&times;</button>
            </div>
            <form id="settingsForm">
                <div class="form-group">
                    <label for="apiUrlInput">OpenSERP Base API URL</label>
                    <input type="text" id="apiUrlInput" placeholder="http://localhost:7000" required>
                    <small style="opacity: 0.7; font-size: 0.8rem; display: block; margin-top: 0.25rem;">Must include http:// or https://</small>
                </div>
                <div class="form-group">
                    <label for="engineSelect">Search Engine</label>
                    <select id="engineSelect">
                        <option value="google">Google</option>
                        <option value="yandex">Yandex</option>
                        <option value="baidu">Baidu</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="limitInput">Results Limit</label>
                    <input type="number" id="limitInput" min="1" max="100" value="10">
                </div>
                <button type="submit" class="save-btn">Save Configurations</button>
            </form>
        </div>
    </div>

    <footer>
        Fable Search (Test 1) &bull; Powered by OpenSERP API
    </footer>

    <script>
        const DEFAULTS = {
            apiUrl: 'http://localhost:7000',
            engine: 'google',
            limit: 10,
            theme: 'light'
        };

        // Cache DOM elements
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const searchContainer = document.getElementById('searchContainer');
        const resultsContainer = document.getElementById('resultsContainer');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const statusMessage = document.getElementById('statusMessage');
        const apiIndicator = document.getElementById('apiIndicator');
        
        // Modal elements
        const settingsModal = document.getElementById('settingsModal');
        const settingsBtn = document.getElementById('settingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const settingsForm = document.getElementById('settingsForm');
        const apiUrlInput = document.getElementById('apiUrlInput');
        const engineSelect = document.getElementById('engineSelect');
        const limitInput = document.getElementById('limitInput');
        const themeToggleBtn = document.getElementById('themeToggleBtn');

        // Load configuration
        let config = {
            apiUrl: localStorage.getItem('openserp_url') || DEFAULTS.apiUrl,
            engine: localStorage.getItem('openserp_engine') || DEFAULTS.engine,
            limit: parseInt(localStorage.getItem('openserp_limit'), 10) || DEFAULTS.limit,
            theme: localStorage.getItem('fable_theme') || DEFAULTS.theme
        };

        // Enforce protocol validation on loaded configuration
        sanitizeConfigUrl();

        // Apply theme and indicators
        document.documentElement.setAttribute('data-theme', config.theme);
        updateApiIndicator();

        apiUrlInput.value = config.apiUrl;
        engineSelect.value = config.engine;
        limitInput.value = config.limit;

        // Theme Toggle
        themeToggleBtn.addEventListener('click', () => {
            const nextTheme = config.theme === 'light' ? 'dark' : 'light';
            config.theme = nextTheme;
            localStorage.setItem('fable_theme', nextTheme);
            document.documentElement.setAttribute('data-theme', nextTheme);
        });

        // Settings Modal
        settingsBtn.addEventListener('click', () => settingsModal.style.display = 'flex');
        closeSettingsBtn.addEventListener('click', () => settingsModal.style.display = 'none');
        window.addEventListener('click', (e) => {
            if (e.target === settingsModal) settingsModal.style.display = 'none';
        });

        settingsForm.addEventListener('submit', (e) => {
            e.preventDefault();
            let inputUrl = apiUrlInput.value.trim();
            
            // Force protocol prefixing to prevent relative path translation
            if (!/^https?:\/\//i.test(inputUrl)) {
                inputUrl = 'http://' + inputUrl;
            }
            inputUrl = inputUrl.replace(/\/$/, ""); // Remove trailing slash

            config.apiUrl = inputUrl;
            config.engine = engineSelect.value;
            config.limit = parseInt(limitInput.value, 10);

            localStorage.setItem('openserp_url', config.apiUrl);
            localStorage.setItem('openserp_engine', config.engine);
            localStorage.setItem('openserp_limit', config.limit);

            updateApiIndicator();
            settingsModal.style.display = 'none';
        });

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (query) performSearch(query);
        });

        function sanitizeConfigUrl() {
            if (!/^https?:\/\//i.test(config.apiUrl)) {
                config.apiUrl = 'http://localhost:7000';
                localStorage.setItem('openserp_url', config.apiUrl);
            }
        }

        function updateApiIndicator() {
            apiIndicator.textContent = `Endpoint: ${config.apiUrl}/${config.engine}/search`;
        }

        async function performSearch(query) {
            resultsContainer.style.display = 'none';
            statusMessage.style.display = 'none';
            loadingSpinner.style.display = 'block';

            // Clean construct URL
            const requestUrl = `${config.apiUrl}/${config.engine}/search?lang=en&limit=${config.limit}&text=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(requestUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }

                const data = await response.json();
                renderResults(data);

            } catch (error) {
                console.error("Search Error:", error);
                showTroubleshootingMsg(requestUrl, error.message);
            } finally {
                loadingSpinner.style.display = 'none';
            }
        }

        function renderResults(results) {
            resultsContainer.innerHTML = '';
            
            if (!results || results.length === 0) {
                statusMessage.innerHTML = `<p style="text-align:center;">No results returned from the engine.</p>`;
                statusMessage.style.display = 'block';
                return;
            }

            resultsContainer.style.display = 'flex';

            results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <span class="result-url">${escapeHTML(item.url || '#')}</span>
                    <h2 class="result-title">
                        <a href="${escapeHTML(item.url || '#')}" target="_blank" rel="noopener">${escapeHTML(item.title || 'Untitled')}</a>
                    </h2>
                    <p class="result-snippet">${escapeHTML(item.description || 'No description available.')}</p>
                `;
                resultsContainer.appendChild(card);
            });
        }

        function showTroubleshootingMsg(attemptedUrl, errorMsg) {
            const isHttpsHost = window.location.protocol === 'https:';
            const isHttpTarget = attemptedUrl.startsWith('http://');

            let errorHtml = `
                <div class="result-card" style="border-color: #f5c6cb;">
                    <p style="color: #721c24; font-weight: bold; margin-bottom: 0.5rem;">Connection Failed</p>
                    <p style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Attempted API Target:</strong> <code style="word-break: break-all;">${escapeHTML(attemptedUrl)}</code></p>
                    <p style="font-size: 0.9rem; margin-bottom: 1rem;"><strong>System Error:</strong> <code>${escapeHTML(errorMsg)}</code></p>
            `;

            if (isHttpsHost && isHttpTarget) {
                errorHtml += `
                    <div class="troubleshoot-box">
                        <h4>&#9888; Mixed Content Blocked</h4>
                        <p>You are accessing this search page over <strong>HTTPS</strong> (GitHub Pages), but your configured OpenSERP URL is using unsecure <strong>HTTP</strong> (localhost).</p>
                        <p><strong>How to fix this:</strong></p>
                        <ul>
                            <li><strong>Option A:</strong> Download this <code>index.html</code> file to your computer and run it locally (from your hard drive or a local HTTP server). Browsers allow local files to make HTTP requests.</li>
                            <li><strong>Option B:</strong> Secure your OpenSERP endpoint with HTTPS (using a reverse proxy like Nginx or a tunnel service like Ngrok) and update your settings endpoint to use <code>https://</code>.</li>
                        </ul>
                    </div>
                `;
            } else {
                errorHtml += `
                    <div class="troubleshoot-box">
                        <h4>&#9881; Troubleshooting Connection Checklist:</h4>
                        <ul>
                            <li>Verify that your OpenSERP instance is active and running.</li>
                            <li>Click the gear icon in the top right corner to verify the base URL configuration.</li>
                            <li>Ensure CORS policies are enabled on your OpenSERP backend server configuration.</li>
                        </ul>
                    </div>
                `;
            }

            errorHtml += `</div>`;
            statusMessage.innerHTML = errorHtml;
            statusMessage.style.display = 'block';
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
</html>
