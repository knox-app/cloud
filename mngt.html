<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F2F2F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TanmayaSangDeep OS</title>
    <style>
        :root { 
            --primary: #000000; 
            --secondary: #8E8E93;
            --accent: #007AFF; 
            --bg: #F2F2F7; 
            --surface: #FFFFFF; 
            --green: #34C759;
            --radius: 18px;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* --- RESET --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { height: 100%; height: 100dvh; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background-color: var(--bg); color: var(--primary); overflow: hidden; }

        /* --- ICONS --- */
        .icon { width: 22px; height: 22px; stroke-width: 2; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sm { width: 16px; height: 16px; }

        /* --- UTILS --- */
        .hidden { display: none !important; }
        .flex { display: flex; align-items: center; }
        .grow { flex-grow: 1; }

        /* --- LOGIN --- */
        #loginOverlay { position: absolute; inset: 0; background: rgba(242, 242, 247, 0.8); backdrop-filter: blur(20px); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--surface); padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; }
        .input-plane { width: 100%; background: var(--bg); border: none; padding: 16px; border-radius: 14px; font-size: 16px; margin-bottom: 16px; text-align: center; }
        .btn-plane { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }

        /* --- APP --- */
        #mainApp { height: 100%; display: flex; flex-direction: column; }
        .app-header { height: calc(60px + var(--safe-top)); padding: var(--safe-top) 20px 0 20px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); flex-shrink: 0; z-index: 10; }
        .brand { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .user-pill { display: flex; align-items: center; gap: 10px; background: var(--bg); padding: 4px 4px 4px 12px; border-radius: 50px; }
        
        /* --- DASHBOARD --- */
        #viewDashboard { flex: 1; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; padding-bottom: var(--safe-bottom); }
        .folder-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; position: relative; cursor: pointer; transition: transform 0.2s; box-shadow: var(--shadow); aspect-ratio: 1/1.2; display: flex; flex-direction: column; }
        .folder-card:active { transform: scale(0.97); }
        .folder-img { flex: 1; width: 100%; object-fit: cover; background: #eee; }
        .folder-meta { padding: 16px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
        .folder-title { font-size: 16px; font-weight: 600; margin: 0; }
        .badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 100px; font-size: 12px; font-weight: 700; }

        /* --- PLAYLIST --- */
        #viewPlaylist { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
        .toolbar { padding: 12px 20px; background: var(--surface); display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
        .back-btn { background: transparent; border: none; padding: 0; color: var(--accent); font-weight: 600; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .search-wrap { flex: 1; position: relative; }
        .search-input { width: 100%; background: var(--bg); border: none; padding: 10px 10px 10px 36px; border-radius: 10px; font-size: 15px; }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--secondary); width: 16px; }

        .list-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        .add-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .add-input { flex: 1; border: none; background: var(--surface); padding: 14px 20px; border-radius: 14px; font-size: 16px; box-shadow: var(--shadow); }
        .add-btn { width: 48px; background: var(--primary); border: none; border-radius: 14px; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        /* TASK ITEM */
        .task-item { background: var(--surface); padding: 12px 16px; border-radius: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.02); min-height: 60px; }
        .check-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #D1D1D6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .task-content { flex: 1; overflow: hidden; }
        
        .task-text { font-size: 16px; font-weight: 500; display: block; line-height: 1.4; }
        .extracted-date { font-size: 11px; color: var(--accent); background: #e0f2fe; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; font-weight: 600;}

        /* IMAGE THUMBNAIL IN LIST */
        .task-thumb { height: 120px; width: 100%; max-width: 200px; object-fit: cover; border-radius: 12px; margin-top: 5px; border: 1px solid rgba(0,0,0,0.1); display: block; }
        
        /* DONE STATE */
        .task-item.done { opacity: 0.6; }
        .task-item.done .check-circle { background: var(--green); border-color: var(--green); color: white; }
        .task-item.done .task-text { text-decoration: line-through; color: var(--secondary); }
        .task-item.done .task-thumb { opacity: 0.5; filter: grayscale(100%); }

        .avatar { width: 32px; height: 32px; border-radius: 50%; color: white; font-weight: 700; display: flex; justify-content: center; align-items: center; font-size: 12px; }

        /* --- IMAGE VIEWER MODAL --- */
        #imageViewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #imageViewer.active { opacity: 1; pointer-events: all; }
        
        .viewer-img { max-width: 100%; max-height: 80vh; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        .viewer-controls { position: absolute; top: var(--safe-top); right: 20px; display: flex; gap: 15px; z-index: 1001; }
        .viewer-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(10px); }
        .viewer-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.4); }

        @media (min-width: 768px) {
            .list-container { flex-direction: row; gap: 40px; }
            .col { flex: 1; display: flex; flex-direction: column; }
            .add-row { max-width: 500px; }
        }
    </style>
</head>
<body>

    <!-- ICONS -->
    <svg style="display: none;">
        <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></symbol>
        <symbol id="icon-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
        <symbol id="icon-back" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></symbol>
        <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></symbol>
        <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></symbol>
        <symbol id="icon-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></symbol>
        <symbol id="icon-close" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></symbol>
        <symbol id="icon-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></symbol>
    </svg>

    <!-- IMAGE VIEWER OVERLAY -->
    <div id="imageViewer">
        <div class="viewer-controls">
            <button class="viewer-btn" id="btnDownloadImg" title="Download">
                <svg class="icon"><use href="#icon-download"></use></svg>
            </button>
            <button class="viewer-btn" id="btnCloseImg" title="Close">
                <svg class="icon"><use href="#icon-close"></use></svg>
            </button>
        </div>
        <img id="fullScreenImage" class="viewer-img" src="">
    </div>

    <!-- LOGIN -->
    <div id="loginOverlay">
        <div class="login-card">
            <h1>TanmayaSangDeep</h1>
            <p style="color:var(--secondary);">Staff Operations System</p>
            <input type="text" id="inputStaffName" class="input-plane" placeholder="Enter your first name">
            <button id="btnLogin" class="btn-plane">Start Session</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">
        <header class="app-header">
            <div class="brand">TanmayaSangDeep</div>
            <div class="user-pill">
                <div id="headerAvatar"></div>
                <span class="user-name" id="displayUserName">Guest</span>
                <div class="logout-btn" id="btnLogout">
                    <svg class="icon icon-sm"><use href="#icon-logout"></use></svg>
                </div>
            </div>
        </header>

        <div id="viewDashboard">
            <h2 style="margin: 0 0 20px 0; font-size:24px;">Dashboard</h2>
            <div class="grid" id="gridContainer"></div>
        </div>

        <div id="viewPlaylist" class="hidden">
            <div class="toolbar">
                <button class="back-btn" id="btnBack">
                    <svg class="icon"><use href="#icon-back"></use></svg> Back
                </button>
                <div class="search-wrap">
                    <svg class="icon search-icon"><use href="#icon-search"></use></svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Filter tasks...">
                </div>
            </div>

            <div class="list-container">
                <div class="col grow">
                    <div class="add-row">
                        <input type="text" id="newItemInput" class="add-input" placeholder="Type task or Paste Image URL...">
                        <button id="btnAddItem" class="add-btn">
                            <svg class="icon"><use href="#icon-plus"></use></svg>
                        </button>
                    </div>
                    <div class="section-title">
                        <span>Pending Tasks</span>
                        <span id="pendingCountBadge" class="badge">0</span>
                    </div>
                    <div id="listPending"></div>
                </div>
                <div class="col grow">
                    <div class="section-title" style="margin-top: 30px;">
                        <span>Recently Completed</span>
                    </div>
                    <div id="listCompleted"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", authDomain: "question-metabase.firebaseapp.com", databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "question-metabase", storageBucket: "question-metabase.firebasestorage.app", messagingSenderId: "770698198753", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0", measurementId: "G-6ZP1FPMKSJ" };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = localStorage.getItem('staffName');
        let currentItems = []; 
        let currentCategoryId = null; 
        let unsubscribe = null;

        if(currentUser) initAuth();

        document.getElementById('btnLogin').onclick = () => {
            const val = document.getElementById('inputStaffName').value.trim();
            if(val) { currentUser = val; localStorage.setItem('staffName', val); initAuth(); }
        };
        document.getElementById('btnLogout').onclick = () => { localStorage.removeItem('staffName'); location.reload(); };

        function initAuth() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayUserName').textContent = currentUser;
            document.getElementById('headerAvatar').innerHTML = getAvatarHTML(currentUser, '24px');
            loadDashboard();
        }

        function getAvatarHTML(name, size='32px') {
            if(!name) return '';
            const initials = name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
            let hash = 0;
            for (let i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
            const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
            const color = '#' + "00000".substring(0, 6 - c.length) + c;
            return `<div class="avatar" style="background-color:${color}; width:${size}; height:${size};">${initials}</div>`;
        }

        function loadDashboard() {
            document.getElementById('viewPlaylist').classList.add('hidden');
            document.getElementById('viewDashboard').classList.remove('hidden');
            if(unsubscribe) unsubscribe();

            onSnapshot(collection(db, "categories"), (catSnap) => {
                onSnapshot(query(collection(db, "store_items"), where("status", "==", "pending")), (itemSnap) => {
                    const counts = {};
                    itemSnap.forEach(d => { const cid = d.data().categoryId; counts[cid] = (counts[cid] || 0) + 1; });
                    const grid = document.getElementById('gridContainer');
                    grid.innerHTML = '';
                    catSnap.forEach(d => {
                        const cat = d.data();
                        const cnt = counts[d.id] || 0;
                        const div = document.createElement('div');
                        div.className = 'folder-card';
                        div.innerHTML = `<img src="${cat.image}" class="folder-img" onerror="this.src='https://via.placeholder.com/300'"><div class="folder-meta"><h3 class="folder-title">${cat.name}</h3>${cnt > 0 ? `<div class="badge">${cnt}</div>` : ''}</div>`;
                        div.onclick = () => loadPlaylist(d.id, cat.name);
                        grid.appendChild(div);
                    });
                });
            });
        }

        function loadPlaylist(catId, catName) {
            currentCategoryId = catId;
            document.getElementById('viewDashboard').classList.add('hidden');
            document.getElementById('viewPlaylist').classList.remove('hidden');
            document.getElementById('searchInput').value = '';
            document.getElementById('newItemInput').value = '';
            const q = query(collection(db, "store_items"), where("categoryId", "==", catId));
            unsubscribe = onSnapshot(q, (snapshot) => {
                currentItems = [];
                snapshot.forEach(doc => { currentItems.push({ id: doc.id, ...doc.data() }); });
                renderItems(currentItems);
            });
        }

        // --- IMAGE & DATE HELPERS ---
        function isImageUrl(url) {
            return (url.match(/^https?:\/\/.*\/.*\.(jpeg|jpg|gif|png|webp|svg)$/i) != null);
        }

        function extractDateValue(str) {
            const match = str.match(/(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})/);
            if(match) {
                let day = parseInt(match[1]), month = parseInt(match[2]) - 1, year = parseInt(match[3]);
                if(year < 100) year += 2000;
                return new Date(year, month, day).getTime();
            }
            return null;
        }

        function formatDateDisplay(str) {
            const match = str.match(/(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})/);
            return match ? match[0] : null;
        }

        function renderItems(items) {
            const listP = document.getElementById('listPending');
            const listC = document.getElementById('listCompleted');
            listP.innerHTML = ''; listC.innerHTML = '';

            const pendingItems = items.filter(i => i.status !== 'completed');
            const completedItems = items.filter(i => i.status === 'completed');

            pendingItems.sort((a, b) => {
                const dateA = extractDateValue(a.name);
                const dateB = extractDateValue(b.name);
                if (dateA && dateB) return dateA - dateB;
                if (dateA && !dateB) return -1;
                if (!dateA && dateB) return 1;
                return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
            });
            
            completedItems.sort((a, b) => (b.completedAt?.seconds || 0) - (a.completedAt?.seconds || 0));

            // RENDER ITEM HELPER
            const createItemEl = (item, isDone) => {
                const isImg = isImageUrl(item.name);
                const hasDate = !isImg && extractDateValue(item.name) !== null;
                const who = item.completedBy || 'Unknown';
                
                const div = document.createElement('div');
                div.className = `task-item ${isDone ? 'done' : ''}`;
                
                let contentHTML = '';
                if(isImg) {
                    contentHTML = `<img src="${item.name}" class="task-thumb" alt="Task Image" loading="lazy">`;
                } else {
                    contentHTML = `<span class="task-text">${item.name}</span>${hasDate ? `<span class="extracted-date">📅 ${formatDateDisplay(item.name)}</span>` : ''}`;
                }

                div.innerHTML = `
                    <div class="check-circle">${isDone ? '<svg class="icon icon-sm" style="color:white;"><use href="#icon-check"></use></svg>' : ''}</div>
                    <div class="task-content">
                        ${contentHTML}
                        ${isDone ? `<div style="font-size:12px; margin-top:5px; color:var(--secondary);">Done by <b>${who === currentUser ? 'You' : who}</b></div>` : ''}
                    </div>
                    ${!isDone && !isImg ? `<button class="viewer-btn" style="width:30px; height:30px; background:transparent; border:none; color:var(--secondary);" onclick="event.stopPropagation(); editTaskName('${item.id}', '${item.name}')"><svg class="icon icon-sm"><use href="#icon-edit"></use></svg></button>` : ''}
                `;

                // CLICK LOGIC
                div.onclick = (e) => toggleStatus(item, isDone);
                
                // IMAGE CLICK (Open Viewer)
                if(isImg) {
                    const imgEl = div.querySelector('img');
                    if(imgEl) {
                        imgEl.onclick = (e) => {
                            e.stopPropagation(); // Don't complete task
                            openImageViewer(item.name);
                        };
                    }
                }

                return div;
            };

            pendingItems.forEach(item => listP.appendChild(createItemEl(item, false)));
            completedItems.forEach(item => listC.appendChild(createItemEl(item, true)));
            
            document.getElementById('pendingCountBadge').textContent = pendingItems.length;
        }

        // --- IMAGE VIEWER LOGIC ---
        const viewer = document.getElementById('imageViewer');
        const fullImg = document.getElementById('fullScreenImage');
        const btnDownload = document.getElementById('btnDownloadImg');
        const btnClose = document.getElementById('btnCloseImg');

        function openImageViewer(src) {
            fullImg.src = src;
            viewer.classList.add('active');
            
            // Handle Download
            btnDownload.onclick = async (e) => {
                e.stopPropagation();
                try {
                    const response = await fetch(src);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `task-image-${Date.now()}.jpg`; 
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                } catch (err) {
                    // Fallback for CORS issues
                    window.open(src, '_blank');
                }
            };
        }

        function closeViewer() {
            viewer.classList.remove('active');
            setTimeout(() => fullImg.src = '', 300);
        }

        btnClose.onclick = closeViewer;
        viewer.onclick = closeViewer; // Click outside to close

        // --- APP LOGIC ---
        async function toggleStatus(item, isDone) {
            try { await updateDoc(doc(db, "store_items", item.id), { status: isDone ? 'pending' : 'completed', completedBy: isDone ? null : currentUser, completedAt: serverTimestamp() }); } catch(e) { console.error(e); }
        }

        window.editTaskName = async function(id, oldName) {
            const newName = prompt("Rename task:", oldName);
            if(newName && newName.trim() !== "" && newName !== oldName) {
                try { await updateDoc(doc(db, "store_items", id), { name: newName.trim() }); } catch(e) { console.error(e); }
            }
        };

        document.getElementById('btnAddItem').onclick = async () => {
            const input = document.getElementById('newItemInput');
            const val = input.value.trim();
            if(!val || !currentCategoryId) return;
            try { await addDoc(collection(db, "store_items"), { name: val, categoryId: currentCategoryId, status: 'pending', createdAt: serverTimestamp(), createdBy: currentUser }); input.value = ''; } catch(e) { console.error(e); }
        };

        document.getElementById('newItemInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('btnAddItem').click(); });
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const term = e.target.value.toLowerCase();
            renderItems(currentItems.filter(item => item.name.toLowerCase().includes(term)));
        });
        document.getElementById('btnBack').onclick = loadDashboard;
    </script>
</body>
</html>
