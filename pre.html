<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Previewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1014;
            --text-main: #ffffff;
            --text-dim: #8f98b2;
            --accent: #1f80e0;
            --btn-gray: #252833;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden;
        }

        /* Hero */
        .hero { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .hero img, .hero video { width: 100%; height: 100%; object-fit: cover; }
        .hero-fade {
            position: absolute; bottom: 0; width: 100%; height: 70%;
            background: linear-gradient(to top, var(--bg) 10%, transparent 100%);
        }

        /* Info */
        .header { padding: 0 16px; text-align: center; margin-top: -30px; position: relative; z-index: 10; }
        .logo { max-width: 180px; max-height: 60px; margin-bottom: 5px; object-fit: contain; }
        .blue-tag { color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .meta { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }

        /* Buttons */
        .btn-box { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
        .btn-main {
            background: #e1e6f0; color: #000; border: none; padding: 14px;
            border-radius: 8px; font-weight: 800; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Toolbar */
        .actions { display: flex; justify-content: space-around; padding: 25px 0 15px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
        .action-item i { font-size: 22px; color: #fff; }

        /* EPISODES - Screenshot Match */
        .section-title { padding: 20px 16px 10px; font-size: 18px; font-weight: 700; }
        .ep-list.collapsed .ep-card:nth-child(n+5) { display: none; }
        .ep-card {
            display: flex; gap: 12px; padding: 12px 16px; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .ep-thumb-wrapper { position: relative; width: 140px; min-width: 140px; aspect-ratio: 16/9; }
        .ep-thumb { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
        .ep-info { flex: 1; overflow: hidden; }
        .ep-info h4 { margin: 0; font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ep-info p { margin: 4px 0 0; font-size: 12px; color: var(--text-dim); }
        .ep-download { color: var(--text-dim); font-size: 20px; }

        .view-more-container { padding: 10px; text-align: center; }
        .view-more-btn { background: var(--btn-gray); color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 12px; }

        /* Scrollers */
        .scroller { display: flex; overflow-x: auto; gap: 12px; padding: 0 16px 20px; }
        .scroller::-webkit-scrollbar { display: none; }
        .post-card { min-width: 110px; width: 110px; }
        .post-card img { width: 100%; aspect-ratio: 2/3; border-radius: 8px; object-fit: cover; }
        .trail-card { min-width: 180px; width: 180px; }
        .trail-card img { width: 100%; aspect-ratio: 16/9; border-radius: 8px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app">
        <div class="hero">
            <div id="visual"><img id="poster" src=""></div>
            <div class="hero-fade"></div>
        </div>

        <div class="header">
            <img id="logo" src="" class="logo">
            <div id="blueTag" class="blue-tag"></div>
            <div id="meta" class="meta"></div>
        </div>

        <div class="btn-box" id="playBtns"></div>

        <div class="actions">
            <div class="action-item"><i class="fa-solid fa-plus"></i><span>Watchlist</span></div>
            <div class="action-item"><i class="fa-solid fa-share-nodes"></i><span>Share</span></div>
            <div class="action-item"><i class="fa-solid fa-download"></i><span>Download</span></div>
            <div class="action-item"><i class="fa-solid fa-heart"></i><span>Rate</span></div>
        </div>

        <!-- Episodes Section -->
        <div id="epSection" class="hidden">
            <div class="section-title">Episodes</div>
            <div id="epList" class="ep-list collapsed"></div>
            <div class="view-more-container">
                <button id="vmBtn" class="view-more-btn hidden">View More</button>
            </div>
        </div>

        <div class="section-title">More Like This</div>
        <div class="scroller" id="recGrid"></div>

        <div class="section-title">Trailers & More</div>
        <div class="scroller" id="trailGrid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const subId = new URLSearchParams(window.location.search).get('subdomain') || window.location.search.split('=')[1];

        async function start() {
            if(!subId) return console.error("No subdomain in URL");
            
            const q = query(collection(db, "media_content"), where("subdomain", "==", subId));
            const snap = await getDocs(q);
            
            if(snap.empty) return console.error("Content not found");
            
            const data = snap.docs[0].data();
            console.log("Full Data Object:", data);
            renderUI(data);
        }

        function renderUI(data) {
            // Hero
            document.getElementById('poster').src = data.chooserImg || data.thumbnail;
            
            // Meta
            document.getElementById('logo').src = data.logo;
            document.getElementById('blueTag').innerText = data.blueTags?.[0] || "";
            document.getElementById('meta').innerText = `${data.year} • ${data.ageRating} • ${data.seasons?.length || 0} Season • ${data.languages?.length || 0} Languages`;

            // Play Buttons
            document.getElementById('playBtns').innerHTML = `<button class="btn-main"><i class="fa-solid fa-play"></i> Watch Now</button>`;

            // --- EPISODES LOGIC ---
            if (data.seasons && Array.isArray(data.seasons) && data.seasons.length > 0) {
                const epSection = document.getElementById('epSection');
                const epList = document.getElementById('epList');
                const episodes = data.seasons[0].episodes;

                if (episodes && episodes.length > 0) {
                    console.log("Found Episodes:", episodes.length);
                    epSection.classList.remove('hidden');
                    epList.innerHTML = ""; // Clear
                    
                    episodes.forEach((ep) => {
                        const card = document.createElement('div');
                        card.className = 'ep-card';
                        card.innerHTML = `
                            <div class="ep-thumb-wrapper">
                                <img src="${ep.thumbnail}" class="ep-thumb">
                            </div>
                            <div class="ep-info">
                                <h4>${ep.title}</h4>
                                <p>S1 E${ep.episodeNo} • ${ep.releasedDate || ''}</p>
                            </div>
                            <i class="fa-solid fa-download ep-download"></i>
                        `;
                        epList.appendChild(card);
                    });

                    if (episodes.length > 4) {
                        const vm = document.getElementById('vmBtn');
                        vm.classList.remove('hidden');
                        vm.onclick = () => {
                            epList.classList.toggle('collapsed');
                            vm.innerText = epList.classList.contains('collapsed') ? "View More" : "View Less";
                        };
                    }
                }
            }

            // --- TRAILERS LOGIC ---
            if (data.trailers && data.trailers.length > 0) {
                const tGrid = document.getElementById('trailGrid');
                data.trailers.forEach((t, i) => {
                    tGrid.innerHTML += `<div class="trail-card"><img src="${data.thumbnail}"><p>Trailer ${i+1}</p></div>`;
                });
            }

            // --- RECS LOGIC ---
            if (data.genres) fetchRecs(data.genres);
        }

        async function fetchRecs(genres) {
            const q = query(collection(db, "media_content"), where("genres", "array-contains-any", genres));
            const snap = await getDocs(q);
            const grid = document.getElementById('recGrid');
            snap.forEach(doc => {
                if(doc.data().subdomain !== subId) {
                    grid.innerHTML += `<div class="post-card" onclick="location.search='?subdomain=${doc.data().subdomain}'"><img src="${doc.data().thumbnail}"></div>`;
                }
            });
        }

        start();
    </script>
</body>
</html>
