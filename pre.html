<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Previewer</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f1014;
            --text-main: #ffffff;
            --text-dim: #8f98b2;
            --accent-blue: #1f80e0;
            --btn-bg: #e1e6f0;
            --card-bg: #1a1c21;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            user-select: none;
        }

        .preview-container {
            max-width: 500px; /* Mobile View style */
            margin: 0 auto;
            padding-bottom: 80px;
            background: var(--bg-color);
            min-height: 100vh;
        }

        /* 1. Hero Section */
        .hero-section {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
        }

        #mediaContainer {
            width: 100%;
            height: 100%;
        }

        #mediaContainer img, #mediaContainer video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        #trailerOverlay {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        /* 2. Content Logo & Info */
        .content-header {
            padding: 20px 15px 10px;
            text-align: center;
        }

        .content-logo {
            max-width: 220px;
            max-height: 90px;
            object-fit: contain;
            display: block;
            margin: 0 auto 10px;
        }

        .blue-tag {
            color: var(--accent-blue);
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .meta-info {
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        /* 3. Dynamic Play Buttons */
        .button-group {
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-btn {
            background: var(--btn-bg);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sec-btn {
            background: rgba(255,255,255,0.08);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* 4 & 5. Tags & Description */
        .genre-tags {
            padding: 15px;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 700;
            word-spacing: 5px;
        }

        .description {
            padding: 0 15px;
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* 6. Action Bar */
        .action-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px;
            border-bottom: 1px solid #252833;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-dim);
            position: relative;
            cursor: pointer;
        }

        .action-item i { font-size: 20px; color: #fff; }

        /* Rate Menu */
        .rate-menu {
            display: none;
            position: absolute;
            bottom: 50px;
            background: #252833;
            border-radius: 8px;
            width: 120px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .action-item:hover .rate-menu { display: block; }
        .rate-menu span { display: block; padding: 5px 0; font-size: 13px; color: white; }

        /* Sections */
        .section { padding: 20px 15px; }
        .section h3 { font-size: 18px; margin-bottom: 15px; }

        /* 7. Episode List */
        .episodes-container.collapsed .episode-card:nth-child(n+5) {
            display: none;
        }

        .episode-card {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .ep-thumb-wrapper {
            position: relative;
            width: 140px;
            min-width: 140px;
            aspect-ratio: 16/9;
        }

        .ep-thumb {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            object-fit: cover;
        }

        .ep-info h4 { margin: 0 0 5px 0; font-size: 15px; }
        .ep-info p { margin: 0; font-size: 12px; color: var(--text-dim); }

        .view-more-btn {
            width: 100%;
            background: #252833;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* 8. More Like This */
        .grid-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 10px;
        }
        .grid-scroll::-webkit-scrollbar { display: none; }

        .rec-card {
            min-width: 110px;
            width: 110px;
        }

        .rec-card img {
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 6px;
            object-fit: cover;
        }

        /* 9. Trailers & More */
        .trailers-grid {
            display: flex;
            overflow-x: auto;
            gap: 15px;
        }
        .trailer-item { min-width: 200px; }
        .trailer-item img { width: 100%; border-radius: 8px; aspect-ratio: 16/9; object-fit: cover; }
        .trailer-item p { font-size: 13px; margin-top: 8px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app" class="preview-container">
        <!-- 1. Top Media Section -->
        <div class="hero-section" id="heroSection">
            <div id="mediaContainer">
                <img id="mainPoster" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" alt="">
                <div id="trailerOverlay" class="hidden">Trailer Unavailable</div>
            </div>
            <button class="back-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- 2. Content Logo & Info -->
        <div class="content-header">
            <img id="contentLogo" src="" alt="" class="content-logo">
            <p id="blueTag" class="blue-tag"></p>
            <div class="meta-info">
                <span id="year"></span> • <span id="ageRating"></span> • <span id="duration"></span> • <span id="languages"></span>
            </div>
        </div>

        <!-- 3. Dynamic Play Buttons -->
        <div class="button-group" id="primaryButtons">
            <!-- Loading State -->
            <button class="main-btn">Loading Content...</button>
        </div>

        <!-- 4. Genres/Tags -->
        <div class="genre-tags" id="genreContainer"></div>

        <!-- 5. Description -->
        <p class="description" id="description"></p>

        <!-- 6. Action Buttons -->
        <div class="action-bar">
            <div class="action-item"><i class="fa-solid fa-plus"></i><span>Watchlist</span></div>
            <div class="action-item"><i class="fa-solid fa-share-nodes"></i><span>Share</span></div>
            <div class="action-item"><i class="fa-solid fa-download"></i><span>Download</span></div>
            <div class="action-item" id="rateBtn">
                <i class="fa-solid fa-heart"></i><span>Rate</span>
                <div class="rate-menu" id="rateMenu">
                    <span>🚫 Not for me</span>
                    <span>👍 Like</span>
                    <span>❤️ Love</span>
                </div>
            </div>
        </div>

        <!-- 7. Episodes Section (Dynamic) -->
        <div id="episodesSection" class="section hidden">
            <h3 id="seasonTitle">Season 1</h3>
            <div id="episodesList" class="episodes-container collapsed"></div>
            <button id="viewMoreBtn" class="view-more-btn hidden">View More</button>
        </div>

        <!-- 8. More Like This -->
        <div class="section">
            <h3>More Like This</h3>
            <div class="grid-scroll" id="recommendations"></div>
        </div>

        <!-- 9. Trailers & More -->
        <div class="section">
            <h3>Trailers & More</h3>
            <div class="trailers-grid" id="trailersContainer"></div>
        </div>
    </div>

    <!-- Firebase Integration Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get subdomain from URL preview?=subdomain or preview?subdomain=...
        const urlParams = new URLSearchParams(window.location.search);
        let subdomain = urlParams.get('subdomain') || window.location.search.replace('?', '').split('=')[1];

        async function fetchContent() {
            if (!subdomain) {
                document.getElementById('primaryButtons').innerHTML = "No content specified.";
                return;
            }

            try {
                const q = query(collection(db, "media_content"), where("subdomain", "==", subdomain));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    document.getElementById('primaryButtons').innerHTML = "Content not found.";
                    return;
                }

                const data = querySnapshot.docs[0].data();
                renderUI(data);
            } catch (error) {
                console.error("Error fetching firebase:", error);
            }
        }

        function renderUI(data) {
            // 1. Trailer Logic (3-4 seconds delay)
            const mainPoster = document.getElementById('mainPoster');
            mainPoster.src = data.chooserImg || data.thumbnail;
            
            setTimeout(() => {
                const mediaContainer = document.getElementById('mediaContainer');
                if (data.trailers && data.trailers.length > 0 && data.trailers[0].length > 5) {
                    mediaContainer.innerHTML = `<video src="${data.trailers[0]}" autoplay muted playsinline controls></video>`;
                } else {
                    document.getElementById('trailerOverlay').classList.remove('hidden');
                    document.getElementById('trailerOverlay').innerText = "Trailer Unavailable";
                }
            }, 3500);

            // 2. Logo & Metadata
            document.getElementById('contentLogo').src = data.logo;
            document.getElementById('blueTag').innerText = data.blueTags?.[0] || "";
            document.getElementById('year').innerText = data.year;
            document.getElementById('ageRating').innerText = data.ageRating;
            document.getElementById('duration').innerText = data.duration || (data.seasons ? `${data.seasons.length} Season` : "");
            document.getElementById('languages').innerText = `${data.languages?.length || 0} Languages`;

            // 3. Play Button Mindsets
            renderPlayButtons(data);

            // 4 & 5. Tags & Description
            document.getElementById('genreContainer').innerText = data.genres?.join(' • ') || "";
            document.getElementById('description').innerText = data.description;

            // 7. Episodes Logic (For Series)
            if (data.type === "Series" && data.seasons) {
                const epSection = document.getElementById('episodesSection');
                const epList = document.getElementById('episodesList');
                epSection.classList.remove('hidden');
                
                let episodes = data.seasons[0].episodes || [];
                episodes.forEach((ep, i) => {
                    const card = document.createElement('div');
                    card.className = 'episode-card';
                    card.innerHTML = `
                        <div class="ep-thumb-wrapper">
                            <img src="${ep.thumbnail}" class="ep-thumb">
                            <div style="position:absolute; bottom:5px; left:5px; background:rgba(0,0,0,0.7); font-size:10px; padding:2px 5px;">EP ${i+1}</div>
                        </div>
                        <div class="ep-info">
                            <h4>${ep.title || 'Episode ' + (i+1)}</h4>
                            <p>${data.year} • 35m</p>
                        </div>
                    `;
                    epList.appendChild(card);
                });

                if (episodes.length > 4) {
                    const vmBtn = document.getElementById('viewMoreBtn');
                    vmBtn.classList.remove('hidden');
                    vmBtn.onclick = () => {
                        epList.classList.toggle('collapsed');
                        vmBtn.innerText = epList.classList.contains('collapsed') ? "View More" : "View Less";
                    };
                }
            }

            // 8. More Like This (Based on Genres)
            fetchRecommendations(data.genres, data.subdomain);

            // 9. Trailers & More Section
            if(data.trailers) {
                const trailerCont = document.getElementById('trailersContainer');
                data.trailers.forEach((t, i) => {
                    const div = document.createElement('div');
                    div.className = 'trailer-item';
                    div.innerHTML = `
                        <img src="${data.thumbnail}">
                        <p>${data.title} - Trailer ${i+1}</p>
                    `;
                    trailerCont.appendChild(div);
                });
            }
        }

        function renderPlayButtons(data) {
            const container = document.getElementById('primaryButtons');
            // Mock local storage check for "Resume" logic
            const history = JSON.parse(localStorage.getItem('user_history') || '{}');
            const progress = history[data.subdomain];

            let mainBtnHtml = "";
            let subBtnHtml = "";

            if (data.type === "Series") {
                if (!progress) {
                    mainBtnHtml = `<button class="main-btn"><i class="fa-solid fa-play"></i> Watch Latest Episode</button>`;
                } else {
                    mainBtnHtml = `<button class="main-btn"><i class="fa-solid fa-play"></i> Resume S${progress.s} E${progress.e}</button>`;
                    subBtnHtml = `<button class="sec-btn">Watch From Beginning</button>`;
                }
            } else {
                // Movie Logic
                if (!progress) {
                    mainBtnHtml = `<button class="main-btn"><i class="fa-solid fa-play"></i> Watch Now</button>`;
                } else {
                    mainBtnHtml = `<button class="main-btn"><i class="fa-solid fa-play"></i> Resume Watching</button>`;
                    subBtnHtml = `<button class="sec-btn">Watch From Beginning</button>`;
                }
            }

            container.innerHTML = mainBtnHtml + subBtnHtml;
        }

        async function fetchRecommendations(genres, currentSub) {
            const recContainer = document.getElementById('recommendations');
            if(!genres) return;
            
            const q = query(collection(db, "media_content"), where("genres", "array-contains-any", genres));
            const snap = await getDocs(q);
            
            snap.forEach(doc => {
                const item = doc.data();
                if(item.subdomain !== currentSub) {
                    const div = document.createElement('div');
                    div.className = 'rec-card';
                    div.innerHTML = `<img src="${item.thumbnail}">`;
                    div.onclick = () => window.location.search = `?subdomain=${item.subdomain}`;
                    recContainer.appendChild(div);
                }
            });
        }

        fetchContent();
    </script>
</body>
  </html>
