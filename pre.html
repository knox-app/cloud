<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotstar Pro Previewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1014;
            --surface: #1a1c21;
            --text-main: #ffffff;
            --text-dim: #8f98b2;
            --accent: #1f80e0;
            --btn-gray: #252833;
            --white: #e1e6f0;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden;
        }

        /* 1. Hero Player */
        .hero { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; z-index: 10; }
        #mediaBox { width: 100%; height: 100%; }
        #mediaBox img, #mediaBox video { width: 100%; height: 100%; object-fit: cover; }
        .hero-fade {
            position: absolute; bottom: 0; width: 100%; height: 70%;
            background: linear-gradient(to top, var(--bg) 15%, transparent 100%);
            pointer-events: none;
        }
        .trailer-tag {
            position: absolute; top: 12px; left: 12px; font-size: 10px; font-weight: 800;
            background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px;
        }

        /* 2. Content Info */
        .content-wrap { padding: 0 16px; margin-top: -35px; position: relative; z-index: 11; text-align: center; }
        .logo-img { max-width: 200px; max-height: 70px; margin-bottom: 8px; object-fit: contain; }
        .blue-tag { color: var(--accent); font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        .meta { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }

        /* 3. Buttons */
        .btn-stack { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }
        .btn-main {
            background: var(--white); color: #000; border: none; padding: 14px;
            border-radius: 8px; font-weight: 800; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer;
        }
        .btn-sec {
            background: rgba(255,255,255,0.1); color: #fff; border: none;
            padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }

        /* 4 & 5. Description */
        .genres { padding: 25px 16px 8px; font-size: 13px; font-weight: 700; color: var(--text-dim); }
        .desc { padding: 0 16px 20px; font-size: 14px; color: var(--text-dim); line-height: 1.5; }

        /* 6. Toolbar */
        .actions { display: flex; justify-content: space-around; padding: 10px 0 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); cursor: pointer; background:none; border:none; }
        .action-item i { font-size: 22px; color: #fff; }

        /* 7. Episodes Inline */
        .section-title { padding: 25px 16px 15px; font-size: 18px; font-weight: 700; color: #fff; }
        .ep-card { display: flex; gap: 12px; padding: 12px 16px; align-items: center; cursor: pointer; }
        .ep-thumb-box { position: relative; width: 140px; min-width: 140px; aspect-ratio: 16/9; }
        .ep-thumb { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
        .ep-info { flex: 1; overflow: hidden; }
        .ep-info h4 { margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ep-info p { margin: 4px 0 0; font-size: 12px; color: var(--text-dim); }
        
        .view-more-btn {
            width: calc(100% - 32px); margin: 10px 16px; background: var(--btn-gray);
            color: #fff; border: none; padding: 12px; border-radius: 25px; font-weight: 700; cursor: pointer;
        }

        /* FULL SCREEN EPISODES MODAL */
        .full-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none;
            flex-direction: column; overflow-y: auto;
        }
        .modal-header {
            position: sticky; top: 0; background: var(--bg); padding: 15px;
            display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #252833; z-index: 10;
        }
        .modal-header h3 { margin: 0; font-size: 18px; }
        .modal-header button { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }

        /* 8 & 9. Scrollers */
        .scroller { display: flex; overflow-x: auto; gap: 12px; padding: 0 16px 30px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        .post-card { min-width: 110px; width: 110px; flex-shrink: 0; cursor: pointer; }
        .post-card img { width: 100%; aspect-ratio: 2/3; border-radius: 8px; object-fit: cover; }

        .trail-card { min-width: 200px; width: 200px; flex-shrink: 0; cursor: pointer; }
        .trail-card img { width: 100%; aspect-ratio: 16/9; border-radius: 8px; margin-bottom: 8px; }
        .trail-card p { margin: 0; font-size: 13px; font-weight: 500; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app">
        <!-- Main Player -->
        <div class="hero">
            <div id="mediaBox">
                <img id="mainPoster" src="">
            </div>
            <div class="hero-fade"></div>
            <div id="statusTag" class="trailer-tag">PREVIEW</div>
        </div>

        <!-- Info Section -->
        <div class="content-wrap">
            <img id="logo" src="" class="logo-img">
            <div id="blueTag" class="blue-tag"></div>
            <div id="meta" class="meta"></div>
        </div>

        <!-- Buttons -->
        <div class="btn-stack" id="btnArea"></div>

        <div class="genres" id="genreList"></div>
        <p class="desc" id="description"></p>

        <!-- Actions -->
        <div class="actions">
            <button class="action-item"><i class="fa-solid fa-plus"></i><span>Watchlist</span></button>
            <button class="action-item" onclick="share()"><i class="fa-solid fa-share-nodes"></i><span>Share</span></button>
            <button class="action-item"><i class="fa-solid fa-download"></i><span>Download</span></button>
            <button class="action-item"><i class="fa-solid fa-heart"></i><span>Rate</span></button>
        </div>

        <!-- Inline Episodes (Previews first 4) -->
        <div id="epSection" class="hidden">
            <div class="section-title">Episodes</div>
            <div id="epListInline"></div>
            <button id="viewMoreTrigger" class="view-more-btn hidden">View More</button>
        </div>

        <!-- Recommendations -->
        <div class="section-title">More Like This</div>
        <div class="scroller" id="recGrid"></div>

        <!-- Trailers & More -->
        <div class="section-title">Trailers & More</div>
        <div class="scroller" id="trailGrid"></div>
    </div>

    <!-- FULL SCREEN EPISODE OVERLAY -->
    <div id="fullEpModal" class="full-modal">
        <div class="modal-header">
            <button onclick="toggleModal(false)"><i class="fa-solid fa-arrow-left"></i></button>
            <h3 id="modalTitle">All Episodes</h3>
        </div>
        <div id="modalList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const subId = new URLSearchParams(window.location.search).get('subdomain') || window.location.search.split('=')[1];

        async function start() {
            if(!subId) return;
            const q = query(collection(db, "media_content"), where("subdomain", "==", subId));
            const snap = await getDocs(q);
            if(snap.empty) return;
            render(snap.docs[0].data());
        }

        function render(data) {
            // Hero Logic
            const poster = document.getElementById('mainPoster');
            poster.src = data.chooserImg || data.thumbnail;
            
            setTimeout(() => {
                if(data.trailers?.[0]) {
                    playVideo(data.trailers[0], true);
                    document.getElementById('statusTag').innerText = "TRAILER";
                }
            }, 3500);

            // Metadata
            document.getElementById('logo').src = data.logo;
            document.getElementById('blueTag').innerText = data.blueTags?.[0] || "";
            document.getElementById('meta').innerText = `${data.year} • ${data.ageRating} • ${data.seasons?.length || 1} Season • ${data.languages?.length || 0} Languages`;
            document.getElementById('genreList').innerText = Array.isArray(data.genres) ? data.genres.join(' • ') : data.genres;
            document.getElementById('description').innerText = data.description;

            // Play Button Mindsets
            const btnArea = document.getElementById('btnArea');
            const history = JSON.parse(localStorage.getItem('watch_history') || '{}')[subId];
            
            if(data.type === "Series") {
                btnArea.innerHTML = history ? 
                    `<button class="btn-main" onclick="playVideo('${data.seasons[0].episodes[history.e-1].url}')"><i class="fa-solid fa-play"></i> Resume S${history.s} E${history.e}</button><button class="btn-sec">Watch From Beginning</button>` :
                    `<button class="btn-main"><i class="fa-solid fa-play"></i> Watch Latest Episode</button>`;
            } else {
                btnArea.innerHTML = history ? `<button class="btn-main"><i class="fa-solid fa-play"></i> Resume Watching</button><button class="btn-sec">Watch From Beginning</button>` : `<button class="btn-main"><i class="fa-solid fa-play"></i> Watch Now</button>`;
            }

            // Episodes Rendering
            if(data.seasons && data.seasons[0]?.episodes) {
                const episodes = data.seasons[0].episodes;
                document.getElementById('epSection').classList.remove('hidden');
                
                // Show only first 4 inline
                const inlineList = document.getElementById('epListInline');
                episodes.slice(0, 4).forEach(ep => inlineList.innerHTML += createEpCard(ep, data.year));

                // Populate Modal with ALL episodes
                const modalList = document.getElementById('modalList');
                episodes.forEach(ep => modalList.innerHTML += createEpCard(ep, data.year));

                if(episodes.length > 4) {
                    const vm = document.getElementById('viewMoreTrigger');
                    vm.classList.remove('hidden');
                    vm.onclick = () => toggleModal(true);
                }
            }

            // Clickable Trailers & More
            if(data.trailers) {
                const tg = document.getElementById('trailGrid');
                data.trailers.forEach((t, i) => {
                    const card = document.createElement('div');
                    card.className = 'trail-card';
                    card.innerHTML = `<img src="${data.thumbnail}"><p>${data.title} - Trailer ${i+1}</p>`;
                    card.onclick = () => {
                        playVideo(t, false);
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    };
                    tg.appendChild(card);
                });
            }

            loadRecs(data.genres);
        }

        function createEpCard(ep, year) {
            return `
                <div class="ep-card" onclick="playVideo('${ep.url}', false)">
                    <div class="ep-thumb-box">
                        <img src="${ep.thumbnail}" class="ep-thumb">
                        <div style="position:absolute; bottom:5px; left:5px; background:rgba(0,0,0,0.6); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:8px;"><i class="fa-solid fa-play"></i></div>
                    </div>
                    <div class="ep-info">
                        <h4>${ep.title}</h4>
                        <p>E${ep.episodeNo} • ${year} • 35m</p>
                    </div>
                    <i class="fa-solid fa-download" style="color:var(--text-dim); font-size:18px;"></i>
                </div>
            `;
        }

        async function loadRecs(genres) {
            const grid = document.getElementById('recGrid');
            const term = Array.isArray(genres) ? genres[0] : genres;
            const q = query(collection(db, "media_content"), where("genres", "==", term), limit(10));
            const s = await getDocs(q);
            s.forEach(doc => {
                if(doc.data().subdomain !== subId) {
                    const d = document.createElement('div');
                    d.className = 'post-card';
                    d.innerHTML = `<img src="${doc.data().thumbnail}">`;
                    d.onclick = () => location.search = `?subdomain=${doc.data().subdomain}`;
                    grid.appendChild(d);
                }
            });
        }

        // Global Helpers
        window.playVideo = (url, muted) => {
            const media = document.getElementById('mediaBox');
            media.innerHTML = `<video src="${url}" autoplay ${muted ? 'muted' : ''} controls playsinline></video>`;
        };

        window.toggleModal = (show) => {
            document.getElementById('fullEpModal').style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : 'auto';
        };

        window.share = () => {
            if(navigator.share) navigator.share({title: document.title, url: location.href});
            else { navigator.clipboard.writeText(location.href); alert("Link Copied!"); }
        };

        start();
    </script>
</body>
</html>
