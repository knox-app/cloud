<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Previewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1014;
            --text-main: #ffffff;
            --text-dim: #8f98b2;
            --accent: #1f80e0;
            --btn-gray: #252833;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent;
        }

        /* 1. Hero / Trailer Section */
        .hero { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .hero img, .hero video { width: 100%; height: 100%; object-fit: cover; }
        .hero-fade {
            position: absolute; bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, var(--bg), transparent);
        }
        .trailer-tag {
            position: absolute; top: 12px; left: 12px; font-size: 10px;
            background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px;
            font-weight: bold; letter-spacing: 0.5px;
        }

        /* 2. Header Section */
        .header { padding: 0 16px; text-align: center; margin-top: -30px; position: relative; z-index: 2; }
        .logo { max-width: 180px; max-height: 70px; margin-bottom: 8px; }
        .blue-tag { color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 8px; }
        .meta { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }

        /* 3. Button Mindsets */
        .btn-box { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
        .btn-main {
            background: #e1e6f0; color: #000; border: none; padding: 14px;
            border-radius: 8px; font-weight: 800; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-sec {
            background: rgba(255,255,255,0.1); color: #fff; border: none;
            padding: 12px; border-radius: 8px; font-weight: 600;
        }

        /* 4 & 5. Tags & Desc */
        .genres { padding: 16px; color: var(--text-dim); font-weight: bold; font-size: 13px; }
        .desc { padding: 0 16px; color: var(--text-dim); font-size: 14px; line-height: 1.4; margin-bottom: 20px; }

        /* 6. Action Bar */
        .actions { display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid #252833; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
        .action-item i { font-size: 20px; color: #fff; }

        /* 7. EPISODES (Matched to your screenshot layout) */
        .section-title { padding: 20px 16px 12px; font-size: 18px; font-weight: 700; }
        .ep-list.collapsed .ep-card:nth-child(n+5) { display: none; }
        
        .ep-card {
            display: flex; gap: 12px; padding: 12px 16px; align-items: flex-start;
            text-decoration: none; color: inherit;
        }
        .ep-thumb-container {
            position: relative; width: 150px; min-width: 150px; aspect-ratio: 16/9;
        }
        .ep-thumb { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
        .ep-play-btn {
            position: absolute; bottom: 8px; left: 8px; font-size: 12px; color: #fff;
            background: rgba(0,0,0,0.5); padding: 4px; border-radius: 50%;
        }
        .ep-info { flex: 1; position: relative; }
        .ep-info h4 { margin: 0 0 4px; font-size: 14px; font-weight: 600; padding-right: 25px; }
        .ep-info p { margin: 0; font-size: 12px; color: var(--text-dim); }
        .ep-download { position: absolute; right: 0; top: 0; color: var(--text-dim); font-size: 18px; }

        .view-more-btn {
            width: calc(100% - 32px); margin: 10px 16px; background: var(--btn-gray);
            color: #fff; border: none; padding: 10px; border-radius: 20px; font-weight: 600;
        }

        /* 8 & 9. Grids */
        .scroller { display: flex; overflow-x: auto; gap: 12px; padding: 0 16px 20px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        .post-card { min-width: 110px; width: 110px; }
        .post-card img { width: 100%; aspect-ratio: 2/3; border-radius: 8px; object-fit: cover; }
        .trail-card { min-width: 200px; width: 200px; }
        .trail-card img { width: 100%; aspect-ratio: 16/9; border-radius: 8px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app">
        <!-- 1. Trailer/Image -->
        <div class="hero">
            <div id="visual">
                <img id="poster" src="" alt="">
            </div>
            <div class="hero-fade"></div>
            <div id="trailerStatus" class="trailer-tag">Loading...</div>
        </div>

        <!-- 2. Logo/Meta -->
        <div class="header">
            <img id="logo" src="" alt="" class="logo">
            <div id="tag" class="blue-tag"></div>
            <div id="meta" class="meta"></div>
        </div>

        <!-- 3. Buttons -->
        <div class="btn-box" id="btnGroup"></div>

        <!-- 4 & 5. Tags/Desc -->
        <div class="genres" id="genres"></div>
        <p class="desc" id="description"></p>

        <!-- 6. Actions -->
        <div class="actions">
            <div class="action-item"><i class="fa-solid fa-plus"></i><span>Watchlist</span></div>
            <div class="action-item"><i class="fa-solid fa-share-nodes"></i><span>Share</span></div>
            <div class="action-item"><i class="fa-solid fa-heart"></i><span>Rate</span></div>
        </div>

        <!-- 7. Episodes (Matched to your Firestore map) -->
        <div id="epSection" class="hidden">
            <div class="section-title" id="sTitle">Season 1</div>
            <div id="epList" class="ep-list collapsed"></div>
            <button id="viewMore" class="view-more-btn hidden">View More</button>
        </div>

        <!-- 8. More Like This -->
        <div class="section-title">More Like This</div>
        <div class="scroller" id="recGrid"></div>

        <!-- 9. Trailers & More -->
        <div class="section-title">Trailers & More</div>
        <div class="scroller" id="trailerGrid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const subId = new URLSearchParams(window.location.search).get('subdomain') || window.location.search.split('=')[1];

        async function load() {
            if(!subId) return;
            const q = query(collection(db, "media_content"), where("subdomain", "==", subId));
            const snap = await getDocs(q);
            if(snap.empty) return;
            render(snap.docs[0].data());
        }

        function render(data) {
            // 1. Trailer Logic
            document.getElementById('poster').src = data.chooserImg || data.thumbnail;
            setTimeout(() => {
                const vis = document.getElementById('visual');
                const tag = document.getElementById('trailerStatus');
                if(data.trailers?.[0]) {
                    tag.innerText = "Trailer Playing";
                    vis.innerHTML = `<video src="${data.trailers[0]}" autoplay muted playsinline></video>`;
                } else {
                    tag.innerText = "Trailer Unavailable";
                }
            }, 3500);

            // 2. Metadata
            document.getElementById('logo').src = data.logo;
            document.getElementById('tag').innerText = data.blueTags?.[0] || "";
            document.getElementById('meta').innerText = `${data.year} • ${data.ageRating} • ${data.duration || (data.seasons?.length + ' Seasons')} • ${data.languages?.length} Languages`;
            document.getElementById('genres').innerText = data.genres?.join(' | ');
            document.getElementById('description').innerText = data.description;

            // 3. Button Mindsets
            const btnBox = document.getElementById('btnGroup');
            const history = JSON.parse(localStorage.getItem('user_history') || '{}')[subId];

            if(data.type === "Series") {
                if(!history) {
                    btnBox.innerHTML = `<button class="btn-main"><i class="fa-solid fa-play"></i> Watch Latest Episode</button>`;
                } else {
                    btnBox.innerHTML = `<button class="btn-main"><i class="fa-solid fa-play"></i> Resume S${history.s} E${history.e}</button>
                                        <button class="btn-sec">Watch From Beginning</button>`;
                }
            } else {
                btnBox.innerHTML = history ? `<button class="btn-main"><i class="fa-solid fa-play"></i> Resume Watching</button><button class="btn-sec">Watch From Beginning</button>` : `<button class="btn-main"><i class="fa-solid fa-play"></i> Watch Now</button>`;
            }

            // 7. Episodes (USING YOUR FIRESTORE FIELDS)
            if(data.seasons && data.seasons[0]) {
                const section = document.getElementById('epSection');
                const list = document.getElementById('epList');
                section.classList.remove('hidden');
                
                const episodes = data.seasons[0].episodes || [];
                episodes.forEach((ep) => {
                    const card = document.createElement('div');
                    card.className = 'ep-card';
                    card.innerHTML = `
                        <div class="ep-thumb-container">
                            <img src="${ep.thumbnail}" class="ep-thumb">
                            <i class="fa-solid fa-play ep-play-btn"></i>
                        </div>
                        <div class="ep-info">
                            <h4>${ep.title}</h4>
                            <p>S${data.seasons[0].seasonNumber} E${ep.episodeNo} • ${ep.releasedDate}</p>
                            <i class="fa-solid fa-download ep-download"></i>
                        </div>
                    `;
                    list.appendChild(card);
                });

                if(episodes.length > 4) {
                    const vm = document.getElementById('viewMore');
                    vm.classList.remove('hidden');
                    vm.onclick = () => {
                        list.classList.toggle('collapsed');
                        vm.innerText = list.classList.contains('collapsed') ? "View More" : "View Less";
                    };
                }
            }

            // 8 & 9. Grids
            fetchRecs(data.genres);
            if(data.trailers) {
                const tg = document.getElementById('trailerGrid');
                data.trailers.forEach((t, i) => {
                    tg.innerHTML += `<div class="trail-card"><img src="${data.thumbnail}"><p>Trailer ${i+1}</p></div>`;
                });
            }
        }

        async function fetchRecs(genres) {
            const q = query(collection(db, "media_content"), where("genres", "array-contains-any", genres));
            const snap = await getDocs(q);
            const grid = document.getElementById('recGrid');
            snap.forEach(doc => {
                if(doc.data().subdomain !== subId) {
                    const div = document.createElement('div');
                    div.className = 'post-card';
                    div.innerHTML = `<img src="${doc.data().thumbnail}">`;
                    div.onclick = () => window.location.search = `?subdomain=${doc.data().subdomain}`;
                    grid.appendChild(div);
                }
            });
        }

        load();
    </script>
</body>
                </html>
