<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Authentication</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            margin-bottom: 1.5rem;
            color: #ffffff;
        }
        p {
            color: #aaaaaa;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        .btn:hover {
            background-color: #1557b0;
        }
        .status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="card">
    <h2>Email Console Authorization</h2>
    <p>Authorize this application to access your Gmail account to route and send emails on your behalf.</p>
    <button class="btn" id="loginBtn">Authorize with Google</button>
    <div id="statusMessage" class="status"></div>
</div>

<script>
    // Configuration Placeholders
    const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID'; // Replace with your Google OAuth Client ID
    const SCOPES = 'https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/userinfo.email';

    let tokenClient;

    function initTokenClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: async (tokenResponse) => {
                if (tokenResponse.error !== undefined) {
                    showStatus('Authorization failed: ' + tokenResponse.error, 'error');
                    return;
                }

                // Store access token details
                localStorage.setItem('gmail_access_token', tokenResponse.access_token);
                localStorage.setItem('gmail_token_expiry', Date.now() + (tokenResponse.expires_in * 1000));

                showStatus('Fetching profile info...', '');
                await fetchUserInfo(tokenResponse.access_token);
            },
        });
    }

    async function fetchUserInfo(accessToken) {
        try {
            const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await response.json();
            if (data.email) {
                localStorage.setItem('user_email', data.email);
                showStatus(`Authorized successfully as ${data.email}!`, 'success');
            } else {
                showStatus('Authorized, but could not retrieve email address.', 'success');
            }
        } catch (error) {
            console.error('Error fetching user info:', error);
            showStatus('Authorization complete, but failed to fetch user email.', 'success');
        }
    }

    function showStatus(msg, className) {
        const el = document.getElementById('statusMessage');
        el.textContent = msg;
        el.className = 'status ' + className;
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        if (!tokenClient) {
            initTokenClient();
        }
        tokenClient.requestAccessToken();
    });

    window.onload = () => {
        const existingToken = localStorage.getItem('gmail_access_token');
        const expiry = localStorage.getItem('gmail_token_expiry');
        const userEmail = localStorage.getItem('user_email');

        if (existingToken && expiry && Date.now() < parseInt(expiry)) {
            showStatus(`Already authorized as ${userEmail || 'User'}.`, 'success');
        }
    };
</script>

</body>
</html>
