<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Client Portal</title>
    <!-- Google Identity Services client SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title {
            font-size: 1.25rem;
            font-weight: bold;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        .btn-danger {
            background-color: #e06d6d;
        }
        .btn-danger:hover {
            background-color: #c95252;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group textarea {
            min-height: 120px;
            font-family: monospace;
        }
        .optional-fields {
            display: none;
            margin-top: 10px;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            padding: 0;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .email-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        .email-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }
        .email-item:hover {
            background-color: #f9f9f9;
        }
        .email-subject {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .email-sender {
            font-size: 0.85rem;
            color: #666;
        }
        .email-view {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
        }
        #main-app {
            display: none;
        }
        .attachment-preview {
            font-size: 0.85rem;
            color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">Mailbox Enterprise</div>
        <div class="user-profile" id="user-info"></div>
    </header>

    <div id="login-screen">
        <h2>Authentication Required</h2>
        <p>Log in with your Google Workspace account to read and send messages.</p>
        <button class="btn" id="login-btn" onclick="requestToken()">Authorize with Google</button>
    </div>

    <div class="container" id="main-app">
        <!-- Inbox Panel -->
        <div class="card">
            <h3>Inbox</h3>
            <button class="btn" onclick="fetchEmails()" style="margin-bottom: 10px; width: 100%;">Refresh Mail</button>
            <ul class="email-list" id="email-list-container"></ul>

            <div class="email-view" id="email-detail-view" style="display: none;">
                <h4 id="view-subject"></h4>
                <p id="view-sender"></p>
                <div id="view-body" style="background: #fafafa; padding: 10px; border-radius: 4px; overflow-x: auto; min-height: 100px;"></div>
                <button class="btn" id="reply-btn" style="margin-top: 10px;">Reply</button>
            </div>
        </div>

        <!-- Compose Panel -->
        <div class="card">
            <h3>Compose Message</h3>
            <form id="compose-form">
                <div class="form-group">
                    <label for="to-input">To:</label>
                    <input type="email" id="to-input" required placeholder="recipient@example.com">
                </div>
                
                <button type="button" class="toggle-btn" id="toggle-cc-bcc-btn">+ Add CC/BCC</button>
                <div class="optional-fields" id="cc-bcc-fields">
                    <div class="form-group">
                        <label for="cc-input">Cc:</label>
                        <input type="email" id="cc-input" placeholder="cc@example.com">
                    </div>
                    <div class="form-group">
                        <label for="bcc-input">Bcc:</label>
                        <input type="email" id="bcc-input" placeholder="bcc@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="subject-input">Subject:</label>
                    <input type="text" id="subject-input" required placeholder="Subject">
                </div>

                <div class="form-group">
                    <label for="body-input">Body (HTML & Plaintext supported):</label>
                    <textarea id="body-input" required placeholder="Write HTML content, images tags, CSS style elements, etc."></textarea>
                </div>

                <div class="form-group">
                    <label for="file-attachments">Attach File:</label>
                    <input type="file" id="file-attachments" multiple>
                    <div class="attachment-preview" id="files-list"></div>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Send Email</button>
            </form>
        </div>
    </div>

    <script>
        const CLIENT_ID = '960697640788-qh2gmrbupc7p53pldv26ev4n3ccmku6h.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
        
        let tokenClient;
        let attachmentsStore = [];

        // Initialize Google Identity Services token client
        function initGisClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) {
                        console.error("Authorization Error:", tokenResponse.error);
                        return;
                    }
                    localStorage.setItem('google_access_token', tokenResponse.access_token);
                    resolveSession();
                },
            });
        }

        // Safe client loader hook
        window.onload = function() {
            if (typeof google !== 'undefined' && google.accounts) {
                initGisClient();
            } else {
                // Poll waiting for library load
                const interval = setInterval(() => {
                    if (typeof google !== 'undefined' && google.accounts) {
                        clearInterval(interval);
                        initGisClient();
                    }
                }, 100);
            }
            resolveSession();
        };

        function requestToken() {
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        function resolveSession() {
            const token = localStorage.getItem('google_access_token');
            if (token) {
                fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => {
                    if (!res.ok) throw new Error("Invalid Token");
                    return res.json();
                })
                .then(user => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'grid';
                    document.getElementById('user-info').innerHTML = `
                        <span>${user.email}</span>
                        <img src="${user.picture || 'https://via.placeholder.com/32'}" alt="profile img">
                        <button class="btn btn-danger" onclick="logout()">Sign Out</button>
                    `;
                    fetchEmails();
                })
                .catch(() => {
                    logout();
                });
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('user-info').innerHTML = '';
            }
        }

        function logout() {
            localStorage.removeItem('google_access_token');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('user-info').innerHTML = '';
        }

        // Optional fields rendering
        document.getElementById('toggle-cc-bcc-btn').addEventListener('click', function() {
            const extraFields = document.getElementById('cc-bcc-fields');
            if (extraFields.style.display === 'none' || extraFields.style.display === '') {
                extraFields.style.display = 'block';
                this.innerText = '- Remove CC/BCC';
            } else {
                extraFields.style.display = 'none';
                this.innerText = '+ Add CC/BCC';
            }
        });

        // Track and format binary file outputs
        document.getElementById('file-attachments').addEventListener('change', function(e) {
            attachmentsStore = [];
            const filesList = document.getElementById('files-list');
            filesList.innerHTML = '';
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    attachmentsStore.push({
                        name: file.name,
                        type: file.type,
                        base64Data: evt.target.result.split(',')[1]
                    });
                    filesList.innerHTML += `<div>📎 ${file.name}</div>`;
                };
                reader.readAsDataURL(file);
            });
        });

        function buildMimeMessage(to, cc, bcc, subject, body, attachments) {
            const boundary = "boundary_" + Math.random().toString(36).substring(2);
            const nl = "\r\n";
            
            let headers = [
                `To: ${to}`,
                cc ? `Cc: ${cc}` : "",
                bcc ? `Bcc: ${bcc}` : "",
                `Subject: ${subject}`,
                "MIME-Version: 1.0",
                `Content-Type: multipart/mixed; boundary=${boundary}`,
                ""
            ].filter(line => line !== "").join(nl);

            let bodyPart = [
                `--${boundary}`,
                "Content-Type: text/html; charset=UTF-8",
                "Content-Transfer-Encoding: base64",
                "",
                btoa(unescape(encodeURIComponent(body))),
                ""
            ].join(nl);

            let attachmentPart = "";
            attachments.forEach(file => {
                attachmentPart += [
                    `--${boundary}`,
                    `Content-Type: ${file.type}; name="${file.name}"`,
                    "Content-Transfer-Encoding: base64",
                    `Content-Disposition: attachment; filename="${file.name}"`,
                    "",
                    file.base64Data,
                    ""
                ].join(nl);
            });

            const emailRaw = headers + nl + bodyPart + nl + (attachmentPart ? attachmentPart : "") + `--${boundary}--`;
            
            return btoa(unescape(encodeURIComponent(emailRaw)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        document.getElementById('compose-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const toVal = document.getElementById('to-input').value;
            const ccVal = document.getElementById('cc-input').value;
            const bccVal = document.getElementById('bcc-input').value;
            const subVal = document.getElementById('subject-input').value;
            const bodyVal = document.getElementById('body-input').value;

            const token = localStorage.getItem('google_access_token');
            if (!token) {
                alert("Session expired. Please authorize.");
                return;
            }

            const rawMime = buildMimeMessage(toVal, ccVal, bccVal, subVal, bodyVal, attachmentsStore);

            fetch('https://gmail.googleapis.com/v1/users/me/messages/send', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ raw: rawMime })
            })
            .then(res => {
                if (res.ok) {
                    alert("Email dispatched.");
                    document.getElementById('compose-form').reset();
                    attachmentsStore = [];
                    document.getElementById('files-list').innerHTML = '';
                } else {
                    alert("Error sending email. Please verify API access.");
                }
            });
        });

        function fetchEmails() {
            const token = localStorage.getItem('google_access_token');
            if (!token) return;

            const listContainer = document.getElementById('email-list-container');
            listContainer.innerHTML = '<li>Fetching messages...</li>';

            fetch('https://gmail.googleapis.com/v1/users/me/messages?maxResults=8', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                listContainer.innerHTML = '';
                if (!data.messages || data.messages.length === 0) {
                    listContainer.innerHTML = '<li>No messages found in your inbox.</li>';
                    return;
                }
                data.messages.forEach(msg => {
                    fetchEmailDetails(msg.id);
                });
            })
            .catch(() => {
                listContainer.innerHTML = '<li>Error loading messages.</li>';
            });
        }

        function fetchEmailDetails(id) {
            const token = localStorage.getItem('google_access_token');
            
            fetch(`https://gmail.googleapis.com/v1/users/me/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(msgDetails => {
                const headers = msgDetails.payload.headers;
                const subject = (headers.find(h => h.name === 'Subject') || {value: '(No Subject)'}).value;
                const from = (headers.find(h => h.name === 'From') || {value: 'Unknown'}).value;
                
                let body = "No displayable content.";
                if (msgDetails.payload.body.data) {
                    body = decodeMimeBody(msgDetails.payload.body.data);
                } else if (msgDetails.payload.parts) {
                    const parsedPart = msgDetails.payload.parts.find(p => p.mimeType === "text/html" || p.mimeType === "text/plain");
                    if (parsedPart && parsedPart.body.data) {
                        body = decodeMimeBody(parsedPart.body.data);
                    }
                }

                const item = document.createElement('li');
                item.className = 'email-item';
                item.innerHTML = `
                    <div class="email-subject">${subject}</div>
                    <div class="email-sender">${from}</div>
                `;
                item.addEventListener('click', () => {
                    const view = document.getElementById('email-detail-view');
                    view.style.display = 'block';
                    document.getElementById('view-subject').innerText = subject;
                    document.getElementById('view-sender').innerText = `From: ${from}`;
                    document.getElementById('view-body').innerHTML = body;

                    document.getElementById('reply-btn').onclick = function() {
                        const emailMatch = from.match(/<([^>]+)>/);
                        document.getElementById('to-input').value = emailMatch ? emailMatch[1] : from;
                        document.getElementById('subject-input').value = `Re: ${subject}`;
                        document.getElementById('body-input').focus();
                    };
                });
                document.getElementById('email-list-container').appendChild(item);
            });
        }

        function decodeMimeBody(data) {
            const cleanStr = data.replace(/-/g, '+').replace(/_/g, '/');
            return decodeURIComponent(escape(atob(cleanStr)));
        }
    </script>
</body>
</html>
