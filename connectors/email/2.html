<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Email Routing...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 {
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }
        .detail-row {
            margin: 0.8rem 0;
            font-size: 0.9rem;
        }
        .label {
            font-weight: bold;
            color: #90caf9;
        }
        #status {
            margin-top: 1.5rem;
            padding: 10px;
            border-radius: 4px;
            font-weight: 500;
            text-align: center;
        }
        .processing { background-color: #333; color: #fff; }
        .success { background-color: #1b5e20; color: #c8e6c9; }
        .error { background-color: #b71c1c; color: #ffcdd2; }
    </style>

    <!-- Firebase App and Firestore SDKs (Compat version for browser integration) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="container">
    <h2>Email Processing Unit</h2>
    <div class="detail-row"><span class="label">Recipient:</span> <span id="param-recipient">-</span></div>
    <div class="detail-row"><span class="label">Subject:</span> <span id="param-subject">-</span></div>
    <div class="detail-row"><span class="label">Message:</span> <span id="param-message">-</span></div>
    <div class="detail-row"><span class="label">CC:</span> <span id="param-cc">-</span></div>
    <div class="detail-row"><span class="label">BCC:</span> <span id="param-bcc">-</span></div>
    
    <div id="status" class="processing">Initializing processing...</div>
</div>

<script>
    // Firebase Configuration Placeholder
    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
        projectId: "YOUR_FIREBASE_PROJECT_ID",
        storageBucket: "YOUR_FIREBASE_STORAGE_BUCKET",
        messagingSenderId: "YOUR_FIREBASE_MESSAGING_SENDER_ID",
        appId: "YOUR_FIREBASE_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Helper: Parse Query Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const rawRecipient = urlParams.get('recipiten') || ''; // Uses 'recipiten' parameter
    const message = urlParams.get('message') || '';
    const cc = urlParams.get('cc') || '';
    const bcc = urlParams.get('bcccc') || ''; // Uses 'bcccc' parameter
    const subject = urlParams.get('subject') || 'Testing Mail 1';

    // Clean up potential URL encoding artifacts
    const recipient = decodeURIComponent(rawRecipient).trim();

    // Update UI elements with values
    document.getElementById('param-recipient').textContent = recipient || '(Empty)';
    document.getElementById('param-subject').textContent = subject;
    document.getElementById('param-message').textContent = message || '(Empty)';
    document.getElementById('param-cc').textContent = cc || 'None';
    document.getElementById('param-bcc').textContent = bcc || 'None';

    const statusEl = document.getElementById('status');

    function updateStatus(text, className) {
        statusEl.textContent = text;
        statusEl.className = className;
    }

    // Process Routing Logic
    async function routeEmail() {
        if (!recipient) {
            updateStatus('Error: Recipient email is required.', 'error');
            return;
        }

        const isInternalDomain = recipient.endsWith('@perplexit.com') || recipient.endsWith('@perplexity.com');

        if (isInternalDomain) {
            updateStatus('Internal domain detected. Writing to Cloud Firestore...', 'processing');
            saveToFirestore();
        } else {
            updateStatus('External domain detected. Routing to Gmail API...', 'processing');
            sendViaGmailAPI();
        }
    }

    // Route A: Save directly to Cloud Firestore
    function saveToFirestore() {
        const formattedDate = new Date().toLocaleString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            hour12: true
        });

        const senderEmail = localStorage.getItem('user_email') || 'unknown@gmail.com';

        db.collection("Email").add({
            "Date and Time": formattedDate,
            "Message": message,
            "Reciver": recipient, // Matching structure from screenshot
            "Reply": "",
            "Sender": senderEmail,
            "Subject": subject
        })
        .then((docRef) => {
            console.log("Document successfully written with ID: ", docRef.id);
            updateStatus('Success: Logged to Firestore database successfully.', 'success');
        })
        .catch((error) => {
            console.error("Error writing document: ", error);
            updateStatus('Error saving database record: ' + error.message, 'error');
        });
    }

    // Route B: Send via Gmail API
    async function sendViaGmailAPI() {
        const token = localStorage.getItem('gmail_access_token');
        const expiry = localStorage.getItem('gmail_token_expiry');

        if (!token || !expiry || Date.now() >= parseInt(expiry)) {
            updateStatus('Error: Unauthorized or OAuth session expired. Please log in again via 1.html.', 'error');
            return;
        }

        try {
            // Build RFC 822 compliant MIME message
            const emailParts = [];
            emailParts.push(`To: ${recipient}`);
            if (cc) {
                // Split multiple CC targets if separated by semicolons
                const cleanCc = cc.replace(/;/g, ',');
                emailParts.push(`Cc: ${cleanCc}`);
            }
            if (bcc) {
                const cleanBcc = bcc.replace(/;/g, ',');
                emailParts.push(`Bcc: ${cleanBcc}`);
            }
            emailParts.push(`Subject: ${subject}`);
            emailParts.push('Content-Type: text/plain; charset=utf-8');
            emailParts.push('');
            emailParts.push(message);

            const rawEmail = emailParts.join('\r\n');
            
            // Base64URL encode the message
            const base64UrlSafeEmail = btoa(unescape(encodeURIComponent(rawEmail)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');

            const response = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    raw: base64UrlSafeEmail
                })
            });

            if (response.ok) {
                updateStatus('Success: Email dispatched successfully via Gmail API.', 'success');
            } else {
                const errData = await response.json();
                updateStatus(`API Error: ${errData.error.message || 'Transmission failed.'}`, 'error');
            }
        } catch (err) {
            console.error(err);
            updateStatus('Network failure or API error during dispatch.', 'error');
        }
    }

    // Execute routing process
    routeEmail();
</script>

</body>
</html>
