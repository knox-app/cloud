<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal Entry</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .portal-card {
            background-color: #ffffff;
            border: 1px solid #dddddd;
            border-radius: 8px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-size: 0.95rem;
        }
        .btn:hover {
            background-color: #357abd;
        }
        .status-message {
            color: #666;
            margin: 15px 0;
            font-size: 1rem;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4a90e2;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <h3>Enterprise Portal Gateway</h3>
        <div id="loader" class="spinner"></div>
        <p class="status-message" id="portal-status">Authenticating secure connection...</p>
        <div id="action-area"></div>
    </div>

    <script>
        window.onload = function() {
            const token = localStorage.getItem('google_access_token');
            const statusText = document.getElementById('portal-status');
            const loader = document.getElementById('loader');
            const actionArea = document.getElementById('action-area');

            loader.style.display = 'none';

            if (token) {
                // Verify token authenticity against user info endpoint
                fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => {
                    if (!res.ok) throw new Error("Expired session");
                    return res.json();
                })
                .then(user => {
                    statusText.innerHTML = `Welcome back! Verified as: <strong>${user.email}</strong>`;
                    actionArea.innerHTML = `<a href="1.html" class="btn">Proceed to Mail Panel</a>`;
                })
                .catch(() => {
                    localStorage.removeItem('google_access_token');
                    statusText.innerHTML = "Your session has expired. Re-authorization is required.";
                    actionArea.innerHTML = `<a href="1.html" class="btn">Authorize Now</a>`;
                });
            } else {
                statusText.innerHTML = "No active Google login session detected.";
                actionArea.innerHTML = `<a href="1.html" class="btn">Login with Google</a>`;
            }
        };
    </script>
</body>
</html>
