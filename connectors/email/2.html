<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email router</title>
    <!-- Firebase SDK (v9 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Loading your config from the provided JS source -->
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>
    <style>
        body {
            font-family: monospace;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
        }
        .console {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
            max-width: 600px;
            margin: 40px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h3 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        .param-list { margin: 15px 0; }
        .param { margin-bottom: 6px; }
        .label { color: #888; }
        .status { margin-top: 20px; color: #ffca28; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="console">
        <h3>Email Processor Console</h3>
        <div class="param-list">
            <div class="param"><span class="label">Recipient:</span> <span id="param-recipient">-</span></div>
            <div class="param"><span class="label">Subject:</span> <span id="param-subject">-</span></div>
            <div class="param"><span class="label">Message:</span> <span id="param-message">-</span></div>
            <div class="param"><span class="label">CC:</span> <span id="param-cc">-</span></div>
            <div class="param"><span class="label">BCC:</span> <span id="param-bcc">-</span></div>
        </div>
        <div id="status" class="status">Processing request...</div>
    </div>

    <script>
        // Initialize Firebase
        // Fallback to a placeholder if the external keys script does not declare `firebaseConfig`
        const config = (typeof firebaseConfig !== 'undefined') ? firebaseConfig : {
            apiKey: "AIzaSyDl...placeholder", 
            authDomain: "your-app.firebaseapp.com",
            projectId: "your-app-id",
            storageBucket: "your-app-id.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:abcdef"
        };

        if (firebase.apps.length === 0) {
            firebase.initializeApp(config);
        }
        const db = firebase.firestore();

        // Parse URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // Supports both standard spelling and the parameter schema provided
        const recipient = urlParams.get('recipiten') || urlParams.get('recipient') || '';
        const message = urlParams.get('message') || '';
        const cc = urlParams.get('cc') || '';
        const bcc = urlParams.get('bcccc') || urlParams.get('bcc') || '';
        const subject = urlParams.get('subject') || 'Testing Mail';

        // Render parameters to the console display
        document.getElementById('param-recipient').innerText = recipient || "(empty)";
        document.getElementById('param-subject').innerText = subject;
        document.getElementById('param-message').innerText = message || "(empty)";
        document.getElementById('param-cc').innerText = cc || "(empty)";
        document.getElementById('param-bcc').innerText = bcc || "(empty)";

        const statusDiv = document.getElementById('status');

        if (!recipient) {
            statusDiv.innerText = "Error: No recipient email specified in URL parameters.";
        } else {
            routeEmail();
        }

        function routeEmail() {
            // Check if recipient domain ends with @perplexit.com
            const isPerplexit = recipient.toLowerCase().endsWith('@perplexit.com');

            if (isPerplexit) {
                saveToFirestore();
            } else {
                sendViaGmailAPI();
            }
        }

        // Logic to Save to Firestore
        function saveToFirestore() {
            statusDiv.innerText = "Target domain is @perplexit.com. Saving metadata to Firestore...";

            // Formats date matches the screenshot style (e.g. "Jul 13, 2026, 9:18 AM")
            const formattedDate = new Date().toLocaleString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric', 
                hour: 'numeric', 
                minute: '2-digit', 
                hour12: true 
            });

            db.collection("Email").add({
                "Date and Time": formattedDate,
                "Message": message,
                "Reciver": recipient, // Matches screenshot field spelling
                "Reply": "",
                "Sender": "vinayaknigam196@gmail.com", // Adjust dynamically if profile access is integrated
                "Subject": subject
            })
            .then((docRef) => {
                statusDiv.style.color = "#81c784";
                statusDiv.innerText = `Data successfully logged to Firestore with Document ID: ${docRef.id}`;
            })
            .catch((error) => {
                statusDiv.style.color = "#e57373";
                statusDiv.innerText = `Firestore Error: ${error.message}`;
            });
        }

        // Logic to Send via Gmail API (RFC 822 Raw Payload Upload)
        function sendViaGmailAPI() {
            statusDiv.innerText = "Target domain requires standard delivery. Preparing transmission via Gmail API...";
            
            const token = localStorage.getItem('gmail_access_token');
            if (!token) {
                statusDiv.style.color = "#e57373";
                statusDiv.innerText = "Error: Authorization token missing. Please authenticate through 1.html first.";
                return;
            }

            // Construct SMTP/RFC 822 raw message formatting
            const emailLines = [
                `To: ${recipient}`,
                cc ? `Cc: ${cc}` : '',
                bcc ? `Bcc: ${bcc}` : '',
                `Subject: ${subject}`,
                'Content-Type: text/plain; charset=utf-8',
                'MIME-Version: 1.0',
                '',
                message
            ].filter(line => line !== '');

            const rawEmail = emailLines.join('\r\n');

            // Send raw email via Gmail's media upload endpoint
            fetch('https://gmail.googleapis.com/upload/gmail/v1/users/me/messages/send?uploadType=media', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'message/rfc822'
                },
                body: rawEmail
            })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error(`API returned status ${response.status} (${response.statusText})`);
            })
            .then(data => {
                statusDiv.style.color = "#81c784";
                statusDiv.innerText = `Success: Email delivered successfully. API Message ID: ${data.id}`;
            })
            .catch(error => {
                statusDiv.style.color = "#e57373";
                statusDiv.innerText = `Delivery Failed: ${error.message}`;
            });
        }
    </script>
</body>
</html>
