<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Authentication</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --google-blue: #4285f4;
            --google-blue-hover: #357ae8;
            --success-green: #10b981;
            --error-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .icon-container {
            width: 64px;
            height: 64px;
            background-color: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }

        .icon-container svg {
            width: 32px;
            height: 32px;
            color: var(--google-blue);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .btn-oauth {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .btn-oauth:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        .btn-oauth:active {
            background-color: #e2e8f0;
        }

        .btn-oauth svg {
            margin-right: 12px;
            flex-shrink: 0;
        }

        .status-container {
            margin-top: 24px;
            min-height: 24px;
        }

        .status {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            width: 100%;
        }

        .status.success {
            background-color: #ecfdf5;
            color: var(--success-green);
        }

        .status.error {
            background-color: #fef2f2;
            color: var(--error-red);
        }

        .status.info {
            background-color: #f0f9ff;
            color: var(--google-blue);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <!-- Load Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Load external Firebase Configuration script -->
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>
</head>
<body>

    <div class="card">
        <!-- Secure Integration Icon -->
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
            </svg>
        </div>

        <h2>Email Integration</h2>
        <p>To securely dispatch emails, connect this application to your verified Google account.</p>
        
        <!-- Branded sign-in button -->
        <button id="loginBtn" class="btn-oauth">
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 18 18">
                <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.77 2.15c1.62-1.49 2.56-3.7 2.56-6.43z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.77-2.15c-.77.52-1.75.83-2.77.83-2.34 0-4.32-1.58-5.03-3.71L1.57 13c1.48 2.94 4.53 4.94 7.91 4.94z"/>
                <path fill="#FBBC05" d="M3.97 10.77c-.18-.54-.28-1.12-.28-1.72s.1-1.18.28-1.72L1.57 5.18C.98 6.33.64 7.63.64 9s.34 2.67.93 3.82l2.4-1.87z"/>
                <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.1C13.46.67 11.42 0 9 0 5.62 0 2.57 2 1.09 4.94l2.88 2.24C4.68 5.16 6.66 3.58 9 3.58z"/>
            </svg>
            Sign in with Google
        </button>
        
        <div class="status-container">
            <div id="statusMsg" style="display: none;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let db = null;
        const statusMsg = document.getElementById('statusMsg');

        // Parse Active Session
        const params = new URLSearchParams(window.location.search);
        let session = params.get("session");

        if (session) {
            // Save newly passed session to this device's local cache
            localStorage.setItem("uarm_session_id", session);
        } else {
            // Fetch cached session ID if parameter is omitted from address bar
            session = localStorage.getItem("uarm_session_id");
        }

        function showStatus(text, type = 'info', showSpinner = false) {
            statusMsg.style.display = 'inline-flex';
            statusMsg.className = `status ${type}`;
            statusMsg.innerHTML = showSpinner ? `<span class="spinner"></span> ${text}` : text;
        }

        // Initialize Firebase
        try {
            let config = null;

            if (typeof firebaseConfig !== 'undefined') {
                config = firebaseConfig;
            } else if (window.firebaseConfig) {
                config = window.firebaseConfig;
            }

            if (!config) {
                throw new Error("Unable to locate 'firebaseConfig' in global scope.");
            }

            const app = initializeApp(config);
            db = getFirestore(app);
        } catch (error) {
            console.error("Firebase Init Error:", error);
            showStatus("Database Configuration Error: " + error.message, "error");
        }

        // Google OAuth Credentials
        const CLIENT_ID = '960697640788-qh2gmrbupc7p53pldv26ev4n3ccmku6h.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/gmail.send';

        let tokenClient;

        function initClient() {
            if (typeof google === 'undefined' || !google.accounts) {
                setTimeout(initClient, 100);
                return;
            }

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        showStatus("Saving credentials to database...", "info", true);

                        if (!db) {
                            showStatus("Database not initialized. Please verify configuration.", "error");
                            return;
                        }

                        if (!session) {
                            console.warn("Active session ID could not be retrieved from URL or Device Storage.");
                            showStatus("Error: No active user session detected on this device.", "error");
                            return;
                        }

                        try {
                            const expiresAt = Date.now() + (tokenResponse.expires_in * 1000);

                            // Store token inside the UARM collection under the active session document ID
                            const userDocRef = doc(db, "UARM", session);
                            await setDoc(userDocRef, {
                                "Gmail Token": tokenResponse.access_token,
                                "Gmail Token Expires At": expiresAt,
                                "timestamp_updated": new Date()
                            }, { merge: true });

                            showStatus("Authorized successfully! Redirecting...", "success");

                            // Build redirect URL preserving the session 
                            const redirectUrl = session ? `2.html?session=${session}` : '2.html';
                            setTimeout(() => {
                                window.location.href = redirectUrl;
                            }, 1500);

                        } catch (error) {
                            console.error("Firestore Error:", error);
                            showStatus("Database Write Error: Failed to save authentication details.", "error");
                        }
                    }
                },
            });
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            if (tokenClient) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                showStatus("Google connection loading, please try again shortly.", "info");
            }
        });

        // Initialize setup immediately
        initClient();
    </script>
</body>
    </html>
