<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Dispatch Gateway</title>
    <!-- EmailJS Integration library -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .dispatch-card {
            background-color: #ffffff;
            border: 1px solid #dddddd;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .status-box {
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
            font-weight: 500;
        }
        .status-pending {
            background-color: #fef3c7;
            color: #d97706;
        }
        .status-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        .status-error {
            background-color: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>

    <div class="dispatch-card">
        <h3>Outbound Query Dispatcher</h3>
        <p>Executing programmatic API directives based on URL parameters...</p>
        <div id="runtime-status" class="status-box status-pending">Evaluating incoming query parameters...</div>
    </div>

    <script type="text/javascript">
        (function() {
            // Initializing EmailJS Public Key
            emailjs.init("Yr9MutUoHOEONnFgn");
        })();

        function getQueryParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (search) {
                const parts = search.split('&');
                for (let i = 0; i < parts.length; i++) {
                    const pair = parts[i].split('=');
                    params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
                }
            }
            return params;
        }

        function displayStatus(text, type) {
            const statusDiv = document.getElementById('runtime-status');
            statusDiv.innerText = text;
            statusDiv.className = `status-box status-${type}`;
        }

        function constructAndSendGmail(to, messageText, token) {
            const rawMime = [
                `To: ${to}`,
                "Subject: Automated Delivery Direct",
                "MIME-Version: 1.0",
                "Content-Type: text/html; charset=UTF-8",
                "",
                `<p>${messageText}</p>`
            ].join('\r\n');

            const encodedMime = btoa(unescape(encodeURIComponent(rawMime)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');

            fetch('https://gmail.googleapis.com/v1/users/me/messages/send', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ raw: encodedMime })
            })
            .then(res => {
                if (res.ok) {
                    displayStatus("Email successfully dispatched using Google access token.", "success");
                } else {
                    displayStatus("Failed to send message via Gmail API. Session may have expired.", "error");
                }
            })
            .catch(err => {
                displayStatus(`Execution error: ${err.message}`, "error");
            });
        }

        window.onload = function() {
            const args = getQueryParams();

            // Scenario 1: EmailJS pathway
            // Format: ?api=<Fable_api>&to=<receiver>&template=<template_id>
            if (args.api && args.to && args.template) {
                displayStatus("Processing EmailJS Template Dispatch...", "pending");

                const templateParams = {
                    to_email: args.to,
                    fable_api_key: args.api,
                    message: `Transactional template ID: ${args.template}`
                };

                // Service ID: service_63mnm5a, Template ID: template_mfkmx1r
                emailjs.send("service_63mnm5a", "template_mfkmx1r", templateParams)
                    .then(function() {
                        displayStatus("Template dispatched successfully via EmailJS.", "success");
                    }, function(error) {
                        displayStatus(`EmailJS failed: ${JSON.stringify(error)}`, "error");
                    });
            }
            
            // Scenario 2: Google OAuth / Gmail API pathway
            // Format: ?to=<receiver>&message=<message>
            else if (args.to && args.message) {
                displayStatus("Validating active authorization session token...", "pending");
                const token = localStorage.getItem('google_access_token');
                
                if (token) {
                    constructAndSendGmail(args.to, args.message, token);
                } else {
                    displayStatus("Authorization missing. Please authenticate via the application portal (1.html).", "error");
                }
            } 
            
            else {
                displayStatus("Invalid or missing query parameter configurations.", "error");
            }
        };
    </script>
</body>
</html>
