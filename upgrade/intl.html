<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Setup</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1a1a1a;
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 1px solid #333;
        }
        .status { 
            margin-top: 25px; 
            font-size: 1.2rem; 
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #ff5252; margin-top: 10px; }
        .success-icon { color: #4caf50; font-size: 4rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="ui-box">
            <div class="loader"></div>
            <div class="status" id="status-text">Initialising Payments</div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Your Configuration Script -->
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

    <script>
        const statusText = document.getElementById('status-text');
        const uiBox = document.getElementById('ui-box');

        // Utility to generate API Key
        function generateApiKey() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
            let result = "";
            for (let i = 0; i < 20; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result + ".apis.plx";
        }

        // Delay function to make UI transitions visible
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        async function processTransfer() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session');
            const planId = urlParams.get('plan');

            if (!sessionId || !planId) {
                statusText.innerHTML = '<span class="error">Configuration Error: Missing Parameters</span>';
                return;
            }

            try {
                // Initialize Firestore
                const db = firebase.firestore();

                // STAGE 1: Initialising Payments (Fetching data)
                statusText.innerText = "Initialising Payments";
                const aspxDocRef = db.collection("ASPX Keys").doc(sessionId);
                const aspxDoc = await aspxDocRef.get();

                if (!aspxDoc.exists) {
                    statusText.innerHTML = '<span class="error">Invalid Session. Please try again.</span>';
                    return;
                }

                const teamEmail = aspxDoc.data()["Team Email"];
                await sleep(1200);

                // STAGE 2: Creating Your Team
                statusText.innerText = "Creating Your Team";
                const newApiKey = generateApiKey();
                const expiryDate = "30/12/2026"; 

                const orgData = {
                    "Email": teamEmail,
                    "API Keys": newApiKey,
                    "Durations": {
                        [planId]: expiryDate
                    },
                    "Subscriptions": [planId]
                };

                await db.collection("Organizations").add(orgData);
                await sleep(1200);

                // STAGE 3: Managing Tokens (Deleting original session)
                statusText.innerText = "Managing Tokens";
                await aspxDocRef.delete();
                await sleep(1000);

                // STAGE 4: Finalizing Account
                statusText.innerText = "Finalizing Account";
                await sleep(1500);

                // Completion UI
                uiBox.innerHTML = `
                    <div class="success-icon">✓</div>
                    <div class="status" style="color: #4caf50;">Setup Complete</div>
                    <p style="color: #888;">Your account is now active.</p>
                `;

            } catch (error) {
                console.error(error);
                statusText.innerHTML = `<span class="error">System Error: ${error.message}</span>`;
            }
        }

        // Start when Firebase is ready
        window.onload = () => {
            // Short delay to ensure external script is loaded
            setTimeout(processTransfer, 1000);
        };
    </script>
</body>
              </html>
