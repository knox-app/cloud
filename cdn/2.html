<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S-Cloud | Upload</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        nav { background: #333; padding: 1rem; color: white; display: flex; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .upload-card { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; margin: 15px 0; padding: 10px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 100%; }
        #status { margin-top: 15px; color: #555; }
    </style>
</head>
<body>
    <nav>
        <a href="dashboard.html?collection=none">Dashboard</a>
        <a href="index.html" onclick="localStorage.clear()">Logout</a>
    </nav>

    <div class="upload-card">
        <h2>Upload to Cloud</h2>
        <input type="file" id="fileInput" accept="image/*">
        <input type="text" id="folderName" placeholder="Folder Name (e.g. Vacation, Work)">
        <button id="uploadBtn">Start Upload</button>
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            projectId: "question-metabase",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const API_KEY = "80c452b9a4b80f240ada316f23078d2c";
        const userEmail = localStorage.getItem("userEmail");

        if(!userEmail) window.location.href = "index.html";

        document.getElementById('uploadBtn').onclick = async () => {
            const fileInput = document.getElementById('fileInput');
            const folder = document.getElementById('folderName').value || "General";
            const status = document.getElementById('status');

            if(!fileInput.files[0]) return alert("Please select an image");
            
            status.innerText = "Uploading to Cloud...";
            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            try {
                // 1. Upload to ImageBB
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();

                if(data.success) {
                    // 2. Save Link to Firestore
                    await addDoc(collection(db, "media"), {
                        url: data.data.url,
                        thumb: data.data.thumb.url,
                        name: fileInput.files[0].name,
                        owner: userEmail,
                        folder: folder,
                        sharedWith: [],
                        createdAt: Date.now()
                    });
                    status.innerText = "Successfully Uploaded!";
                    fileInput.value = "";
                }
            } catch (err) {
                status.innerText = "Upload failed. Try again.";
            }
        };
    </script>
</body>
</html>
