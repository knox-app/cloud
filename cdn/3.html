<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S-Cloud Mobile</title>
    <!-- External Libraries for Editing -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        :root { --primary: #007aff; --bg: #ffffff; --card-bg: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Mobile Header */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #eee; }
        h1 { font-size: 24px; margin: 0; font-weight: 700; }
        
        /* Search & Folders */
        .search-container { padding: 10px 20px; }
        .search-bar { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #f2f2f7; box-sizing: border-box; font-size: 16px; }
        .folder-scroll { display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px; scrollbar-width: none; }
        .folder-chip { padding: 8px 18px; background: var(--card-bg); border-radius: 20px; white-space: nowrap; font-size: 14px; font-weight: 500; }
        .folder-chip.active { background: var(--primary); color: white; }

        /* Gallery Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .media-card { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; background: #eee; }
        .media-card img { width: 100%; height: 100%; object-fit: cover; }
        .media-card .overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.4); color: white; padding: 5px; font-size: 10px; text-align: center; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; color: #8e8e93; font-size: 12px; text-decoration: none; }
        .nav-item.active { color: var(--primary); }

        /* FULLSCREEN EDITOR OVERLAY */
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .editor-header { display: flex; justify-content: space-between; padding: 15px; color: white; background: #1a1a1a; }
        .editor-canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #editor-canvas { max-width: 100%; max-height: 100%; }
        .editor-footer { background: #1a1a1a; padding: 10px 0; }
        .tool-tabs { display: flex; justify-content: space-around; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tool-btn { color: #fff; background: none; border: none; font-size: 14px; }
        .sub-tool { display: flex; overflow-x: auto; padding: 15px; gap: 20px; color: white; }
        .filter-opt { text-align: center; font-size: 10px; min-width: 60px; }
        .filter-opt div { width: 40px; height: 40px; background: #333; margin: 0 auto 5px; border-radius: 5px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1 id="title">Photos</h1>
        <div onclick="location.href='1.html'" style="color: var(--primary);">Logout</div>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search your cloud..." id="searchInput">
    </div>

    <div class="folder-scroll" id="folderList">
        <div class="folder-chip active" onclick="filterFolder('all')">All</div>
    </div>

    <div class="grid" id="mediaGrid">
        <!-- Images load here -->
    </div>

    <!-- Bottom Mobile Nav -->
    <nav class="bottom-nav">
        <a href="3.html?collection=none" class="nav-item active">🖼️<br>Library</a>
        <a href="2.html" class="nav-item">📤<br>Upload</a>
        <a href="3.html?collection=shared" class="nav-item">👥<br>Shared</a>
    </nav>

    <!-- IMAGE EDITOR INTERFACE -->
    <div id="editor-overlay">
        <div class="editor-header">
            <span onclick="closeEditor()">Cancel</span>
            <b id="tool-name">Edit Image</b>
            <span onclick="saveEditedImage()" style="color: var(--primary);">Save</span>
        </div>
        
        <div class="editor-canvas-container" id="canvas-wrapper">
            <img id="editing-img-element" style="display: none;">
            <canvas id="main-canvas"></canvas>
        </div>

        <div class="editor-footer">
            <div class="tool-tabs">
                <button class="tool-btn" onclick="initCrop()">Crop</button>
                <button class="tool-btn" onclick="showFilters()">Filters</button>
                <button class="tool-btn" onclick="initDraw()">Draw</button>
                <button class="tool-btn" onclick="addShape()">Shapes</button>
            </div>
            
            <!-- Contextual Menus -->
            <div id="filter-menu" class="sub-tool hidden">
                <div onclick="applyFilter('none')" class="filter-opt"><div></div>Original</div>
                <div onclick="applyFilter('grayscale(100%)')" class="filter-opt"><div></div>B&W</div>
                <div onclick="applyFilter('sepia(100%)')" class="filter-opt"><div></div>Sepia</div>
                <div onclick="applyFilter('brightness(150%)')" class="filter-opt"><div></div>Bright</div>
                <div onclick="applyFilter('contrast(200%)')" class="filter-opt"><div></div>High Con</div>
            </div>

            <div id="draw-menu" class="sub-tool hidden">
                <input type="color" id="brushColor" value="#ff0000">
                <button onclick="setBrushSize(5)">Thin</button>
                <button onclick="setBrushSize(15)">Thick</button>
                <button onclick="clearDraw()">Clear</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { projectId: "question-metabase", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const userEmail = localStorage.getItem("sCloudUser");
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('collection') || 'none';
        
        let allMedia = [];
        let cropper = null;
        let canvas = document.getElementById('main-canvas');
        let ctx = canvas.getContext('2d');
        let isDrawing = false;

        if(!userEmail) window.location.href = "1.html";

        async function loadMedia() {
            const grid = document.getElementById('mediaGrid');
            const folderList = document.getElementById('folderList');
            let q = query(collection(db, "media"), where(mode === 'shared' ? "sharedWith" : "owner", mode === 'shared' ? "array-contains" : "==", userEmail));
            
            const snap = await getDocs(q);
            allMedia = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            grid.innerHTML = "";
            allMedia.forEach(item => {
                const div = document.createElement('div');
                div.className = 'media-card';
                div.innerHTML = `<img src="${item.url}" onclick="openEditor('${item.url}')"><div class="overlay">${item.name}</div>`;
                grid.appendChild(div);
            });

            // Generate Folders
            const folders = [...new Set(allMedia.map(m => m.folder))];
            folders.forEach(f => {
                const span = document.createElement('div');
                span.className = 'folder-chip';
                span.innerText = f;
                span.onclick = () => filterByFolder(f);
                folderList.appendChild(span);
            });
        }

        // --- EDITOR LOGIC ---
        window.openEditor = (url) => {
            document.getElementById('editor-overlay').style.display = 'flex';
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                document.getElementById('editing-img-element').src = url;
            };
        };

        window.closeEditor = () => {
            if(cropper) cropper.destroy();
            document.getElementById('editor-overlay').style.display = 'none';
        };

        // 1. CROP
        window.initCrop = () => {
            if(cropper) cropper.destroy();
            const image = document.getElementById('editing-img-element');
            image.src = canvas.toDataURL();
            image.style.display = 'block';
            canvas.style.display = 'none';
            
            cropper = new Cropper(image, { aspectRatio: NaN, viewMode: 1 });
            document.getElementById('tool-name').innerText = "Crop Mode";
        };

        // 2. FILTERS
        window.showFilters = () => {
            if(cropper) {
                applyCrop(); // Save crop before filtering
            }
            document.getElementById('filter-menu').classList.toggle('hidden');
            document.getElementById('tool-name').innerText = "Filters";
        };

        window.applyFilter = (filterStr) => {
            ctx.filter = filterStr;
            const img = new Image();
            img.src = document.getElementById('editing-img-element').src;
            img.onload = () => ctx.drawImage(img, 0, 0);
        };

        // 3. DRAWING
        window.initDraw = () => {
            if(cropper) applyCrop();
            document.getElementById('draw-menu').classList.remove('hidden');
            document.getElementById('tool-name').innerText = "Draw Mode";
            
            canvas.style.display = 'block';
            document.getElementById('editing-img-element').style.display = 'none';

            canvas.ontouchstart = (e) => {
                isDrawing = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            };

            canvas.ontouchmove = (e) => {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.strokeStyle = document.getElementById('brushColor').value;
                ctx.lineWidth = window.brushSize || 5;
                ctx.lineCap = 'round';
                ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
                ctx.stroke();
            };

            canvas.ontouchend = () => isDrawing = false;
        };

        window.setBrushSize = (s) => window.brushSize = s;

        // 4. SHAPES
        window.addShape = () => {
            ctx.fillStyle = document.getElementById('brushColor').value;
            ctx.fillRect(canvas.width/2 - 50, canvas.height/2 - 50, 100, 100); // Simple Square
        };

        function applyCrop() {
            if(!cropper) return;
            const croppedCanvas = cropper.getCroppedCanvas();
            canvas.width = croppedCanvas.width;
            canvas.height = croppedCanvas.height;
            ctx.drawImage(croppedCanvas, 0, 0);
            cropper.destroy();
            cropper = null;
            document.getElementById('editing-img-element').style.display = 'none';
            canvas.style.display = 'block';
        }

        window.saveEditedImage = async () => {
            if(cropper) applyCrop();
            const dataUrl = canvas.toDataURL("image/jpeg");
            
            // In a real app, you'd upload this blob back to ImageBB
            // For now, we allow downloading the edited version
            const link = document.createElement('a');
            link.download = 'scloud-edit.jpg';
            link.href = dataUrl;
            link.click();
            alert("Edited image downloaded! (Upload it to save to cloud)");
            closeEditor();
        };

        loadMedia();
    </script>
</body>
</html>
