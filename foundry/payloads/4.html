<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #000;
        }

        .container {
            width: 100%;
            max-width: 375px; /* Mobile width simulation */
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo Simulation (Swirl) */
        .logo {
            width: 50px;
            height: 50px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 30px;
            font-weight: 600;
            margin: 0 0 30px 0;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .message-box {
            background-color: #f2f2f2; /* Light gray box */
            padding: 20px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 15px;
            line-height: 1.5;
            color: #353535;
            text-align: left;
            margin-bottom: 30px;
        }

        .request-id {
            display: block;
            margin-top: 15px;
            word-break: break-all;
        }

        .btn-retry {
            width: 100%;
            padding: 15px;
            border-radius: 30px; /* Pill shape */
            border: 1px solid #d1d1d1;
            background-color: transparent;
            font-size: 16px;
            cursor: pointer;
            color: #333;
            transition: background 0.2s;
        }

        .btn-retry:hover {
            background-color: #f9f9f9;
        }

        .footer {
            margin-top: 50px;
            font-size: 13px;
            color: #6e6e6e;
            text-align: center;
        }

        .footer a {
            color: #6e6e6e;
            text-decoration: underline;
            margin: 0 5px;
            cursor: pointer;
        }

        /* Loading state */
        .hidden { display: none; }
        #loader { font-size: 1.2rem; color: #666; }
    </style>
</head>
<body>

    <div id="loader">Loading Error...</div>

    <div class="container hidden" id="mainContent">
        <!-- SVG Logo similar to the image style -->
        <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 10 C30 10 15 25 15 45 C15 65 30 80 50 80 C70 80 85 65 85 45 C85 25 70 10 50 10 Z M50 20 C65 20 75 30 75 45 C75 60 65 70 50 70 C35 70 25 60 25 45 C25 30 35 20 50 20 Z" fill="black"/>
            <!-- Simulating the swirl abstractly -->
            <path d="M50 45 L65 30 M50 45 L35 60 M50 45 L65 60" stroke="black" stroke-width="2"/>
        </svg>

        <h1 id="displayTitle">Error</h1>

        <div class="message-box">
            <span id="displayMessage">Loading details...</span>
            <br>
            <span class="request-id">
                Request ID<br>
                <span id="displayCode" style="font-family: monospace; color: #555;"></span>
            </span>
        </div>

        <button class="btn-retry" id="btnRetry">Retry</button>

        <div class="footer">
            <a>Terms of Use</a> | <a>Privacy Policy</a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
        authDomain: "question-metabase.firebaseapp.com",
        databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "question-metabase",
        storageBucket: "question-metabase.firebasestorage.app",
        messagingSenderId: "770698198753",
        appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
        measurementId: "G-6ZP1FPMKSJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadError() {
        // Get 'code' from URL params (?code=XXXX)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (!code) {
            document.getElementById('loader').innerText = "No Error Code Provided.";
            return;
        }

        try {
            const q = query(collection(db, "errors"), where("uniqueCode", "==", code));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                const data = querySnapshot.docs[0].data();

                document.getElementById('displayTitle').innerText = data.title;
                document.getElementById('displayMessage').innerText = data.message;
                document.getElementById('displayCode').innerText = data.uniqueCode;
                
                // Set Retry Button Action
                document.getElementById('btnRetry').onclick = function() {
                    window.location.href = data.retryUrl;
                };

                // Show Content
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
            } else {
                document.getElementById('loader').innerText = "Error Code Not Found.";
            }
        } catch (e) {
            console.error(e);
            document.getElementById('loader').innerText = "System Error loading data.";
        }
    }

    loadError();
</script>

</body>
</html>
