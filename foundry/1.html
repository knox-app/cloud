<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ontology Admin Platform</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sub-text: #6e6e80;
            --border-color: #e5e5e5;
            --btn-bg: #000000;
            --btn-text: #ffffff;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: #f9f9f9;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--bg-color);
            border: 1px solid transparent; 
        }

        @media (max-width: 480px) {
            body { background-color: white; align-items: flex-start; }
            .container { padding: 20px 0; max-width: 100%; }
        }

        h1 {
            font-weight: 700;
            font-size: 32px;
            margin-bottom: 8px;
            letter-spacing: -1px;
            text-align: center;
        }

        p.subtitle {
            color: var(--sub-text);
            text-align: center;
            margin-bottom: 32px;
            font-size: 16px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            transition: 0.2s;
        }

        input:focus { border-color: var(--text-color); }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            color: var(--btn-text);
            background-color: var(--btn-bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="loginContainer" style="opacity: 0; transition: opacity 0.3s;">
        <h1>Ontology</h1>
        <p class="subtitle">Admin Platform Login</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>

            <button type="submit" id="loginBtn">Continue</button>
            <div id="errorMsg" class="error-msg">Invalid credentials.</div>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- AUTO LOGIN CHECK START ---
        // We check this immediately. If user is logged in, we redirect before they type anything.
        function checkAutoLogin() {
            const uid = localStorage.getItem('ontology_uid');
            if (uid) {
                // User is already logged in
                const urlParams = new URLSearchParams(window.location.search);
                const redirectUrl = urlParams.get('id');
                
                if (redirectUrl) {
                    window.location.href = redirectUrl.startsWith('http') ? redirectUrl : 'https://' + redirectUrl;
                } else {
                    window.location.href = '3.html';
                }
                return true; 
            }
            return false;
        }

        // If not logged in, show the UI
        if (!checkAutoLogin()) {
            document.getElementById('loginContainer').style.opacity = '1';
        }
        // --- AUTO LOGIN CHECK END ---

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            loginBtn.innerText = 'Verifying...';
            loginBtn.disabled = true;

            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value;

            try {
                let loggedIn = false;
                let collectionName = 'users';
                let docId = null;

                // 1. Check 'users' collection
                const qUsers = query(collection(db, "users"), where("username", "==", userIn), where("password", "==", passIn));
                const snapUsers = await getDocs(qUsers);

                if (!snapUsers.empty) {
                    loggedIn = true;
                    docId = snapUsers.docs[0].id;
                } else {
                    // 2. Check 'AAS' (Admin) collection
                    const qAdmin = query(collection(db, "AAS"), where("username", "==", userIn), where("password", "==", passIn));
                    const snapAdmin = await getDocs(qAdmin);
                    
                    if (!snapAdmin.empty) {
                        loggedIn = true;
                        collectionName = 'AAS';
                        docId = snapAdmin.docs[0].id;
                    }
                }

                if (loggedIn) {
                    // Save to LocalStorage (Persistent Login)
                    localStorage.setItem('ontology_uid', docId);
                    localStorage.setItem('ontology_col', collectionName);

                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectUrl = urlParams.get('id');

                    if (redirectUrl) {
                        window.location.href = redirectUrl.startsWith('http') ? redirectUrl : 'https://' + redirectUrl;
                    } else {
                        window.location.href = '3.html';
                    }
                } else {
                    throw new Error("Invalid credentials");
                }

            } catch (error) {
                console.error(error);
                errorMsg.style.display = 'block';
                loginBtn.innerText = 'Continue';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
