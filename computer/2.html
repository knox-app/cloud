<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xperts | Production PDF Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- External Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-app: #f8f9fa;
            --bg-paper: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #5f6368;
            --border-color: #dadce0;
            --accent: #1a73e8;
            --toolbar-bg: #ffffff;
            --shadow: 0 1px 3px rgba(0,0,0,0.12);
        }

        [data-theme="dark"] {
            --bg-app: #121212;
            --bg-paper: #1e1e1e;
            --text-main: #e8eaed;
            --text-muted: #9aa0a6;
            --border-color: #3c4043;
            --accent: #8ab4f8;
            --toolbar-bg: #2d2e31;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            transition: background 0.3s ease;
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .toolbar-title { font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .nav-buttons { display: flex; gap: 8px; }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--bg-paper);
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn:hover { background: var(--bg-app); }
        .btn-primary { background: var(--accent); color: white; border: none; }
        .btn-primary:hover { opacity: 0.9; }

        /* Document Layout */
        .viewport {
            margin-top: 80px;
            display: flex;
            justify-content: center;
            padding-bottom: 40px;
        }

        #pdf-content {
            width: 210mm;
            min-height: 297mm;
            background: white;
            color: #000; /* Standard black text for PDF consistency */
            padding: 25mm;
            box-shadow: var(--shadow);
            position: relative;
        }

        [data-theme="dark"] #pdf-content { color: #000; background: white; } /* Keep PDF white even in dark mode for view */

        /* Document Elements Styles */
        .doc-title { font-size: 32pt; font-weight: 700; margin-bottom: 10pt; line-height: 1.2; }
        .doc-author { font-size: 14pt; color: #666; margin-bottom: 40pt; border-bottom: 2px solid #eee; padding-bottom: 10pt; }
        
        h1 { font-size: 24pt; margin-top: 30pt; }
        h2 { font-size: 18pt; margin-top: 20pt; border-left: 4px solid var(--accent); padding-left: 15px; }
        p { font-size: 11pt; line-height: 1.6; margin-bottom: 12pt; text-align: justify; }
        
        ul, ol { margin-bottom: 15pt; }
        li { margin-bottom: 5pt; font-size: 11pt; }

        table { width: 100%; border-collapse: collapse; margin: 20pt 0; }
        th, td { border: 1px solid #ddd; padding: 10pt; text-align: left; font-size: 10pt; }
        th { background: #f4f4f4; font-weight: 600; }

        blockquote { border-left: 4px solid #ccc; margin: 20pt 0; padding: 10pt 20pt; font-style: italic; background: #fafafa; }
        
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; font-family: 'JetBrains Mono', monospace; font-size: 10pt; overflow-x: auto; }

        .chart-box { margin: 30pt 0; height: 350px; page-break-inside: avoid; }
        .divider { border: 0; border-top: 1px solid #eee; margin: 30pt 0; }
        .page-break { page-break-after: always; }

        /* Loader & Errors */
        #status-overlay {
            position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
            background: var(--bg-app); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .error-card { text-align: center; max-width: 400px; padding: 20px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="toolbar-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Xperts Document Generator
        </div>
        <div class="nav-buttons">
            <button class="btn" onclick="toggleTheme()">Theme</button>
            <button class="btn" onclick="location.reload()">Reload</button>
            <button class="btn" onclick="window.print()">Print</button>
            <button class="btn btn-primary" onclick="exportPDF()">Download PDF</button>
        </div>
    </div>

    <div id="status-overlay">
        <div id="loading-spinner" class="spinner"></div>
        <div id="error-message" class="error-card hidden">
            <h2 style="color:#d93025">Error</h2>
            <p id="error-text"></p>
            <button class="btn btn-primary" style="margin: 0 auto" onclick="location.reload()">Retry</button>
        </div>
        <p id="loading-text" style="margin-top: 15px;">Initializing SDK...</p>
    </div>

    <main class="viewport">
        <div id="pdf-content" class="hidden">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29",
            measurementId: "G-000SED73EW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const docId = params.get('id');
        const theme = params.get('theme') || 'light';
        const autoDownload = params.get('download') === 'true';

        document.documentElement.setAttribute('data-theme', theme);

        async function loadDocument() {
            if (!docId) {
                showError("No Document ID provided in URL (?id=...)");
                return;
            }

            try {
                // Based on screenshot, collection name is 'Computers'
                const docRef = doc(db, "Computers", docId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const rawData = docSnap.data();
                    let jsonData;

                    // Support both raw object or stringified field 'JSON'
                    if (typeof rawData.JSON === 'string') {
                        jsonData = JSON.parse(rawData.JSON);
                    } else {
                        jsonData = rawData;
                    }

                    render(jsonData);
                } else {
                    showError(`Document "${docId}" not found in "Computers" collection.`);
                }
            } catch (e) {
                showError("Failed to fetch data: " + e.message);
            }
        }

        function render(data) {
            const container = document.getElementById('pdf-content');
            container.innerHTML = '';

            if (data.title) {
                const title = document.createElement('div');
                title.className = 'doc-title';
                title.textContent = data.title;
                container.appendChild(title);
            }

            if (data.author) {
                const author = document.createElement('div');
                author.className = 'doc-author';
                author.textContent = `Author: ${data.author}`;
                container.appendChild(author);
            }

            if (data.sections) {
                data.sections.forEach((sec, index) => {
                    const element = createSection(sec, index);
                    if (element) container.appendChild(element);
                });
            }

            document.getElementById('status-overlay').classList.add('hidden');
            container.classList.remove('hidden');

            // Render Charts
            data.sections.forEach((sec, index) => {
                if (sec.type === 'chart') buildChart(sec, index);
            });

            if (autoDownload) {
                setTimeout(exportPDF, 1500);
            }
        }

        function createSection(sec, idx) {
            switch(sec.type) {
                case 'heading':
                    const h = document.createElement(`h${sec.level || 1}`);
                    h.textContent = sec.text;
                    return h;
                case 'paragraph':
                    const p = document.createElement('p');
                    p.textContent = sec.text;
                    return p;
                case 'list':
                    const list = document.createElement(sec.style === 'ordered' ? 'ol' : 'ul');
                    sec.items.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item;
                        list.appendChild(li);
                    });
                    return list;
                case 'table':
                    const table = document.createElement('table');
                    if (sec.columns) {
                        const tr = document.createElement('tr');
                        sec.columns.forEach(c => { const th = document.createElement('th'); th.textContent = c; tr.appendChild(th); });
                        table.appendChild(tr);
                    }
                    sec.rows.forEach(r => {
                        const tr = document.createElement('tr');
                        r.forEach(val => { const td = document.createElement('td'); td.textContent = val; tr.appendChild(td); });
                        table.appendChild(tr);
                    });
                    return table;
                case 'quote':
                    const bq = document.createElement('blockquote');
                    bq.textContent = sec.text;
                    return bq;
                case 'code':
                    const pre = document.createElement('pre');
                    pre.textContent = sec.text;
                    return pre;
                case 'image':
                    const img = document.createElement('img');
                    img.src = sec.url;
                    img.style.maxWidth = '100%';
                    return img;
                case 'chart':
                    const div = document.createElement('div');
                    div.className = 'chart-box';
                    const canvas = document.createElement('canvas');
                    canvas.id = `chart-${idx}`;
                    div.appendChild(canvas);
                    return div;
                case 'divider':
                    const hr = document.createElement('hr');
                    hr.className = 'divider';
                    return hr;
                case 'page-break':
                    const pb = document.createElement('div');
                    pb.className = 'page-break';
                    return pb;
                default: return null;
            }
        }

        function buildChart(sec, idx) {
            const ctx = document.getElementById(`chart-${idx}`).getContext('2d');
            new Chart(ctx, {
                type: (sec.chartType || 'bar').toLowerCase(),
                data: {
                    labels: sec.labels || [],
                    datasets: [{
                        label: sec.title || 'Data',
                        data: sec.values || [],
                        backgroundColor: ['#4285F4', '#34A853', '#FBBC05', '#EA4335', '#9C27B0'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        function showError(msg) {
            document.getElementById('loading-spinner').classList.add('hidden');
            document.getElementById('loading-text').classList.add('hidden');
            const err = document.getElementById('error-message');
            err.classList.remove('hidden');
            document.getElementById('error-text').textContent = msg;
        }

        window.toggleTheme = () => {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        };

        window.exportPDF = () => {
            const element = document.getElementById('pdf-content');
            const opt = {
                margin: 0,
                filename: `document_${docId}.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] }
            };
            html2pdf().set(opt).from(element).save();
        };

        loadDocument();
    </script>
</body>
</html>
