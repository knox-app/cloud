<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX Generator Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .slide-preview { aspect-ratio: 16 / 9; background: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-radius: 12px; overflow-y: auto; padding: 2.5rem; margin-bottom: 2.5rem; border: 1px solid #e2e8f0; position: relative; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: white; border: 1px solid #e2e8f0; }
        .btn-secondary:hover { background: #f1f5f9; }
        .table-preview td, .table-preview th { border: 1px solid #e2e8f0; padding: 10px; text-align: left; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg"><i class="fas fa-file-powerpoint text-xl"></i></div>
            <h1 class="text-xl font-bold tracking-tight">Presentation <span class="text-blue-600">Studio</span></h1>
        </div>
        <div id="toolbar" class="hidden flex gap-3">
            <button onclick="location.reload()" class="btn btn-secondary"><i class="fas fa-sync-alt"></i> Reload</button>
            <button id="downloadBtn" class="btn btn-primary"><i class="fas fa-download"></i> Download PPTX</button>
        </div>
    </nav>

    <main id="app" class="flex-1 max-w-5xl mx-auto w-full p-6">
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-medium">Fetching Firestore Data...</p>
        </div>

        <div id="error" class="hidden bg-red-50 border border-red-200 text-red-700 px-6 py-4 rounded-lg my-10">
            <div class="flex items-center gap-3">
                <i class="fas fa-exclamation-circle text-xl"></i>
                <p id="errorMessage" class="font-medium"></p>
            </div>
        </div>

        <div id="content" class="hidden">
            <div class="mb-8 border-b pb-6">
                <h2 id="docTitle" class="text-4xl font-extrabold text-slate-900"></h2>
                <p id="docAuthor" class="text-slate-500 text-lg mt-2"></p>
            </div>
            <div id="previewContainer"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let presentationData = null;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('id');
            const autoDownload = urlParams.get('download') === 'true';

            if (!docId) {
                showError("Missing Document ID. Use ?id=YOUR_ID in the URL.");
                return;
            }

            try {
                // We try "Computers" first because that's where the image shows the data is, 
                // falling back to "documents" as per original text requirement.
                let docSnap = await getDoc(doc(db, "Computers", docId));
                if (!docSnap.exists()) {
                    docSnap = await getDoc(doc(db, "documents", docId));
                }

                if (docSnap.exists()) {
                    let rawData = docSnap.data();
                    // Extracting the JSON field specifically as seen in the Firestore screenshot
                    if (rawData.JSON && typeof rawData.JSON === 'string') {
                        presentationData = JSON.parse(rawData.JSON);
                    } else if (rawData.JSON) {
                        presentationData = rawData.JSON;
                    } else {
                        presentationData = rawData;
                    }
                    
                    renderPreview(presentationData);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    document.getElementById('toolbar').classList.remove('hidden');

                    if (autoDownload) generatePPTX();
                } else {
                    showError(`Document ID "${docId}" not found in "Computers" or "documents" collections.`);
                }
            } catch (e) {
                showError("Firestore Error: " + e.message);
            }
        }

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = msg;
        }

        function renderPreview(data) {
            document.getElementById('docTitle').innerText = data.title || "Presentation";
            document.getElementById('docAuthor').innerText = data.author ? `Author: ${data.author}` : "";
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';

            (data.slides || []).forEach((slide, idx) => {
                const div = document.createElement('div');
                div.className = 'slide-preview';
                let html = `<span class="absolute top-4 right-6 text-slate-200 font-bold text-2xl">${idx + 1}</span>`;
                
                if (slide.title) html += `<h3 class="text-3xl font-bold text-blue-600 mb-2">${slide.title}</h3>`;
                if (slide.subtitle) html += `<h4 class="text-xl text-slate-500 mb-6 font-medium">${slide.subtitle}</h4>`;
                if (slide.content) {
                    const contents = Array.isArray(slide.content) ? slide.content : [slide.content];
                    contents.forEach(p => html += `<p class="text-slate-700 mb-4 leading-relaxed text-lg">${p}</p>`);
                }
                if (slide.bullets) {
                    html += `<ul class="list-disc list-inside text-slate-700 space-y-2 text-lg mb-6">`;
                    slide.bullets.forEach(b => html += `<li>${b}</li>`);
                    html += `</ul>`;
                }
                if (slide.table) {
                    html += `<table class="table-preview w-full mt-4 text-base">`;
                    if (slide.table.columns) html += `<tr class="bg-slate-100 font-bold">` + slide.table.columns.map(c => `<th>${c}</th>`).join('') + `</tr>`;
                    if (slide.table.rows) slide.table.rows.forEach(r => html += `<tr>` + r.map(c => `<td>${c}</td>`).join('') + `</tr>`);
                    html += `</table>`;
                }
                div.innerHTML = html;
                container.appendChild(div);
            });
        }

        async function generatePPTX() {
            if (!presentationData) return;
            const pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_16x9';

            // Cover Slide
            let cover = pptx.addSlide();
            cover.addText(presentationData.title || "Presentation", { x: 1, y: 2, w: '80%', fontSize: 44, bold: true, color: '2563EB' });
            cover.addText(presentationData.author || "", { x: 1, y: 3.2, w: '80%', fontSize: 20, color: '64748B' });

            // Content Slides
            (presentationData.slides || []).forEach(item => {
                let slide = pptx.addSlide();
                let y = 0.5;

                if (item.title) {
                    slide.addText(item.title, { x: 0.5, y: 0.4, w: '90%', fontSize: 32, bold: true, color: '2563EB' });
                    y = 1.1;
                }
                if (item.subtitle) {
                    slide.addText(item.subtitle, { x: 0.5, y: y, w: '90%', fontSize: 18, color: '64748B' });
                    y += 0.6;
                }
                if (item.content) {
                    const lines = Array.isArray(item.content) ? item.content : [item.content];
                    lines.forEach(text => {
                        slide.addText(text, { x: 0.5, y: y, w: '90%', fontSize: 14, color: '1E293B' });
                        y += 0.8;
                    });
                }
                if (item.bullets) {
                    slide.addText(item.bullets.map(b => ({ text: b, options: { bullet: true } })), { x: 0.5, y: y, w: '90%', fontSize: 14, color: '1E293B' });
                    y += (item.bullets.length * 0.4);
                }
                if (item.table) {
                    let rows = [];
                    if (item.table.columns) rows.push(item.table.columns.map(c => ({ text: c, options: { fill: '2563EB', color: 'FFFFFF', bold: true } })));
                    if (item.table.rows) item.table.rows.forEach(r => rows.push(r));
                    slide.addTable(rows, { x: 0.5, y: y, w: 9, border: { pt: 1, color: 'E2E8F0' }, fontSize: 12 });
                }
            });

            pptx.writeFile({ fileName: `${(presentationData.title || 'presentation').replace(/\s+/g, '_')}.pptx` });
        }

        document.getElementById('downloadBtn').addEventListener('click', generatePPTX);
        init();
    </script>
</body>
</html>
