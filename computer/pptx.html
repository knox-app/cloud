<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise PPTX Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .slide-preview { 
            aspect-ratio: 16 / 9; 
            background: white; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); 
            border-radius: 12px; 
            overflow: hidden; 
            margin-bottom: 2.5rem; 
            position: relative;
            border: 1px solid #e2e8f0;
        }
        .slide-inner { padding: 3rem; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 10; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 0.6rem; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-secondary { background: white; border: 1px solid #e2e8f0; color: #475569; }
        .btn-secondary:hover { background: #f8fafc; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; border-radius: 8px; overflow: hidden; }
        th { text-align: left; padding: 12px; font-weight: 700; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .shape-blob { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.4; z-index: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg shadow-lg">
                <i class="fas fa-file-powerpoint text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-extrabold leading-none">SlideGen <span class="text-blue-600">Pro</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Firestore-to-PPTX Engine</p>
            </div>
        </div>
        <div id="toolbar" class="hidden flex gap-3">
            <button onclick="location.reload()" class="btn btn-secondary"><i class="fas fa-sync-alt"></i> Reload</button>
            <button id="downloadBtn" class="btn btn-primary"><i class="fas fa-cloud-download-alt"></i> Export PPTX</button>
        </div>
    </nav>

    <main class="flex-1 max-w-5xl mx-auto w-full p-8">
        <div id="loading" class="flex flex-col items-center justify-center py-32">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-semibold">Accessing Firestore Document Stream...</p>
        </div>

        <div id="error" class="hidden bg-red-50 border-l-4 border-red-500 p-6 rounded shadow-sm">
            <div class="flex items-center gap-4">
                <i class="fas fa-exclamation-triangle text-red-500 text-2xl"></i>
                <div>
                    <h3 class="text-red-800 font-bold">Fetch Error</h3>
                    <p id="errorMessage" class="text-red-700"></p>
                </div>
            </div>
        </div>

        <div id="content" class="hidden">
            <div class="mb-10">
                <h2 id="docTitle" class="text-4xl font-black text-slate-900 tracking-tight"></h2>
                <div id="themeInfo" class="mt-2 flex gap-4 text-sm font-bold uppercase tracking-wider text-slate-400"></div>
            </div>
            <div id="previewContainer"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29",
            measurementId: "G-000SED73EW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let presentation = null;

        const hex = (h) => h ? h.replace('#', '') : '000000';

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const docId = params.get('id');
            const autoDL = params.get('download') === 'true';

            if (!docId) return showError("Document ID missing. Please append ?id=DOCUMENT_ID to URL.");

            try {
                // Check 'Computers' then 'documents'
                let snap = await getDoc(doc(db, "Computers", docId));
                if (!snap.exists()) snap = await getDoc(doc(db, "documents", docId));

                if (snap.exists()) {
                    const data = snap.data();
                    presentation = (typeof data.JSON === 'string') ? JSON.parse(data.JSON) : (data.JSON || data);
                    render();
                    if (autoDL) generate();
                } else {
                    showError(`Resource "${docId}" not found in Firestore.`);
                }
            } catch (e) {
                showError(`System Error: ${e.message}`);
            }
        }

        function showError(m) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = m;
        }

        function render() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('toolbar').classList.remove('hidden');
            document.getElementById('docTitle').innerText = presentation.title || "Untitled Presentation";
            
            const theme = presentation.theme || {};
            document.getElementById('themeInfo').innerHTML = `
                <span><i class="fas fa-font mr-1"></i> ${theme.font || 'Inter'}</span>
                <span><i class="fas fa-palette mr-1" style="color:${theme.primaryColor}"></i> Primary: ${theme.primaryColor}</span>
            `;

            const container = document.getElementById('previewContainer');
            container.innerHTML = '';

            presentation.slides.forEach((s) => {
                const el = document.createElement('div');
                el.className = 'slide-preview';
                el.style.backgroundColor = s.background || theme.background || '#FFFFFF';
                
                let innerHtml = '<div class="slide-inner">';
                
                // Add decorations
                (s.elements || []).forEach(item => {
                    if (item.type === 'blob') {
                        const pos = item.position === 'top-right' ? 'top: -50px; right: -50px;' : 'bottom: -50px; left: -50px;';
                        innerHtml += `<div class="shape-blob" style="width: 300px; height: 300px; background: ${item.color}; ${pos}"></div>`;
                    }
                });

                if (s.layout === 'title') {
                    innerHtml += `
                        <div class="flex flex-col items-center justify-center h-full text-center">
                            <h3 class="font-black text-slate-900 mb-2" style="font-size: ${s.title.fontSize}px">${s.title.text}</h3>
                            <p class="text-slate-500 font-bold" style="font-size: ${s.subtitle.fontSize}px">${s.subtitle.text}</p>
                        </div>`;
                } else if (s.layout === 'content' || s.layout === 'list') {
                    innerHtml += `<h3 class="text-3xl font-black mb-6 text-slate-900 border-l-4 pl-4" style="border-color:${theme.primaryColor}">${s.heading}</h3>`;
                    if (s.paragraphs) {
                        s.paragraphs.forEach(p => innerHtml += `<p class="text-xl text-slate-600 mb-4 leading-relaxed">${p}</p>`);
                    }
                    if (s.bullets) {
                        innerHtml += `<ul class="space-y-3">${s.bullets.map(b => `<li class="flex items-center gap-3 text-lg font-semibold text-slate-700"><i class="fas fa-circle text-[8px]" style="color:${theme.primaryColor}"></i>${b}</li>`).join('')}</ul>`;
                    }
                } else if (s.layout === 'table') {
                    innerHtml += `<h3 class="text-3xl font-black mb-6 text-slate-900">${s.heading}</h3>`;
                    innerHtml += `<table>
                        <thead style="background:${theme.primaryColor}; color:white"><tr>${s.table.columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
                        <tbody>${s.table.rows.map(r => `<tr>${r.map(v => `<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
                    </table>`;
                } else if (s.layout === 'chart') {
                    innerHtml += `<h3 class="text-3xl font-black mb-6 text-slate-900">${s.heading}</h3>`;
                    innerHtml += `<div class="flex items-end gap-4 h-48 mt-10">
                        ${s.chart.values.map((v, i) => `
                            <div class="flex-1 flex flex-col items-center gap-2">
                                <div class="w-full rounded-t-lg" style="height: ${v*5}px; background:${theme.primaryColor}"></div>
                                <span class="text-xs font-bold text-slate-400">${s.chart.labels[i]}</span>
                            </div>`).join('')}
                    </div>`;
                } else if (s.layout === 'quote') {
                    innerHtml += `<div class="flex flex-col items-center justify-center h-full text-center px-12">
                        <i class="fas fa-quote-left text-5xl mb-6 opacity-10" style="color:${theme.primaryColor}"></i>
                        <h3 class="text-4xl font-black italic text-slate-800 leading-tight mb-4">"${s.quote}"</h3>
                        <p class="text-xl font-bold uppercase tracking-widest" style="color:${theme.primaryColor}">— ${s.author}</p>
                    </div>`;
                }

                innerHtml += '</div>';
                el.innerHTML = innerHtml;
                container.appendChild(el);
            });
        }

        async function generate() {
            const pptx = new PptxGenJS();
            const theme = presentation.theme || {};
            const primary = hex(theme.primaryColor);
            const font = theme.font || "Arial";

            presentation.slides.forEach(s => {
                const slide = pptx.addSlide();
                const bg = hex(s.background || theme.background || '#FFFFFF');
                slide.background = { color: bg };

                // Handle decorations
                (s.elements || []).forEach(item => {
                    if (item.type === 'blob' || item.type === 'circle') {
                        const opts = item.position === 'top-right' ? { x: 8, y: -1, w: 3, h: 3 } : { x: -1, y: 4, w: 3, h: 3 };
                        slide.addShape(pptx.ShapeType.ellipse, { ...opts, fill: { color: hex(item.color), transparency: 50 } });
                    }
                    if (item.type === 'rectangle' && item.position === 'left-accent') {
                        slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 0.2, h: '100%', fill: { color: primary } });
                    }
                });

                if (s.layout === 'title') {
                    slide.addText(s.title.text, { x: 0, y: '40%', w: '100%', align: 'center', fontSize: s.title.fontSize || 44, bold: true, color: '0F172A', fontFace: font });
                    slide.addText(s.subtitle.text, { x: 0, y: '52%', w: '100%', align: 'center', fontSize: s.subtitle.fontSize || 20, color: '64748B', fontFace: font });
                } else if (s.layout === 'content' || s.layout === 'list') {
                    slide.addText(s.heading, { x: 0.5, y: 0.5, w: '90%', fontSize: 32, bold: true, color: primary, fontFace: font });
                    let y = 1.3;
                    if (s.paragraphs) {
                        s.paragraphs.forEach(p => { slide.addText(p, { x: 0.6, y: y, w: '85%', fontSize: 18, color: '334155', fontFace: font }); y += 0.8; });
                    }
                    if (s.bullets) {
                        slide.addText(s.bullets.map(b => b), { x: 0.6, y: y, w: '85%', fontSize: 18, color: '334155', bullet: { type: 'bullet', color: primary }, fontFace: font });
                    }
                } else if (s.layout === 'table') {
                    slide.addText(s.heading, { x: 0.5, y: 0.5, w: '90%', fontSize: 32, bold: true, color: primary, fontFace: font });
                    const rows = [s.table.columns.map(c => ({ text: c, options: { bold: true, fill: primary, color: 'FFFFFF' } })), ...s.table.rows];
                    slide.addTable(rows, { x: 0.5, y: 1.5, w: 9, border: { pt: 1, color: 'E2E8F0' }, fontSize: 14, fontFace: font });
                } else if (s.layout === 'chart') {
                    slide.addText(s.heading, { x: 0.5, y: 0.5, w: '90%', fontSize: 32, bold: true, color: primary, fontFace: font });
                    slide.addChart(pptx.ChartType.bar, [{ name: 'Growth', labels: s.chart.labels, values: s.chart.values }], { x: 1, y: 1.8, w: 8, h: 3.5, barDir: 'col', chartColors: [primary] });
                } else if (s.layout === 'quote') {
                    slide.addText(`"${s.quote}"`, { x: 1, y: 2.2, w: 8, align: 'center', fontSize: 36, italic: true, bold: true, color: '1E293B', fontFace: font });
                    slide.addText(`— ${s.author}`, { x: 1, y: 3.8, w: 8, align: 'center', fontSize: 18, bold: true, color: primary, fontFace: font });
                }
            });

            pptx.writeFile({ fileName: `${(presentation.title || 'presentation').replace(/\s+/g, '_')}.pptx` });
        }

        document.getElementById('downloadBtn').onclick = generate;
        init();
    </script>
</body>
    </html>
