<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX Generator Pro</title>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
        }

        .slide-preview {
            aspect-ratio: 16 / 9;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow-y: auto;
            position: relative;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: white; border: 1px solid #e2e8f0; }
        .btn-secondary:hover { background: #f1f5f9; }

        pre { white-space: pre-wrap; word-wrap: break-word; }
        
        .table-preview td, .table-preview th {
            border: 1px solid #e2e8f0;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Toolbar -->
    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
                <i class="fas fa-file-powerpoint text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Presentation <span class="text-blue-600">Studio</span></h1>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="btn btn-secondary">
                <i class="fas fa-sync-alt"></i> Reload
            </button>
            <button onclick="scrollToPreview()" class="btn btn-secondary">
                <i class="fas fa-eye"></i> Preview
            </button>
            <button id="downloadBtn" class="btn btn-primary">
                <i class="fas fa-download"></i> Download PPTX
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app" class="flex-1 max-w-5xl mx-auto w-full p-6">
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-medium">Fetching your data from Firestore...</p>
        </div>

        <div id="error" class="hidden bg-red-50 border border-red-200 text-red-700 px-6 py-4 rounded-lg my-10">
            <div class="flex items-center gap-3">
                <i class="fas fa-exclamation-circle text-xl"></i>
                <p id="errorMessage" class="font-medium"></p>
            </div>
        </div>

        <div id="content" class="hidden">
            <div class="mb-8">
                <h2 id="docTitle" class="text-3xl font-bold text-slate-800">Presentation</h2>
                <p id="docAuthor" class="text-slate-500 mt-1">Author: Loading...</p>
            </div>
            
            <div id="previewContainer">
                <!-- Slides will be injected here -->
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29",
            measurementId: "G-000SED73EW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let presentationData = null;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('id');
            const autoDownload = urlParams.get('download') === 'true';

            if (!docId) {
                showError("No Document ID provided in URL. Use ?id=YOUR_ID");
                return;
            }

            try {
                const docRef = doc(db, "documents", docId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    let data = docSnap.data();
                    // Handle if the JSON is stored as a string inside a 'JSON' field
                    if (data.JSON && typeof data.JSON === 'string') {
                        presentationData = JSON.parse(data.JSON);
                    } else {
                        presentationData = data;
                    }
                    
                    renderPreview(presentationData);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');

                    if (autoDownload) {
                        generatePPTX();
                    }
                } else {
                    showError(`Document "${docId}" not found in "documents" collection.`);
                }
            } catch (e) {
                console.error(e);
                showError("Failed to fetch data: " + e.message);
            }
        }

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = msg;
        }

        window.scrollToPreview = () => {
            document.getElementById('previewContainer').scrollIntoView({ behavior: 'smooth' });
        };

        function renderPreview(data) {
            document.getElementById('docTitle').innerText = data.title || "Untitled Presentation";
            document.getElementById('docAuthor').innerText = "Author: " + (data.author || "Unknown");
            
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';

            if (data.slides && Array.isArray(data.slides)) {
                data.slides.forEach((slide, index) => {
                    const slideDiv = document.createElement('div');
                    slideDiv.className = 'slide-preview';
                    
                    let html = `<div class="absolute top-4 right-4 text-slate-300 font-bold text-xl">${index + 1}</div>`;
                    
                    if (slide.title) html += `<h3 class="text-2xl font-bold text-blue-700 mb-2">${slide.title}</h3>`;
                    if (slide.subtitle) html += `<h4 class="text-xl text-slate-600 mb-4">${slide.subtitle}</h4>`;
                    if (slide.heading) html += `<h4 class="text-lg font-semibold text-slate-800 mt-4 mb-2">${slide.heading}</h4>`;
                    
                    if (slide.content) {
                        const contents = Array.isArray(slide.content) ? slide.content : [slide.content];
                        contents.forEach(p => html += `<p class="text-slate-700 mb-3 leading-relaxed">${p}</p>`);
                    }

                    if (slide.bullets) {
                        html += `<ul class="list-disc list-inside text-slate-700 mb-4 space-y-1">`;
                        slide.bullets.forEach(b => html += `<li>${b}</li>`);
                        html += `</ul>`;
                    }

                    if (slide.numberedList) {
                        html += `<ol class="list-decimal list-inside text-slate-700 mb-4 space-y-1">`;
                        slide.numberedList.forEach(n => html += `<li>${n}</li>`);
                        html += `</ol>`;
                    }

                    if (slide.quote) {
                        html += `<blockquote class="border-l-4 border-blue-500 pl-4 italic text-slate-600 my-6 text-lg">"${slide.quote}"</blockquote>`;
                    }

                    if (slide.table) {
                        html += `<div class="overflow-x-auto mt-4"><table class="table-preview w-full text-sm">`;
                        if (slide.table.columns) {
                            html += `<tr class="bg-slate-50">` + slide.table.columns.map(c => `<th class="font-bold">${c}</th>`).join('') + `</tr>`;
                        }
                        if (slide.table.rows) {
                            slide.table.rows.forEach(row => {
                                html += `<tr>` + row.map(cell => `<td>${cell}</td>`).join('') + `</tr>`;
                            });
                        }
                        html += `</table></div>`;
                    }

                    if (slide.image) {
                        html += `<div class="mt-4 p-4 bg-slate-100 rounded text-center text-slate-400 border-2 border-dashed border-slate-200">
                                    <i class="fas fa-image text-2xl mb-1"></i><br>Image: ${slide.image}
                                 </div>`;
                    }

                    if (slide.chart) {
                        html += `<div class="mt-4 p-4 bg-blue-50 rounded text-center text-blue-400 border-2 border-dashed border-blue-100">
                                    <i class="fas fa-chart-bar text-2xl mb-1"></i><br>Chart Data Included
                                 </div>`;
                    }

                    slideDiv.innerHTML = html;
                    container.appendChild(slideDiv);
                });
            }
        }

        async function generatePPTX() {
            if (!presentationData) return;

            const pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_16x9';
            pptx.author = presentationData.author || "Xperts Ed-Tech";
            pptx.title = presentationData.title || "Presentation";

            // Define Theme Constants
            const COLORS = { primary: '2563EB', text: '1E293B', secondary: '64748B', white: 'FFFFFF', bg: 'F8FAFC' };
            const FONTS = { heading: 'Arial', body: 'Verdana' };

            // Cover Slide
            let cover = pptx.addSlide();
            cover.background = { color: COLORS.bg };
            cover.addText(presentationData.title || "Presentation", { 
                x: '10%', y: '35%', w: '80%', fontSize: 44, bold: true, color: COLORS.primary, fontFace: FONTS.heading 
            });
            cover.addText(`Prepared by: ${presentationData.author || "Author"}`, { 
                x: '10%', y: '55%', w: '80%', fontSize: 18, color: COLORS.secondary, fontFace: FONTS.body 
            });
            cover.addShape(pptx.ShapeType.rect, { x: 0, y: '90%', w: '100%', h: '10%', fill: { color: COLORS.primary } });

            // Content Slides
            if (presentationData.slides && Array.isArray(presentationData.slides)) {
                presentationData.slides.forEach(item => {
                    let slide = pptx.addSlide();
                    let currentY = 0.5;

                    // Title
                    if (item.title) {
                        slide.addText(item.title, { 
                            x: 0.5, y: 0.4, w: '90%', fontSize: 32, bold: true, color: COLORS.primary, fontFace: FONTS.heading 
                        });
                        currentY = 1.2;
                    }

                    // Subtitle / Heading
                    const sub = item.subtitle || item.heading;
                    if (sub) {
                        slide.addText(sub, { 
                            x: 0.5, y: currentY, w: '90%', fontSize: 20, color: COLORS.secondary, fontFace: FONTS.body 
                        });
                        currentY += 0.6;
                    }

                    // Paragraphs
                    if (item.content) {
                        const contents = Array.isArray(item.content) ? item.content : [item.content];
                        contents.forEach(text => {
                            slide.addText(text, { 
                                x: 0.5, y: currentY, w: '90%', fontSize: 14, color: COLORS.text, fontFace: FONTS.body 
                            });
                            currentY += 0.8;
                        });
                    }

                    // Bullets
                    if (item.bullets) {
                        slide.addText(item.bullets.map(b => b), { 
                            x: 0.5, y: currentY, w: '90%', fontSize: 14, color: COLORS.text, bullet: true, fontFace: FONTS.body 
                        });
                        currentY += (item.bullets.length * 0.4);
                    }

                    // Numbered List
                    if (item.numberedList) {
                        slide.addText(item.numberedList.map(b => b), { 
                            x: 0.5, y: currentY, w: '90%', fontSize: 14, color: COLORS.text, bullet: { type: 'number' }, fontFace: FONTS.body 
                        });
                        currentY += (item.numberedList.length * 0.4);
                    }

                    // Quote
                    if (item.quote) {
                        slide.addShape(pptx.ShapeType.rect, { x: 0.5, y: currentY, w: 0.05, h: 0.8, fill: { color: COLORS.primary } });
                        slide.addText(item.quote, { 
                            x: 0.7, y: currentY, w: '85%', fontSize: 18, italic: true, color: COLORS.secondary, fontFace: FONTS.body 
                        });
                        currentY += 1.2;
                    }

                    // Table
                    if (item.table && item.table.rows) {
                        let tableData = [];
                        if (item.table.columns) {
                            tableData.push(item.table.columns.map(c => ({ text: c, options: { bold: true, fill: COLORS.primary, color: COLORS.white } })));
                        }
                        item.table.rows.forEach(r => tableData.push(r));
                        
                        slide.addTable(tableData, { 
                            x: 0.5, y: currentY, w: 9, border: { pt: 1, color: 'E2E8F0' }, 
                            fontSize: 12, fontFace: FONTS.body, color: COLORS.text 
                        });
                        currentY += 2;
                    }

                    // Image
                    if (item.image) {
                        try {
                            slide.addImage({ path: item.image, x: 5.5, y: 1.5, w: 4, h: 3 });
                        } catch(e) { console.warn("Image load failed", e); }
                    }

                    // Chart (Simple Bar Chart implementation)
                    if (item.chart && item.chart.data) {
                        let dataChart = [
                            {
                                name: item.chart.title || "Data",
                                labels: item.chart.labels || [],
                                values: item.chart.data || []
                            }
                        ];
                        slide.addChart(pptx.ChartType.bar, dataChart, { x: 0.5, y: currentY, w: 9, h: 3 });
                    }
                });
            }

            const fileName = (presentationData.title || "presentation").toLowerCase().replace(/\s+/g, '-') + ".pptx";
            pptx.writeFile({ fileName });
        }

        document.getElementById('downloadBtn').addEventListener('click', generatePPTX);

        // Run app
        init();
    </script>
</body>
      </html>
