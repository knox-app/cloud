<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xperts Data Editor & Excel Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .editable-cell:focus { outline: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .dark .editable-cell:focus { background: rgba(59, 130, 246, 0.2); }
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        .dark .table-container { border-color: #1e293b; }
        th { background: #f8fafc; text-align: left; padding: 12px; font-weight: 600; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; }
        .dark th { background: #1e293b; border-bottom-color: #334155; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; min-width: 120px; }
        .dark td { border-bottom-color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-3">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="table-2"></i></div>
                <div>
                    <h1 id="main-title" class="font-bold text-lg leading-none">Excel Editor</h1>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 mt-1 font-bold">Cloud Firestore Sync</p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button id="editBtn" onclick="toggleEditMode()" class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition font-semibold">
                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                    <span>Edit Data</span>
                </button>
                <div class="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-2"></div>
                <button onclick="toggleDarkMode()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition"><i data-lucide="moon" id="theme-icon"></i></button>
                <button onclick="location.reload()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition"><i data-lucide="refresh-cw"></i></button>
                <button id="downloadBtn" onclick="generateExcel()" disabled class="ml-2 flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-bold transition disabled:opacity-30">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    Export Excel
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-[1600px] w-full mx-auto p-6">
        <div id="loader" class="flex flex-col items-center justify-center py-32 space-y-4">
            <div class="loader"></div>
            <p class="text-slate-500 font-medium animate-pulse">Fetching document from Computers collection...</p>
        </div>

        <div id="error-screen" class="hidden py-20 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4"><i data-lucide="alert-circle"></i></div>
            <h2 class="text-xl font-bold mb-2">Sync Failed</h2>
            <p id="error-text" class="text-slate-500 max-w-md mb-6"></p>
            <button onclick="location.reload()" class="px-6 py-2 bg-slate-200 rounded-lg font-bold">Try Again</button>
        </div>

        <!-- Sheet Display -->
        <div id="sheet-container" class="hidden space-y-10 animate-in fade-in duration-500">
            <!-- Tabs for multiple sheets if necessary, or scroll sequence -->
            <div id="sheets-wrapper" class="space-y-12"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0q4Evwirxr4loAZ2ZzGVfKP-51oSi14",
            authDomain: "xperts-ed-tech.firebaseapp.com",
            projectId: "xperts-ed-tech",
            storageBucket: "xperts-ed-tech.firebasestorage.app",
            messagingSenderId: "960602403596",
            appId: "1:960602403596:web:fdf87f7b9a6181b6db4f29",
            measurementId: "G-000SED73EW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeData = null;
        let isEditing = false;

        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        };

        window.toggleEditMode = () => {
            isEditing = !isEditing;
            const btn = document.getElementById('editBtn');
            const cells = document.querySelectorAll('.editable-cell');
            
            if (isEditing) {
                btn.classList.add('bg-blue-50', 'border-blue-300', 'text-blue-600', 'dark:bg-blue-900/30');
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i><span>Finish Editing</span>`;
                cells.forEach(c => c.contentEditable = "true");
            } else {
                btn.classList.remove('bg-blue-50', 'border-blue-300', 'text-blue-600', 'dark:bg-blue-900/30');
                btn.innerHTML = `<i data-lucide="edit-3" class="w-4 h-4"></i><span>Edit Data</span>`;
                cells.forEach(c => c.contentEditable = "false");
                syncDataFromTable();
            }
            lucide.createIcons();
        };

        async function init() {
            const id = new URLSearchParams(window.location.search).get('id');
            const autoDownload = new URLSearchParams(window.location.search).get('download') === 'true';

            if (!id) {
                showError("No document ID provided in the URL.");
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "Computers", id));
                if (docSnap.exists()) {
                    const raw = docSnap.data().JSON;
                    activeData = typeof raw === 'string' ? JSON.parse(raw) : raw;
                    renderSheets(activeData);
                    if (autoDownload) generateExcel();
                } else {
                    showError(`Document [${id}] not found in collection 'Computers'.`);
                }
            } catch (err) {
                showError(err.message);
            }
        }

        function renderSheets(data) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('sheet-container').classList.remove('hidden');
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('main-title').innerText = data.title || "Excel Report";

            const wrapper = document.getElementById('sheets-wrapper');
            wrapper.innerHTML = "";

            if (data.worksheets) {
                data.worksheets.forEach((ws, idx) => {
                    const section = document.createElement('div');
                    section.innerHTML = `
                        <div class="flex items-center gap-2 mb-4">
                            <span class="bg-slate-200 dark:bg-slate-700 px-3 py-1 rounded-md text-xs font-bold">${idx + 1}</span>
                            <h2 class="font-bold text-lg">${ws.name}</h2>
                        </div>
                        <div class="table-container shadow-sm bg-white dark:bg-slate-800">
                            <table class="w-full border-collapse" data-sheet-index="${idx}">
                                <thead><tr>${ws.columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
                                <tbody>
                                    ${ws.rows.map(row => `
                                        <tr>${row.map(cell => `<td class="editable-cell text-sm" contenteditable="false">${cell}</td>`).join('')}</tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                    wrapper.appendChild(section);
                });
            }
            lucide.createIcons();
        }

        function syncDataFromTable() {
            const tables = document.querySelectorAll('table[data-sheet-index]');
            tables.forEach(table => {
                const idx = table.getAttribute('data-sheet-index');
                const rows = [];
                const tbodyRows = table.querySelectorAll('tbody tr');
                
                tbodyRows.forEach(tr => {
                    const rowData = [];
                    tr.querySelectorAll('td').forEach(td => rowData.push(td.innerText));
                    rows.push(rowData);
                });
                activeData.worksheets[idx].rows = rows;
            });
        }

        window.generateExcel = async () => {
            if (isEditing) toggleEditMode(); // Ensure data is synced
            
            const workbook = new ExcelJS.Workbook();
            workbook.creator = activeData.author || "Xperts System";
            
            activeData.worksheets.forEach(ws => {
                const sheet = workbook.addWorksheet(ws.name);
                const headerRow = sheet.addRow(ws.columns);
                
                // Style Header
                headerRow.eachCell(cell => {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2563EB' } };
                    cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                    cell.alignment = { vertical: 'middle', horizontal: 'left' };
                });

                // Add Data
                ws.rows.forEach((r, i) => {
                    const row = sheet.addRow(r);
                    if (i % 2 !== 0) row.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };
                    row.eachCell(cell => {
                        cell.border = { 
                            top: {style:'thin', color: {argb:'FFE2E8F0'}},
                            left: {style:'thin', color: {argb:'FFE2E8F0'}},
                            bottom: {style:'thin', color: {argb:'FFE2E8F0'}},
                            right: {style:'thin', color: {argb:'FFE2E8F0'}}
                        };
                        if (!isNaN(cell.value) && cell.value !== "") cell.numFmt = '#,##0';
                    });
                });

                sheet.autoFilter = { from: { row: 1, column: 1 }, to: { row: 1, column: ws.columns.length } };
                sheet.views = [{ state: 'frozen', xSplit: 0, ySplit: 1 }];
                sheet.columns.forEach(col => col.width = 18);
            });

            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `${activeData.title.replace(/\s+/g, '_')}.xlsx`);
        };

        function showError(msg) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
            document.getElementById('error-text').innerText = msg;
            lucide.createIcons();
        }

        lucide.createIcons();
        init();
    </script>
</body>
    </html>
