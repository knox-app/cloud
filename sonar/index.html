<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Assistant</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 600px; height: 90vh; background: #1e1e1e; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; }
        .chat-header { background: #2d2d2d; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #333; color: #00ffcc; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; }
        .message { padding: 14px 18px; border-radius: 12px; max-width: 85%; font-size: 15px; line-height: 1.5; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #333; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 2px; }
        .typing { font-size: 12px; color: #00ffcc; padding: 10px 20px; display: none; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #2d2d2d; }
        input { flex: 1; padding: 14px; border: 1px solid #444; border-radius: 8px; background: #121212; color: white; outline: none; }
        input:focus { border-color: #00ffcc; }
        button { background: #00ffcc; color: #121212; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ccaa; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">GROQ LLAMA 3.1 (70B)</div>
    <div id="chat-box" class="chat-box">
        <div class="message ai-msg">I'm updated and ready. Ask me anything from your data or the web.</div>
    </div>
    <div id="typing-indicator" class="typing">AI is generating response...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask about Tanya Sharma or anything else...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    // YOUR API KEY
    const API_KEY = "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";
    
    // MODEL CHOICE (Llama 3.1 70B is great, Llama 3.1 8B is instant)
    const MODEL_NAME = "llama-3.1-70b-versatile"; 

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender === 'user' ? 'user-msg' : 'ai-msg');
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function findLocalData(query) {
        try {
            const response = await fetch('data.json');
            const data = await response.json();
            const lowerQuery = query.toLowerCase();
            
            // Search inside every "Topic" and "Content"
            let relevantContext = "";
            data.knowledge_base.forEach(item => {
                if (lowerQuery.includes(item.topic.toLowerCase()) || 
                    item.content.toLowerCase().split(' ').some(word => word.length > 3 && lowerQuery.includes(word))) {
                    relevantContext += item.content + " ";
                }
            });
            
            return relevantContext || null;
        } catch (e) {
            return null;
        }
    }

    async function getGroqResponse(userPrompt) {
        typingIndicator.style.display = "block";
        const localContext = await findLocalData(userPrompt);

        // Making the system prompt more "intelligent" and "human"
        let systemPrompt = "You are a direct, helpful, and conversational assistant. ";
        
        if (localContext) {
            systemPrompt += `You have access to this private data: "${localContext}". 
            Use it to answer the user. If the data contains the answer, be specific. 
            Don't say 'according to the data', just say the answer naturally.`;
        } else {
            systemPrompt += "Answer the user's question using your general knowledge in a friendly way.";
        }

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    temperature: 0.7, // 0.7 makes it feel more "human" and less "robotic"
                    max_tokens: 1024
                })
            });

            const result = await response.json();
            typingIndicator.style.display = "none";
            return result.choices[0].message.content;
        } catch (error) {
            typingIndicator.style.display = "none";
            return "Error: Check your Groq API quota or key.";
        }
    }

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        userInput.value = '';
        const aiResponse = await getGroqResponse(text);
        addMessage(aiResponse, 'ai');
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
</script>
</body>
</html>
