<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Groq</title>
    <style>
        /* CSS STYLES */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #f9f9f9;
        }
        .message {
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }
        .user-msg {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .ai-msg {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: white;
            border-top: 1px solid #eee;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            padding-left: 20px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        /* Loading animation */
        .typing {
            font-style: italic;
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Groq AI Assistant</div>
    <div id="chat-box" class="chat-box">
        <div class="message ai-msg">Hello! How can I help you today?</div>
    </div>
    <div id="typing-indicator" class="typing" style="padding-left: 20px;">AI is thinking...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    // JAVASCRIPT LOGIC
    const API_KEY = "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";
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender === 'user' ? 'user-msg' : 'ai-msg');
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function findLocalData(query) {
        try {
            const response = await fetch('data.json');
            if (!response.ok) return null;
            const data = await response.json();
            
            // Look for keywords in the JSON file
            const match = data.knowledge_base.find(item => 
                query.toLowerCase().includes(item.topic.toLowerCase())
            );
            
            return match ? match.content : null;
        } catch (e) {
            console.log("No JSON file found or error reading it.");
            return null;
        }
    }

    async function getGroqResponse(userPrompt) {
        typingIndicator.style.display = "block";
        
        // 1. Check JSON for specific info
        const localContext = await findLocalData(userPrompt);

        // 2. Prepare System Prompt
        let systemMessage = "You are a helpful and concise AI assistant.";
        if (localContext) {
            systemMessage += ` Use the following specific data to answer the user's question, but summarize it to sound natural: ${localContext}`;
        }

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile", // Using a high-quality free model
                    messages: [
                        { role: "system", content: systemMessage },
                        { role: "user", content: userPrompt }
                    ],
                    temperature: 0.5
                })
            });

            const result = await response.json();
            typingIndicator.style.display = "none";
            return result.choices[0].message.content;
        } catch (error) {
            typingIndicator.style.display = "none";
            return "Error: Could not connect to API. Make sure your key is valid.";
        }
    }

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';

        const aiResponse = await getGroqResponse(text);
        addMessage(aiResponse, 'ai');
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChat();
    });
</script>

</body>
</html>
