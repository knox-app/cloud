<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compose - Superhuman</title>
    <style>
        :root { --bg: #0a0a0a; --surface: #111; --border: #222; --text: #eee; --accent: #3355ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--surface); width: 600px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .row { border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; }
        .row label { width: 60px; color: #555; font-size: 14px; }
        input, textarea { background: none; border: none; color: white; width: 100%; outline: none; padding: 10px 0; font-size: 15px; }
        textarea { height: 250px; resize: none; }
        .footer { padding: 15px; display: flex; justify-content: space-between; background: #161616; }
        #send-btn { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #image-upload { display: none; }
        .img-btn { color: #888; cursor: pointer; font-size: 14px; padding: 10px; }
        .img-btn:hover { color: white; }
        #preview-area img { max-width: 100px; margin: 10px; border-radius: 4px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="card">
        <div class="row"><label>To</label><input type="text" id="to"></div>
        <div class="row"><label>Subject</label><input type="text" id="subject"></div>
        <textarea id="message" placeholder="Write your message..."></textarea>
        <div id="preview-area"></div>
        <div class="footer">
            <label class="img-btn" for="image-upload">📷 Attach Image</label>
            <input type="file" id="image-upload" accept="image/*">
            <button id="send-btn">Send Message</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U", projectId: "question-metabase", appId: "1:770698198753:web:59ae49d78b6013bab5c1a0" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const token = localStorage.getItem('gmail_token');
        const params = new URLSearchParams(window.location.search);

        // Pre-fill from URL parameters
        if(params.get('to')) document.getElementById('to').value = params.get('to');
        if(params.get('subject')) document.getElementById('subject').value = params.get('subject');

        let attachedImages = [];

        // Handle Image Selection
        document.getElementById('image-upload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64 = event.target.result;
                attachedImages.push(base64);
                const img = document.createElement('img');
                img.src = base64;
                document.getElementById('preview-area').appendChild(img);
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('send-btn').onclick = async () => {
            const to = document.getElementById('to').value;
            const subject = document.getElementById('subject').value;
            let bodyContent = document.getElementById('message').value;

            // Add images to HTML body
            attachedImages.forEach(imgData => {
                bodyContent += `<br><img src="${imgData}" style="max-width:100%">`;
            });

            const email = [
                `To: ${to}`,
                `Subject: ${subject}`,
                'MIME-Version: 1.0',
                'Content-Type: text/html; charset=utf-8',
                '',
                bodyContent
            ].join('\r\n');

            const encoded = btoa(unescape(encodeURIComponent(email))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

            const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ raw: encoded })
            });

            if (res.ok) {
                await addDoc(collection(db, "sent_emails"), { to, subject, timestamp: serverTimestamp() });
                alert("Email Sent!");
                window.location.href = './2.html';
            }
        };
    </script>
</body>
</html>
