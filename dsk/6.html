<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        #email-step, #otp-step, #loading-step {
            display: none;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #loading-step { display: block; }

        .icon-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }

        .paper-plane {
            width: 100%;
            height: 100%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .ring {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawRing 2s forwards ease-out;
        }

        @keyframes drawRing {
            to { stroke-dashoffset: 0; }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 10px;
            font-weight: 500;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .email-display {
            color: #1a1a1a;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .otp-box {
            width: 50px;
            height: 60px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 24px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        .otp-box:focus {
            border-color: #1a1a1a;
        }

        .standard-input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        /* UPDATED BUTTON STYLE */
        .btn {
            width: 100%;
            padding: 15px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #222;
        }

        .btn:disabled {
            background-color: #000;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>

<div id="loading-step">
    <p>Verifying session details...</p>
</div>

<div id="email-step">
    <h1>Parental Consent</h1>
    <p>Because this is a kids account, please provide a parent or guardian's email to continue.</p>
    <input type="email" id="parentEmailInput" class="standard-input" placeholder="Parent's email address">
    <button class="btn" id="sendOtpBtn">Send Verification Code</button>
</div>

<div id="otp-step">
    <button class="close-btn" onclick="window.history.back()">×</button>
    
    <div class="icon-container">
        <svg class="paper-plane" viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="40" stroke="#E5E7EB" stroke-width="2"/>
            <circle class="ring" cx="50" cy="50" r="30" stroke="#4B5563" stroke-width="2" stroke-dasharray="4 4"/>
            <path d="M35 50L45 60L70 35M45 60V75L55 65" stroke="#111827" stroke-width="2"/>
            <path d="M70 35L25 45L45 60L65 75L70 35Z" stroke="#111827" stroke-width="2"/>
        </svg>
    </div>

    <h1>Check your email</h1>
    <p>A temporary sign-in link has been sent to<br><span id="displayEmail"></span></p>

    <div class="input-group">
        <input type="text" class="otp-box" maxlength="1">
        <input type="text" class="otp-box" maxlength="1">
        <input type="text" class="otp-box" maxlength="1">
        <input type="text" class="otp-box" maxlength="1">
    </div>

    <button class="btn" id="confirmBtn" disabled>Confirm</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = { projectId: "question-metabase" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

emailjs.init("Yr9MutUoHOEONnFgn");

let generatedOTP = "";
let currentParentEmail = "";

const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get('session');

const loadingStep = document.getElementById('loading-step');
const emailStep = document.getElementById('email-step');
const otpStep = document.getElementById('otp-step');
const sendOtpBtn = document.getElementById('sendOtpBtn');
const confirmBtn = document.getElementById('confirmBtn');
const parentEmailInput = document.getElementById('parentEmailInput');
const displayEmail = document.getElementById('displayEmail');
const otpBoxes = document.querySelectorAll('.otp-box');

loadingStep.style.display = 'none';
emailStep.style.display = 'block';

sendOtpBtn.addEventListener('click', () => {
    const email = parentEmailInput.value.trim();
    if (!email) return alert("Enter email");

    currentParentEmail = email;
    generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();

    emailStep.style.display = 'none';
    otpStep.style.display = 'block';
    displayEmail.innerText = email;
});

otpBoxes.forEach((box, index) => {
    box.addEventListener('keyup', (e) => {
        if (e.key >= '0' && e.key <= '9' && index < 3) {
            otpBoxes[index + 1].focus();
        }
        if (e.key === 'Backspace' && index > 0) {
            otpBoxes[index - 1].focus();
        }

        const filled = Array.from(otpBoxes).every(b => b.value !== '');
        confirmBtn.disabled = !filled;

        confirmBtn.style.backgroundColor = "#000"; // FIXED
    });
});

confirmBtn.addEventListener('click', () => {
    const entered = Array.from(otpBoxes).map(b => b.value).join('');
    if (entered === generatedOTP) {
        alert("Verified");
    } else {
        alert("Wrong OTP");
    }
});
</script>

</body>
</html>
