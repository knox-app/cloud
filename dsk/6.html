<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <!-- Import Google Fonts to match the screenshot -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* Container visibility toggles */
        #email-step, #otp-step, #loading-step {
            display: none;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #loading-step { display: block; } /* Show loading first */

        /* SVG Animation */
        .icon-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }

        .paper-plane {
            width: 100%;
            height: 100%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .ring {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawRing 2s forwards ease-out;
        }

        @keyframes drawRing {
            to { stroke-dashoffset: 0; }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 10px;
            font-weight: 500;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .email-display {
            color: #1a1a1a;
            font-weight: 500;
        }

        /* Input styling */
        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .otp-box {
            width: 50px;
            height: 60px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 24px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        .otp-box:focus {
            border-color: #1a1a1a;
        }

        .standard-input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background-color: #999;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #777;
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>

    <!-- Loading Step -->
    <div id="loading-step">
        <p>Verifying session details...</p>
    </div>

    <!-- Step 1: Ask for Parent Email -->
    <div id="email-step">
        <h1>Parental Consent</h1>
        <p>Because this is a kids account, please provide a parent or guardian's email to continue.</p>
        <input type="email" id="parentEmailInput" class="standard-input" placeholder="Parent's email address">
        <button class="btn" id="sendOtpBtn">Send Verification Code</button>
    </div>

    <!-- Step 2: OTP Verification -->
    <div id="otp-step">
        <button class="close-btn" onclick="window.history.back()">×</button>
        
        <div class="icon-container">
            <svg class="paper-plane" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Decorative rings -->
                <circle cx="50" cy="50" r="40" stroke="#E5E7EB" stroke-width="2"/>
                <circle class="ring" cx="50" cy="50" r="30" stroke="#4B5563" stroke-width="2" stroke-dasharray="4 4"/>
                <!-- Paper Plane -->
                <path d="M35 50L45 60L70 35M45 60V75L55 65" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M70 35L25 45L45 60L65 75L70 35Z" stroke="#111827" stroke-width="2" stroke-linejoin="round"/>
            </svg>
        </div>

        <h1>Check your email</h1>
        <p>A temporary sign-in link has been sent to<br><span class="email-display" id="displayEmail"></span></p>

        <!-- 4 Digit Input -->
        <div class="input-group" id="otpInputs">
            <input type="text" class="otp-box" maxlength="1" pattern="\d*">
            <input type="text" class="otp-box" maxlength="1" pattern="\d*">
            <input type="text" class="otp-box" maxlength="1" pattern="\d*">
            <input type="text" class="otp-box" maxlength="1" pattern="\d*">
        </div>

        <button class="btn" id="confirmBtn" disabled>Confirm</button>
    </div>

    <!-- Firebase SDK (Modular v9) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 1. REPLACE WITH YOUR FIREBASE CONFIG
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "question-metabase.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // 2. EMAILJS INITIALIZATION
        // ==========================================
        emailjs.init("Yr9MutUoHOEONnFgn");

        // State variables
        let generatedOTP = "";
        let currentParentEmail = "";
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session'); 
        const urlOtp = urlParams.get('otp'); // In case magic link points here instead of 6.html
        const urlEmail = urlParams.get('pemail');

        // UI Elements
        const loadingStep = document.getElementById('loading-step');
        const emailStep = document.getElementById('email-step');
        const otpStep = document.getElementById('otp-step');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        const parentEmailInput = document.getElementById('parentEmailInput');
        const displayEmail = document.getElementById('displayEmail');
        const otpBoxes = document.querySelectorAll('.otp-box');

        // ==========================================
        // 3. MAIN LOGIC AND ROUTING
        // ==========================================
        async function checkUserData() {
            if (!sessionId) {
                loadingStep.innerHTML = "<p>No session ID found in URL.</p>";
                return;
            }

            try {
                const docRef = doc(db, "ASPX Keys", sessionId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();

                    // Condition 1: Redirect immediately for these families
                    if (data.family === 'no' || data.family === 'busniess' || data.family === 'business' || data.family === 'commited') {
                        window.location.href = "6.html";
                        return;
                    }

                    // Condition 2: Kids account requiring parental commit
                    if (data.family === 'commit' && data.type === 'kids') {
                        
                        // Handle Magic Link if it directs to 5.html directly
                        if (urlOtp && urlEmail) {
                            await verifyAndUpdateDatabase(urlEmail);
                            return;
                        }

                        // Otherwise, show the step to ask for parent email
                        loadingStep.style.display = 'none';
                        emailStep.style.display = 'block';
                    } else {
                        // Failsafe for other cases
                        window.location.href = "6.html";
                    }

                } else {
                    loadingStep.innerHTML = "<p>Document not found in database!</p>";
                }
            } catch (error) {
                console.error("Error fetching document:", error);
                loadingStep.innerHTML = "<p>Database error. Please check console.</p>";
            }
        }

        // ==========================================
        // 4. OTP GENERATION & EMAIL SENDING
        // ==========================================
        sendOtpBtn.addEventListener('click', () => {
            const email = parentEmailInput.value.trim();
            if (!email) {
                alert("Please enter a valid email.");
                return;
            }

            currentParentEmail = email;
            
            // Generate 4-digit code
            generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();

            sendOtpBtn.innerText = "Sending...";
            sendOtpBtn.disabled = true;

            // Send via EmailJS (INCLUDING session and email for the Magic Link template)
            emailjs.send("service_63mnm5a", "template_qxz1wka", {
                to_email: email,       // Used by EmailJS to route the email
                email: email,          // Used in your Template URL {{email}}
                otp: generatedOTP,     // Used in your Template body {{otp}}
                session: sessionId     // Used in your Template URL {{session}}
            }).then(
                function(response) {
                    // Switch UI
                    emailStep.style.display = 'none';
                    otpStep.style.display = 'block';
                    displayEmail.innerText = email;
                },
                function(error) {
                    console.error("FAILED...", error);
                    alert("Failed to send email. Check EmailJS configuration.");
                    sendOtpBtn.innerText = "Send Verification Code";
                    sendOtpBtn.disabled = false;
                }
            );
        });

        // ==========================================
        // 5. OTP INPUT BOX LOGIC (Auto-focus)
        // ==========================================
        otpBoxes.forEach((box, index) => {
            box.addEventListener('keyup', (e) => {
                // Move to next box if number typed
                if (e.key >= '0' && e.key <= '9') {
                    if (index < otpBoxes.length - 1) {
                        otpBoxes[index + 1].focus();
                    }
                } 
                // Handle backspace
                else if (e.key === 'Backspace') {
                    if (index > 0) {
                        otpBoxes[index - 1].focus();
                    }
                }

                // Check if all filled to enable button
                const allFilled = Array.from(otpBoxes).every(b => b.value !== '');
                confirmBtn.disabled = !allFilled;
                if(allFilled) {
                    confirmBtn.style.backgroundColor = "#8B8982"; // Color from screenshot
                } else {
                    confirmBtn.style.backgroundColor = "#999";
                }
            });
        });

        // ==========================================
        // 6. CONFIRM OTP AND UPDATE FIRESTORE
        // ==========================================
        confirmBtn.addEventListener('click', async () => {
            const enteredOTP = Array.from(otpBoxes).map(b => b.value).join('');
            
            if (enteredOTP === generatedOTP) {
                confirmBtn.innerText = "Verifying...";
                await verifyAndUpdateDatabase(currentParentEmail);
            } else {
                alert("Incorrect Verification Code. Please try again.");
                // Clear boxes
                otpBoxes.forEach(b => b.value = '');
                otpBoxes[0].focus();
                confirmBtn.disabled = true;
                confirmBtn.style.backgroundColor = "#999";
            }
        });

        // The function that updates Firebase and redirects to 6.html
        async function verifyAndUpdateDatabase(guardianEmail) {
            try {
                const docRef = doc(db, "ASPX Keys", sessionId);
                
                // Update family to "commited" and add "guardians"
                await updateDoc(docRef, {
                    family: "commited",
                    guardians: guardianEmail
                });

                // Redirect to success page
                window.location.href = "6.html";
               
            } catch (error) {
                console.error("Error updating document:", error);
                alert("Failed to update database.");
                confirmBtn.innerText = "Confirm";
            }
        }

        // Initialize script
        checkUserData();

    </script>
</body>
</html>
