<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Superhuman Clone</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-box {
            text-align: center;
            padding: 40px;
            border: 1px solid #222;
            border-radius: 12px;
            background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        #login-btn {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            width: 100%;
        }

        #login-btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-1px);
        }

        #login-btn:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 15px;
            font-size: 12px;
            color: #ff4444;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>SUPERHUMAN</h1>
        <p>The fastest email experience ever made.</p>
        <button id="login-btn">Connect Google Account</button>
        <div id="error-msg" class="status"></div>
    </div>

    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>

    <script>
        let tokenClient;
        const CLIENT_ID = '472666603000-g2d7cettm5he29mf9vj9ahfo55fldtfs.apps.googleusercontent.com';
        // Scopes needed for reading and sending email
        const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send';

        function initClient() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            // Save token to localStorage for use in 2.html and 3.html
                            localStorage.setItem('gmail_token', tokenResponse.access_token);
                            localStorage.setItem('token_expiry', Date.now() + (tokenResponse.expires_in * 1000));
                            
                            // Redirect to the inbox page (2.html)
                            // Using ./ ensures it works on GitHub Pages subfolders
                            window.location.href = './2.html';
                        }
                    },
                    error_callback: (err) => {
                        console.error('Auth Error:', err);
                        document.getElementById('error-msg').innerText = 'Auth failed: ' + err.message;
                        document.getElementById('error-msg').style.display = 'block';
                    }
                });
            } catch (err) {
                console.error('Initialization Error:', err);
            }
        }

        document.getElementById('login-btn').onclick = () => {
            if (tokenClient) {
                // Request Access Token via Popup
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                alert('Google Library not loaded yet. Please refresh.');
            }
        };

        // Check if already logged in
        window.onload = () => {
            const token = localStorage.getItem('gmail_token');
            const expiry = localStorage.getItem('token_expiry');
            if (token && expiry && Date.now() < expiry) {
                window.location.href = './2.html';
            }
        };
    </script>
</body>
</html>
