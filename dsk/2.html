<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superhuman Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000; --sidebar: #0a0a0a; --border: #1a1a1a;
            --text: #fff; --text-dim: #888; --accent: #3355ff;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden;
        }

        /* --- Sidebar (Hidden on Mobile) --- */
        .sidebar {
            width: 240px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; transition: 0.3s;
        }

        .user-profile {
            padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border);
        }
        .dp {
            width: 35px; height: 35px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
        }

        .nav-links { flex-grow: 1; padding: 10px; }
        .nav-item {
            padding: 10px 15px; border-radius: 6px; cursor: pointer; color: var(--text-dim);
            display: flex; justify-content: space-between; align-items: center; font-size: 14px;
        }
        .nav-item:hover, .nav-item.active { background: #111; color: #fff; }

        /* --- Main Layout --- */
        .list-pane {
            width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .reader-pane { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }

        /* Thread List */
        .header { padding: 15px 20px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .thread-item {
            padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .thread-item.selected { background: #111; border-left: 3px solid var(--accent); }
        .from { font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; }
        .subject { font-size: 13px; margin: 4px 0; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .snippet { font-size: 12px; color: var(--text-dim); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Reader */
        .toolbar {
            padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center;
        }
        .icon-btn {
            background: #111; border: 1px solid var(--border); color: #fff; padding: 6px 12px; 
            border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .icon-btn:hover { background: #222; }
        .reader-body { padding: 30px; overflow-y: auto; flex-grow: 1; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; border-radius: 8px; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .list-pane { width: 100%; }
            .reader-pane {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                display: none; z-index: 10;
            }
            .reader-pane.active { display: flex; }
        }

        .back-btn { display: none; }
        @media (max-width: 768px) { .back-btn { display: inline-block; } }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="user-profile">
            <div class="dp" id="user-dp">U</div>
            <div id="user-email" style="font-size: 12px; overflow: hidden;">Loading...</div>
        </div>
        <div class="nav-links">
            <a href="./3.html" style="text-decoration: none;"><div class="nav-item active" style="color: var(--accent);">+ Compose</div></a>
            <div class="nav-item" onclick="refresh()">Inbox</div>
            <div class="nav-item">Sent</div>
            <div class="nav-item">Archive</div>
            <div class="nav-item">Trash</div>
        </div>
    </div>

    <!-- Thread List -->
    <div class="list-pane" id="list-pane">
        <div class="header">
            <span>Inbox</span>
            <span onclick="refresh()" style="cursor:pointer; font-size: 12px; color: var(--accent);">Refresh</span>
        </div>
        <div style="overflow-y: auto;" id="thread-list">
            <div style="padding: 20px; color: #444;">Syncing with Gmail...</div>
        </div>
    </div>

    <!-- Reader Pane -->
    <div class="reader-pane" id="reader-pane">
        <div class="toolbar">
            <button class="icon-btn back-btn" onclick="closeReader()">← Back</button>
            <button class="icon-btn" onclick="modifyEmail('archive')">Archive</button>
            <button class="icon-btn" onclick="modifyEmail('trash')" style="color: #ff4444;">Delete</button>
            <button class="icon-btn" onclick="showLabels()">Labels</button>
            <a id="reply-link" href="#" class="icon-btn" style="text-decoration: none; background: var(--accent);">Reply</a>
        </div>
        <div id="reader-meta" style="padding: 20px 30px; border-bottom: 1px solid var(--border);">
            <h2 id="view-subject" style="margin: 0 0 10px 0; font-size: 20px;"></h2>
            <div id="view-from" style="font-size: 13px; color: var(--text-dim);"></div>
        </div>
        <div class="reader-body">
            <iframe id="mail-frame"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            projectId: "question-metabase",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const token = localStorage.getItem('gmail_token');
        if (!token) window.location.href = './1.html';

        let currentMsgId = null;

        // 1. Fetch User Profile
        async function fetchProfile() {
            const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            document.getElementById('user-email').innerText = data.emailAddress;
            document.getElementById('user-dp').innerText = data.emailAddress[0].toUpperCase();
        }

        // 2. Fetch Inbox
        async function fetchInbox() {
            const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=20&q=label:INBOX', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const listDiv = document.getElementById('thread-list');
            listDiv.innerHTML = '';

            if(!data.messages) { listDiv.innerHTML = "<p style='padding:20px'>Inbox Empty</p>"; return; }

            for (let msg of data.messages) {
                const detailRes = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const email = await detailRes.json();
                
                const subject = email.payload.headers.find(h => h.name === 'Subject')?.value || '(No Subject)';
                const from = email.payload.headers.find(h => h.name === 'From')?.value || 'Unknown';
                
                const item = document.createElement('div');
                item.className = 'thread-item';
                item.id = `item-${msg.id}`;
                item.innerHTML = `
                    <div class="from"><span>${from.split('<')[0]}</span></div>
                    <div class="subject">${subject}</div>
                    <div class="snippet">${email.snippet}</div>
                `;
                item.onclick = () => openEmail(email, msg.id, subject, from);
                listDiv.appendChild(item);
            }
        }

        // 3. Open Email
        function openEmail(email, id, subject, from) {
            currentMsgId = id;
            document.querySelectorAll('.thread-item').forEach(e => e.classList.remove('selected'));
            document.getElementById(`item-${id}`).classList.add('selected');

            document.getElementById('view-subject').innerText = subject;
            document.getElementById('view-from').innerText = `From: ${from}`;
            
            // Handle Mobile Pane Switch
            if(window.innerWidth < 768) {
                document.getElementById('reader-pane').classList.add('active');
            }

            // Decode HTML Content
            let body = "";
            const part = email.payload.parts ? email.payload.parts.find(p => p.mimeType === 'text/html') || email.payload.parts[0] : email.payload;
            body = atob(part.body.data.replace(/-/g, '+').replace(/_/g, '/'));

            const frame = document.getElementById('mail-frame');
            frame.contentDocument.body.innerHTML = body;

            // Reply Link
            const fromEmail = from.match(/<(.+)>/)?.[1] || from;
            document.getElementById('reply-btn').href = `./3.html?to=${encodeURIComponent(fromEmail)}&subject=${encodeURIComponent("Re: "+subject)}`;
        }

        // 4. Archive / Delete Logic
        window.modifyEmail = async (action) => {
            if(!currentMsgId) return;
            
            let body = {};
            if(action === 'archive') body = { removeLabelIds: ['INBOX'] };
            if(action === 'trash') {
                await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${currentMsgId}/trash`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
            } else {
                await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${currentMsgId}/modify`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            }

            // Log to Firestore
            await addDoc(collection(db, "user_actions"), {
                messageId: currentMsgId,
                action: action,
                timestamp: serverTimestamp()
            });

            alert(`Email ${action}d`);
            location.reload();
        };

        window.closeReader = () => document.getElementById('reader-pane').classList.remove('active');
        window.refresh = () => fetchInbox();

        fetchProfile();
        fetchInbox();
    </script>
</body>
</html>
