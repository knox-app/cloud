<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - Superhuman Clone</title>
    <style>
        :root { --bg: #0a0a0a; --surface: #111; --border: #222; --text: #eee; --accent: #3355ff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 240px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 200; letter-spacing: 2px; margin-bottom: 30px; }
        .nav-item { padding: 10px; color: #888; text-decoration: none; cursor: pointer; border-radius: 4px; margin-bottom: 5px; }
        .nav-item.active { background: #1a1a1a; color: white; }
        .compose-btn { background: var(--accent); color: white; padding: 12px; text-align: center; border-radius: 6px; text-decoration: none; margin-bottom: 20px; font-weight: bold; }

        /* Main Content */
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .email-list { overflow-y: auto; flex-grow: 1; }
        .email-item { display: grid; grid-template-columns: 200px 1fr 100px; padding: 15px 20px; border-bottom: 1px solid #151515; cursor: pointer; transition: background 0.2s; }
        .email-item:hover { background: #161616; }
        .from { font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .subject { color: #ccc; }
        .snippet { color: #666; font-weight: 400; }
        .date { color: #555; text-align: right; font-size: 13px; }

        #loader { padding: 20px; text-align: center; color: var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">SUPERHUMAN</div>
        <a href="./3.html" class="compose-btn">Compose (C)</a>
        <div class="nav-item active">Inbox</div>
        <div class="nav-item">Sent</div>
        <div class="nav-item">Drafts</div>
        <div style="margin-top: auto;">
            <button onclick="logout()" style="background:none; border:1px solid #333; color:#666; width:100%; padding:8px; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h2>Inbox</h2>
            <div id="user-info" style="font-size: 12px; color: #555;"></div>
        </div>
        <div id="loader">Loading emails...</div>
        <div class="email-list" id="email-list"></div>
    </div>

    <script type="module">
        // Firebase Integration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // OAuth Check
        const token = localStorage.getItem('gmail_token');
        if (!token) {
            window.location.href = './1.html';
        }

        async function fetchInbox() {
            try {
                // 1. Get List of Messages
                const response = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=15', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.error) {
                    if (data.error.status === "UNAUTHENTICATED") {
                        localStorage.clear();
                        window.location.href = './1.html';
                    }
                    throw new Error(data.error.message);
                }

                const listDiv = document.getElementById('email-list');
                document.getElementById('loader').style.display = 'none';

                if (!data.messages) {
                    listDiv.innerHTML = '<div style="padding:20px;">No messages found.</div>';
                    return;
                }

                // 2. Fetch Details for each Message
                for (let msg of data.messages) {
                    const detailRes = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const email = await detailRes.json();

                    // Parse Headers
                    const subject = email.payload.headers.find(h => h.name === 'Subject')?.value || '(No Subject)';
                    const from = email.payload.headers.find(h => h.name === 'From')?.value || 'Unknown';
                    const date = new Date(email.payload.headers.find(h => h.name === 'Date')?.value).toLocaleDateString();

                    // Create UI Element
                    const item = document.createElement('div');
                    item.className = 'email-item';
                    item.innerHTML = `
                        <div class="from">${from.split('<')[0]}</div>
                        <div class="subject">${subject} <span class="snippet">- ${email.snippet}</span></div>
                        <div class="date">${date}</div>
                    `;
                    listDiv.appendChild(item);

                    // 3. Save Log to Firestore (as requested)
                    await addDoc(collection(db, "sync_logs"), {
                        action: "fetch_email",
                        emailId: msg.id,
                        subject: subject,
                        timestamp: serverTimestamp()
                    });
                }
            } catch (err) {
                console.error('Fetch Error:', err);
                document.getElementById('loader').innerText = "Error loading emails. See console.";
            }
        }

        window.logout = () => {
            localStorage.clear();
            window.location.href = './1.html';
        };

        // Start Fetch
        fetchInbox();
    </script>
</body>
</html>
