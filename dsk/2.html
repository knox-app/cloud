<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - Superhuman Clone</title>
    <style>
        :root { --bg: #0a0a0a; --surface: #111; --border: #222; --text: #eee; --accent: #3355ff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; border-right: 1px solid var(--border); padding: 20px; flex-shrink: 0; }
        .compose-btn { background: var(--accent); color: white; padding: 12px; text-align: center; border-radius: 6px; text-decoration: none; display: block; margin-bottom: 20px; font-weight: bold; }
        
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .email-list { overflow-y: auto; flex-grow: 1; }
        .email-item { display: grid; grid-template-columns: 200px 1fr 100px; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .email-item:hover { background: #161616; }
        .from { font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .subject { color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Reading Modal */
        #reader-modal { display: none; position: fixed; top: 0; right: 0; width: 60%; height: 100%; background: #0f0f0f; border-left: 1px solid var(--border); box-shadow: -10px 0 30px rgba(0,0,0,0.8); z-index: 100; flex-direction: column; }
        .reader-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .reader-body { padding: 30px; overflow-y: auto; color: #ddd; line-height: 1.6; flex-grow: 1; }
        .btn-reply { background: white; color: black; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; }
        .close-btn { color: #666; cursor: pointer; border: none; background: none; font-size: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="font-weight: 200; letter-spacing: 2px; margin-bottom: 30px;">SUPERHUMAN</div>
        <a href="./3.html" class="compose-btn">Compose</a>
        <div style="color: #666; font-size: 12px; margin-bottom: 10px;">INBOX</div>
    </div>

    <div class="main">
        <div id="email-list"></div>
    </div>

    <!-- Email Reader Modal -->
    <div id="reader-modal">
        <div class="reader-header">
            <div id="reader-subject" style="font-weight: bold; font-size: 18px;"></div>
            <div>
                <a id="reply-link" class="btn-reply">Reply</a>
                <button class="close-btn" onclick="closeReader()">×</button>
            </div>
        </div>
        <div id="reader-body" class="reader-body"></div>
    </div>

    <script type="module">
        const token = localStorage.getItem('gmail_token');
        if (!token) window.location.href = './1.html';

        async function fetchInbox() {
            const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=20', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const listDiv = document.getElementById('email-list');

            for (let msg of data.messages) {
                const detailRes = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const email = await detailRes.json();
                const subject = email.payload.headers.find(h => h.name === 'Subject')?.value || '(No Subject)';
                const fromHeader = email.payload.headers.find(h => h.name === 'From')?.value || 'Unknown';
                const fromEmail = fromHeader.match(/<(.+)>/)?.[1] || fromHeader;

                const item = document.createElement('div');
                item.className = 'email-item';
                item.onclick = () => openReader(email, subject, fromEmail);
                item.innerHTML = `
                    <div class="from">${fromHeader.split('<')[0]}</div>
                    <div class="subject">${subject}</div>
                    <div class="date">${new Date().toLocaleDateString()}</div>
                `;
                listDiv.appendChild(item);
            }
        }

        window.openReader = (email, subject, fromEmail) => {
            const modal = document.getElementById('reader-modal');
            const body = document.getElementById('reader-body');
            document.getElementById('reader-subject').innerText = subject;
            
            // Get Body Content (Handles multipart or simple)
            let content = "";
            if (email.payload.parts) {
                content = atob(email.payload.parts[0].body.data.replace(/-/g, '+').replace(/_/g, '/'));
            } else {
                content = atob(email.payload.body.data.replace(/-/g, '+').replace(/_/g, '/'));
            }
            body.innerText = content;

            // Setup Reply Link with Parameters
            const replyUrl = `./3.html?to=${encodeURIComponent(fromEmail)}&subject=${encodeURIComponent("Re: " + subject)}`;
            document.getElementById('reply-link').href = replyUrl;

            modal.style.display = 'flex';
        };

        window.closeReader = () => document.getElementById('reader-modal').style.display = 'none';

        fetchInbox();
    </script>
</body>
</html>
