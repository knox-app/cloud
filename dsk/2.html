        </div>
        <div style="overflow-y: auto;" id="thread-list">
            <div style="padding: 20px; color: #444;">Syncing with Gmail...</div>
        </div>
    </div>

    <!-- Reader Pane -->
    <div class="reader-pane" id="reader-pane">
        <div class="toolbar">
            <button class="icon-btn back-btn" onclick="closeReader()">← Back</button>
            <button class="icon-btn" onclick="modifyEmail('archive')">Archive</button>
            <button class="icon-btn" onclick="modifyEmail('trash')" style="color: #ff4444;">Delete</button>
            <button class="icon-btn" onclick="showLabels()">Labels</button>
            <a id="reply-link" href="#" class="icon-btn" style="text-decoration: none; background: var(--accent);">Reply</a>
        </div>
        <div id="reader-meta" style="padding: 20px 30px; border-bottom: 1px solid var(--border);">
            <h2 id="view-subject" style="margin: 0 0 10px 0; font-size: 20px;"></h2>
            <div id="view-from" style="font-size: 13px; color: var(--text-dim);"></div>
        </div>
        <div class="reader-body">
            <iframe id="mail-frame"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            projectId: "question-metabase",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const token = localStorage.getItem('gmail_token');
        if (!token) window.location.href = './1.html';

        let currentMsgId = null;

        // 1. Fetch User Profile
        async function fetchProfile() {
            const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            document.getElementById('user-email').innerText = data.emailAddress;
            document.getElementById('user-dp').innerText = data.emailAddress[0].toUpperCase();
        }

        // 2. Fetch Inbox
        async function fetchInbox() {
            const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=20&q=label:INBOX', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const listDiv = document.getElementById('thread-list');
            listDiv.innerHTML = '';

            if(!data.messages) { listDiv.innerHTML = "<p style='padding:20px'>Inbox Empty</p>"; return; }

            for (let msg of data.messages) {
                const detailRes = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const email = await detailRes.json();
                
                const subject = email.payload.headers.find(h => h.name === 'Subject')?.value || '(No Subject)';
                const from = email.payload.headers.find(h => h.name === 'From')?.value || 'Unknown';
                
                const item = document.createElement('div');
                item.className = 'thread-item';
                item.id = `item-${msg.id}`;
                item.innerHTML = `
                    <div class="from"><span>${from.split('<')[0]}</span></div>
                    <div class="subject">${subject}</div>
                    <div class="snippet">${email.snippet}</div>
                `;
                item.onclick = () => openEmail(email, msg.id, subject, from);
                listDiv.appendChild(item);
            }
        }

        // 3. Open Email
        function openEmail(email, id, subject, from) {
            currentMsgId = id;
            document.querySelectorAll('.thread-item').forEach(e => e.classList.remove('selected'));
            document.getElementById(`item-${id}`).classList.add('selected');

            document.getElementById('view-subject').innerText = subject;
            document.getElementById('view-from').innerText = `From: ${from}`;
            
            // Handle Mobile Pane Switch
            if(window.innerWidth < 768) {
                document.getElementById('reader-pane').classList.add('active');
            }

            // Decode HTML Content
            let body = "";
            const part = email.payload.parts ? email.payload.parts.find(p => p.mimeType === 'text/html') || email.payload.parts[0] : email.payload;
            body = atob(part.body.data.replace(/-/g, '+').replace(/_/g, '/'));

            const frame = document.getElementById('mail-frame');
            frame.contentDocument.body.innerHTML = body;

            // Reply Link
            const fromEmail = from.match(/<(.+)>/)?.[1] || from;
            document.getElementById('reply-btn').href = `./3.html?to=${encodeURIComponent(fromEmail)}&subject=${encodeURIComponent("Re: "+subject)}`;
        }

        // 4. Archive / Delete Logic
        window.modifyEmail = async (action) => {
            if(!currentMsgId) return;
            
            let body = {};
            if(action === 'archive') body = { removeLabelIds: ['INBOX'] };
            if(action === 'trash') {
                await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${currentMsgId}/trash`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
            } else {
                await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${currentMsgId}/modify`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            }

            // Log to Firestore
            await addDoc(collection(db, "user_actions"), {
                messageId: currentMsgId,
                action: action,
                timestamp: serverTimestamp()
            });

            alert(`Email ${action}d`);
            location.reload();
        };

        window.closeReader = () => document.getElementById('reader-pane').classList.remove('active');
        window.refresh = () => fetchInbox();

        fetchProfile();
        fetchInbox();
    </script>
</body>
</html>
