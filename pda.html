<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotstar Pro Player - Live Left-Right</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0081ff;
            --ui-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #player-container {
            position: relative; width: 100%; max-width: 1000px; aspect-ratio: 16/9;
            background: #000; overflow: hidden; user-select: none;
        }
        #player-container.fullscreen { width: 100vw; height: 100vh; max-width: none; }

        video { width: 100%; height: 100%; object-fit: contain; transition: 0.3s; }
        video.zoom { object-fit: cover; }

        #brightness-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; pointer-events: none; opacity: 0; z-index: 5;
        }

        .controls {
            position: absolute; inset: 0; z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.8) 100%);
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; transition: opacity 0.4s;
        }
        .controls.hidden { opacity: 0; pointer-events: none; }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; color: white; }
        
        /* Live System (White, Transparent Path, Left-Right-Left Animation) */
        .live-tag {
            display: flex; flex-direction: column; align-items: center; 
            margin-left: 15px; min-width: 45px;
        }
        .live-text {
            color: var(--ui-white); font-weight: bold; font-size: 10px; 
            letter-spacing: 1.2px; text-transform: uppercase;
        }
        .live-line-container {
            width: 100%; height: 2px; background: transparent; 
            margin-top: 3px; overflow: hidden; position: relative;
        }
        .live-line {
            position: absolute; width: 18px; height: 100%;
            background: linear-gradient(90deg, transparent, var(--ui-white), transparent);
            animation: live-bounce 1.8s ease-in-out infinite alternate;
        }
        @keyframes live-bounce {
            0% { left: -10%; }
            100% { left: 80%; }
        }

        /* Gestures */
        .gesture-zone { position: absolute; top: 15%; height: 70%; width: 40%; z-index: 6; }
        #left-zone { left: 0; } #right-zone { right: 0; }
        .indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 15px;
            display: none; flex-direction: column; align-items: center; gap: 5px;
        }

        /* Progress Wrapper */
        .progress-wrapper {
            display: flex; align-items: center; width: 100%; margin-bottom: 10px;
        }
        .progress-area { flex: 1; height: 20px; display: flex; align-items: center; cursor: pointer; }
        .progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); position: relative; border-radius: 2px; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; position: relative; border-radius: 2px; }
        .progress-fill::after {
            content: ''; position: absolute; right: -6px; top: -4px;
            width: 12px; height: 12px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Settings & Lock */
        #settings-modal {
            position: absolute; right: 20px; bottom: 80px; width: 200px;
            background: rgba(15, 15, 15, 0.95); border-radius: 10px;
            color: white; padding: 10px; display: none; z-index: 100;
        }
        .menu-item { padding: 10px; font-size: 14px; cursor: pointer; border-radius: 5px; }
        .menu-item:hover { background: rgba(255,255,255,0.1); }
        
        #lock-overlay { position: absolute; inset: 0; z-index: 1000; display: none; padding: 20px; }
        #lock-overlay.active { display: block; }
        
        button { background: none; border: none; color: white; cursor: pointer; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #ad-box {
            position: absolute; bottom: 100px; left: 20px; background: #ffcc00;
            color: #000; padding: 5px 15px; font-weight: 900; border-radius: 4px; display: none;
        }
    </style>
</head>
<body>

<div id="player-container">
    <div id="brightness-overlay"></div>
    <video id="main-video" playsinline></video>

    <div id="ad-box">ADVERTISEMENT</div>

    <!-- Gestures -->
    <div id="left-zone" class="gesture-zone"><div class="indicator" id="bright-ind"><i data-lucide="sun"></i><span id="bright-val">100%</span></div></div>
    <div id="right-zone" class="gesture-zone"><div class="indicator" id="vol-ind"><i data-lucide="volume-2"></i><span id="vol-val">100%</span></div></div>

    <!-- Main Controls -->
    <div class="controls" id="main-controls">
        <div class="top-bar">
            <button onclick="toggleLock()"><i data-lucide="unlock"></i></button>
            <button onclick="toggleFit()"><i data-lucide="maximize"></i></button>
        </div>

        <div id="spinner" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:none;">
            <i data-lucide="loader-2" class="spin" width="50" height="50"></i>
        </div>

        <div class="bottom-bar">
            <!-- Progress Section -->
            <div class="progress-wrapper">
                <div class="progress-area" id="progress-area">
                    <div class="progress-bg">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                
                <!-- New Live System (White & Bouncing Line) -->
                <div class="live-tag">
                    <div class="live-text">LIVE</div>
                    <div class="live-line-container"><div class="live-line"></div></div>
                </div>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:15px;">
                    <button id="play-btn"><i data-lucide="play"></i></button>
                    <span id="time-txt" style="color:white; font-size:12px;">00:00 / 00:00</span>
                </div>
                <div style="display:flex; gap:15px;">
                    <button onclick="toggleSettings()"><i data-lucide="settings"></i></button>
                    <button onclick="toggleFS()"><i data-lucide="expand"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div style="font-weight:bold; border-bottom:1px solid #444; padding-bottom:5px; margin-bottom:5px;">Quality</div>
        <div id="quality-list"></div>
    </div>

    <div id="lock-overlay">
        <button onclick="toggleLock()" style="background:rgba(0,0,0,0.5); padding:10px; border-radius:50%; border:1px solid white;">
            <i data-lucide="lock"></i>
        </button>
    </div>
</div>

<script>
    lucide.createIcons();

    const video = document.getElementById('main-video');
    const container = document.getElementById('player-container');
    const controls = document.getElementById('main-controls');
    const progressFill = document.getElementById('progress-fill');
    const progressArea = document.getElementById('progress-area');
    const hls = new Hls();

    let isLocked = false;
    let isDragging = false;
    let hideTimer;

    const params = new URLSearchParams(window.location.search);
    const m3u8Url = params.get('url') || "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
    const adUrl = params.get('ad');

    function init() {
        if (adUrl) {
            document.getElementById('ad-box').style.display = 'block';
            video.src = adUrl;
            video.play();
            video.onended = () => {
                document.getElementById('ad-box').style.display = 'none';
                loadStream(m3u8Url);
            };
        } else {
            loadStream(m3u8Url);
        }
    }

    function loadStream(url) {
        if (Hls.isSupported()) {
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                setupSettings();
            });
        }
    }

    // Draggable Progress
    function handleScrub(e) {
        if (isLocked) return;
        const rect = progressArea.getBoundingClientRect();
        const clientX = e.pageX || e.touches[0].pageX;
        let percent = Math.min(Math.max(0, (clientX - rect.left) / rect.width), 1);
        progressFill.style.width = (percent * 100) + '%';
        if (!isDragging) video.currentTime = percent * video.duration;
    }

    progressArea.onmousedown = (e) => { isDragging = true; handleScrub(e); };
    window.onmousemove = (e) => { if (isDragging) handleScrub(e); };
    window.onmouseup = () => { if (isDragging) { video.currentTime = (parseFloat(progressFill.style.width)/100) * video.duration; isDragging = false; } };

    progressArea.ontouchstart = (e) => { isDragging = true; handleScrub(e); };
    progressArea.ontouchmove = (e) => { handleScrub(e); };
    progressArea.ontouchend = () => { isDragging = false; };

    video.ontimeupdate = () => {
        if (!isDragging) {
            const p = (video.currentTime / video.duration) * 100;
            progressFill.style.width = p + '%';
            document.getElementById('time-txt').innerText = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        }
    };

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const rs = Math.floor(s % 60);
        return `${m}:${rs < 10 ? '0' : ''}${rs}`;
    }

    // Gestures
    let startY, startVal, zone;
    container.addEventListener('touchstart', (e) => {
        if (isLocked) return;
        startY = e.touches[0].pageY;
        zone = e.touches[0].pageX < window.innerWidth / 2 ? 'left' : 'right';
        startVal = zone === 'left' ? parseFloat(getComputedStyle(document.getElementById('brightness-overlay')).opacity) : video.volume;
    });

    container.addEventListener('touchmove', (e) => {
        if (isLocked || !startY) return;
        const diff = (startY - e.touches[0].pageY) / 200;
        if (zone === 'left') {
            let b = Math.max(0, Math.min(0.8, startVal - diff));
            document.getElementById('brightness-overlay').style.opacity = b;
            showInd('bright', Math.round((1 - b/0.8)*100));
        } else {
            let v = Math.max(0, Math.min(1, startVal + diff));
            video.volume = v;
            showInd('vol', Math.round(v*100));
        }
    });

    container.addEventListener('touchend', () => {
        document.querySelectorAll('.indicator').forEach(i => i.style.display = 'none');
        startY = null;
    });

    function showInd(t, v) {
        document.getElementById(t + '-ind').style.display = 'flex';
        document.getElementById(t + '-val').innerText = v + '%';
    }

    function toggleLock() {
        isLocked = !isLocked;
        controls.classList.toggle('hidden', isLocked);
        document.getElementById('lock-overlay').classList.toggle('active', isLocked);
    }

    function toggleSettings() {
        const m = document.getElementById('settings-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function setupSettings() {
        const list = document.getElementById('quality-list');
        list.innerHTML = `<div class="menu-item" onclick="hls.currentLevel=-1;toggleSettings()">Auto</div>`;
        hls.levels.forEach((l, i) => {
            list.innerHTML += `<div class="menu-item" onclick="hls.currentLevel=${i};toggleSettings()">${l.height}p</div>`;
        });
    }

    document.getElementById('play-btn').onclick = () => video.paused ? video.play() : video.pause();
    video.onplay = () => { document.getElementById('play-btn').innerHTML = '<i data-lucide="pause"></i>'; lucide.createIcons(); };
    video.onpause = () => { document.getElementById('play-btn').innerHTML = '<i data-lucide="play"></i>'; lucide.createIcons(); };

    function toggleFS() {
        if (!document.fullscreenElement) {
            container.requestFullscreen();
            screen.orientation.lock('landscape').catch(()=>{});
        } else {
            document.exitFullscreen();
        }
    }
    
    function toggleFit() { video.classList.toggle('zoom'); }

    // Auto hide controls
    function resetHideTimer() {
        clearTimeout(hideTimer);
        if (!video.paused && !isLocked) {
            hideTimer = setTimeout(() => controls.classList.add('hidden'), 3500);
        }
    }
    container.onmousemove = () => { controls.classList.remove('hidden'); resetHideTimer(); };
    container.onclick = () => { controls.classList.remove('hidden'); resetHideTimer(); };

    init();
</script>
</body>
</html>
